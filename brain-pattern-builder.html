<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Pattern Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'Noto Sans JP', sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div id="app"></div>

  <script>
    // ===== データ定義 =====
    const TACTICS = [
      '先行逃げ', 'カマシ逃げ', '中団捲り', '後方捲り', '単騎',
      '早カマシ', 'Bカマシ', '追走中団', '追走後方', '中団ショート捲り'
    ];

    const SITUATIONS = [
      '押し切り', '逃げ残り', '千切れ', '捲り不発', '捲り成功',
      '番手差し', 'ラインワンツー', 'ライン決着', '3番手突き抜け',
      '飛びつき', '踏み合い', '先行垂れ', '番手捲り', '番手援護',
      'ブロック共倒れ', '別線決着', '混戦', '突っ張り先行', '追走のみ',
      '展開待ち', 'カマシ不発', '位置取り失敗', '番手切替追込'
    ];

    const ADVANTAGES = ['◎', '◯', '△', '×'];
    const CATEGORIES = ['すべて', '2分戦', '3分戦', '4分戦', '細切れ', 'その他'];

    // ===== 点数計算 =====
    function countSingleBet(betStr) {
      const parts = betStr.trim().split('-');
      if (parts.length !== 3) return 0;
      
      const first = [...new Set(parts[0].split('').filter(c => /[1-9]/.test(c)))];
      const second = [...new Set(parts[1].split('').filter(c => /[1-9]/.test(c)))];
      const third = [...new Set(parts[2].split('').filter(c => /[1-9]/.test(c)))];
      
      if (first.length === 0 || second.length === 0 || third.length === 0) return 0;
      
      let count = 0;
      for (const f of first) {
        for (const s of second) {
          if (s === f) continue;
          for (const t of third) {
            if (t === f || t === s) continue;
            count++;
          }
        }
      }
      return count;
    }

    function countAllBets(betsStr) {
      const lines = betsStr.trim().split('\n').filter(line => line.trim());
      const results = lines.map(line => ({
        bet: line.trim(),
        count: countSingleBet(line)
      }));
      const total = results.reduce((sum, r) => sum + r.count, 0);
      return { results, total };
    }

    // ===== アプリ状態 =====
    let state = {
      patterns: [],
      view: 'list',
      selectedPattern: null,
      searchQuery: '',
      categoryFilter: 'すべて',
      sortBy: 'newest',
      // フォーム
      title: '',
      lineInput: '',
      parsedLines: [],
      lineTactics: {},
      lineAdvantages: {},
      lineSituations: {},
      honmei: 1,
      bets: '',
      memo: ''
    };

    // ===== ストレージ =====
    function loadPatterns() {
      try {
        const data = localStorage.getItem('brain-patterns');
        if (data) {
          state.patterns = JSON.parse(data);
        }
      } catch (e) {
        console.error('Load failed:', e);
      }
    }

    function savePatterns() {
      try {
        localStorage.setItem('brain-patterns', JSON.stringify(state.patterns));
      } catch (e) {
        console.error('Save failed:', e);
      }
    }

    // ===== ユーティリティ =====
    function generateId() {
      return `pattern-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
    }

    // debounce: 入力が止まってから実行
    let debounceTimer = null;
    function debounceRender(delay = 500) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        render();
      }, delay);
    }

    function getCategory(title) {
      if (title.includes('2分')) return '2分戦';
      if (title.includes('3分')) return '3分戦';
      if (title.includes('4分')) return '4分戦';
      if (title.includes('細切れ')) return '細切れ';
      return 'その他';
    }

    function parseLines(lineInput) {
      if (!lineInput.trim()) return [];
      return lineInput.split('-').map((line, idx) => ({
        id: idx,
        positions: line.split('').map(Number).filter(n => !isNaN(n))
      }));
    }

    function resetForm() {
      state.title = '';
      state.lineInput = '';
      state.parsedLines = [];
      state.lineTactics = {};
      state.lineAdvantages = {};
      state.lineSituations = {};
      state.honmei = 1;
      state.bets = '';
      state.memo = '';
    }

    // ===== フィルター・ソート =====
    function getFilteredPatterns() {
      return state.patterns
        .filter(p => {
          if (state.categoryFilter !== 'すべて' && p.category !== state.categoryFilter) return false;
          if (state.searchQuery && 
              !p.title.toLowerCase().includes(state.searchQuery.toLowerCase()) &&
              !p.memo?.toLowerCase().includes(state.searchQuery.toLowerCase())) return false;
          return true;
        })
        .sort((a, b) => {
          if (state.sortBy === 'newest') return new Date(b.createdAt) - new Date(a.createdAt);
          if (state.sortBy === 'oldest') return new Date(a.createdAt) - new Date(b.createdAt);
          if (state.sortBy === 'title') return a.title.localeCompare(b.title);
          return 0;
        });
    }

    function getSimilarPatterns() {
      if (!state.lineInput.trim()) return [];
      const normalizedInput = state.lineInput.trim().toLowerCase();
      return state.patterns.filter(p => {
        if (state.view === 'edit' && state.selectedPattern && p.id === state.selectedPattern.id) return false;
        return p.lineInput.toLowerCase() === normalizedInput || 
               p.lineInput.toLowerCase().includes(normalizedInput) ||
               normalizedInput.includes(p.lineInput.toLowerCase());
      });
    }

    // ===== アクション =====
    function handleSave() {
      if (!state.title.trim() || !state.lineInput.trim() || !state.bets.trim()) {
        alert('タイトル、ライン、買い目は必須です');
        return;
      }

      const newPattern = {
        id: generateId(),
        title: state.title.trim(),
        category: getCategory(state.title),
        lineInput: state.lineInput.trim(),
        lines: state.parsedLines.map((line, idx) => ({
          positions: line.positions,
          tactic: state.lineTactics[idx] || TACTICS[0],
          advantage: state.lineAdvantages[idx] || '◯',
          situations: state.lineSituations[idx] || []
        })),
        honmei: state.honmei,
        bets: state.bets.trim().split('\n').filter(b => b.trim()),
        memo: state.memo.trim(),
        createdAt: new Date().toISOString()
      };

      // 重複タイトル処理
      const existingTitles = state.patterns.map(p => p.title);
      let finalTitle = newPattern.title;
      let counter = 2;
      while (existingTitles.includes(finalTitle)) {
        finalTitle = `${newPattern.title}-${counter}`;
        counter++;
      }
      newPattern.title = finalTitle;

      state.patterns.unshift(newPattern);
      savePatterns();
      resetForm();
      state.view = 'list';
      render();
    }

    function handleUpdate() {
      if (!state.selectedPattern) return;

      const updatedPattern = {
        ...state.selectedPattern,
        title: state.title.trim(),
        category: getCategory(state.title),
        lineInput: state.lineInput.trim(),
        lines: state.parsedLines.map((line, idx) => ({
          positions: line.positions,
          tactic: state.lineTactics[idx] || TACTICS[0],
          advantage: state.lineAdvantages[idx] || '◯',
          situations: state.lineSituations[idx] || []
        })),
        honmei: state.honmei,
        bets: state.bets.trim().split('\n').filter(b => b.trim()),
        memo: state.memo.trim(),
        updatedAt: new Date().toISOString()
      };

      state.patterns = state.patterns.map(p => 
        p.id === state.selectedPattern.id ? updatedPattern : p
      );
      savePatterns();
      state.selectedPattern = updatedPattern;
      state.view = 'detail';
      render();
    }

    function handleDelete(id) {
      if (!confirm('このパターンを削除しますか？')) return;
      state.patterns = state.patterns.filter(p => p.id !== id);
      savePatterns();
      state.view = 'list';
      render();
    }

    function handleEdit(pattern) {
      state.selectedPattern = pattern;
      state.title = pattern.title;
      state.lineInput = pattern.lineInput;
      state.parsedLines = parseLines(pattern.lineInput);
      state.honmei = pattern.honmei;
      state.bets = pattern.bets.join('\n');
      state.memo = pattern.memo || '';
      
      const tactics = {};
      const advantages = {};
      const situations = {};
      pattern.lines.forEach((line, idx) => {
        tactics[idx] = line.tactic;
        advantages[idx] = line.advantage;
        situations[idx] = line.situations;
      });
      state.lineTactics = tactics;
      state.lineAdvantages = advantages;
      state.lineSituations = situations;
      
      state.view = 'edit';
      render();
    }

    function exportData() {
      const dataStr = JSON.stringify(state.patterns, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `brain-patterns-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            state.patterns = [...imported, ...state.patterns];
            savePatterns();
            render();
            alert(`${imported.length}件のパターンをインポートしました`);
          }
        } catch (err) {
          alert('インポートに失敗しました');
        }
      };
      reader.readAsText(file);
    }

    // ===== レンダリング =====
    function render() {
      const app = document.getElementById('app');
      
      if (state.view === 'list') {
        app.innerHTML = renderList();
      } else if (state.view === 'detail') {
        app.innerHTML = renderDetail();
      } else if (state.view === 'input' || state.view === 'edit') {
        app.innerHTML = renderInput();
      }

      attachEventListeners();
    }

    function renderList() {
      const filtered = getFilteredPatterns();
      const categoryStats = {
        '2分戦': state.patterns.filter(p => p.category === '2分戦').length,
        '3分戦': state.patterns.filter(p => p.category === '3分戦').length,
        '4分戦': state.patterns.filter(p => p.category === '4分戦').length,
      };

      return `
        <header class="sticky top-0 z-50 bg-zinc-950/95 backdrop-blur border-b border-zinc-800">
          <div class="max-w-2xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
              <h1 class="text-lg font-medium tracking-wide">
                <span class="text-rose-400">Brain</span>
                <span class="text-zinc-500 ml-2 text-sm font-normal">Pattern Builder</span>
              </h1>
              <div class="flex gap-2">
                <label class="px-3 py-1.5 text-xs text-zinc-400 border border-zinc-700 rounded-lg hover:bg-zinc-800 transition cursor-pointer">
                  Import
                  <input type="file" accept=".json" class="hidden" id="importInput">
                </label>
                <button id="exportBtn" class="px-3 py-1.5 text-xs text-zinc-400 border border-zinc-700 rounded-lg hover:bg-zinc-800 transition">
                  Export
                </button>
                <button id="newBtn" class="px-4 py-1.5 text-sm bg-rose-500/90 text-white rounded-lg hover:bg-rose-500 transition">
                  + 新規
                </button>
              </div>
            </div>
          </div>
        </header>

        <main class="max-w-2xl mx-auto px-4 py-6 pb-24">
          <div class="space-y-4">
            <input
              type="text"
              placeholder="検索..."
              value="${state.searchQuery}"
              id="searchInput"
              class="w-full px-4 py-3 bg-zinc-900 border border-zinc-800 rounded-xl text-sm focus:outline-none focus:border-zinc-600 transition"
            >
            
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
              ${CATEGORIES.map(cat => `
                <button
                  data-category="${cat}"
                  class="category-btn px-3 py-1.5 text-xs rounded-full whitespace-nowrap transition ${
                    state.categoryFilter === cat
                      ? 'bg-rose-500/20 text-rose-400 border border-rose-500/30'
                      : 'bg-zinc-900 text-zinc-500 border border-zinc-800 hover:border-zinc-700'
                  }"
                >
                  ${cat}
                </button>
              `).join('')}
            </div>

            <div class="flex justify-between items-center">
              <span class="text-xs text-zinc-500">${filtered.length} パターン</span>
              <select id="sortSelect" class="text-xs bg-zinc-900 border border-zinc-800 rounded-lg px-2 py-1 text-zinc-400 focus:outline-none">
                <option value="newest" ${state.sortBy === 'newest' ? 'selected' : ''}>新しい順</option>
                <option value="oldest" ${state.sortBy === 'oldest' ? 'selected' : ''}>古い順</option>
                <option value="title" ${state.sortBy === 'title' ? 'selected' : ''}>タイトル順</option>
              </select>
            </div>

            <div class="space-y-2">
              ${filtered.length === 0 ? `
                <div class="text-center py-16 text-zinc-600">
                  <p class="text-4xl mb-4">📋</p>
                  <p class="text-sm">パターンがありません</p>
                  <p class="text-xs mt-1">「+ 新規」から追加してください</p>
                </div>
              ` : filtered.map(pattern => `
                <div
                  data-pattern-id="${pattern.id}"
                  class="pattern-card bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 hover:bg-zinc-900 hover:border-zinc-700 transition cursor-pointer"
                >
                  <div class="flex justify-between items-start mb-2">
                    <h3 class="font-medium">${pattern.title}</h3>
                    <span class="text-xs px-2 py-0.5 bg-zinc-800 text-zinc-500 rounded">
                      ${pattern.category}
                    </span>
                  </div>
                  <div class="text-sm text-zinc-500 mb-2">
                    ライン: ${pattern.lineInput}
                  </div>
                  <div class="text-xs text-zinc-600">
                    買い目: ${pattern.bets.reduce((sum, bet) => sum + countSingleBet(bet), 0)}点
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 bg-zinc-950/95 backdrop-blur border-t border-zinc-800">
          <div class="max-w-2xl mx-auto px-4 py-3 flex justify-around text-center">
            <div>
              <div class="text-xl font-medium text-rose-400">${state.patterns.length}</div>
              <div class="text-xs text-zinc-600">Total</div>
            </div>
            <div>
              <div class="text-xl font-medium">${categoryStats['2分戦']}</div>
              <div class="text-xs text-zinc-600">2分戦</div>
            </div>
            <div>
              <div class="text-xl font-medium">${categoryStats['3分戦']}</div>
              <div class="text-xs text-zinc-600">3分戦</div>
            </div>
            <div>
              <div class="text-xl font-medium">${categoryStats['4分戦']}</div>
              <div class="text-xs text-zinc-600">4分戦</div>
            </div>
          </div>
        </footer>
      `;
    }

    function renderDetail() {
      const p = state.selectedPattern;
      const totalBets = p.bets.reduce((sum, bet) => sum + countSingleBet(bet), 0);

      return `
        <header class="sticky top-0 z-50 bg-zinc-950/95 backdrop-blur border-b border-zinc-800">
          <div class="max-w-2xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
              <button id="backBtn" class="text-zinc-400 hover:text-zinc-200 transition flex items-center gap-1">
                <span>←</span>
                <span class="text-sm">戻る</span>
              </button>
              <h1 class="text-sm text-zinc-400">パターン詳細</h1>
              <div class="w-16"></div>
            </div>
          </div>
        </header>

        <main class="max-w-2xl mx-auto px-4 py-6">
          <div class="space-y-6">
            <div class="bg-zinc-900/50 border border-zinc-800 rounded-xl p-5">
              <div class="flex justify-between items-start mb-4">
                <h2 class="text-xl font-medium">${p.title}</h2>
                <span class="text-xs px-2 py-0.5 bg-zinc-800 text-zinc-500 rounded">
                  ${p.category}
                </span>
              </div>

              <div class="space-y-4">
                <div>
                  <label class="text-xs text-zinc-500 block mb-1">ライン</label>
                  <div class="text-lg font-mono">${p.lineInput}</div>
                </div>

                <div>
                  <label class="text-xs text-zinc-500 block mb-2">各ラインの設定</label>
                  <div class="space-y-2">
                    ${p.lines.map((line, idx) => `
                      <div class="bg-zinc-800/50 rounded-lg p-3">
                        <div class="flex items-center gap-3 mb-2">
                          <span class="font-mono text-rose-400">${line.positions.join('')}</span>
                          <span class="text-sm text-zinc-400">${line.tactic}</span>
                          <span class="text-lg">${line.advantage}</span>
                        </div>
                        ${line.situations.length > 0 ? `
                          <div class="flex flex-wrap gap-1">
                            ${line.situations.map(s => `
                              <span class="text-xs px-2 py-0.5 bg-zinc-700 rounded">${s}</span>
                            `).join('')}
                          </div>
                        ` : ''}
                      </div>
                    `).join('')}
                  </div>
                </div>

                <div>
                  <label class="text-xs text-zinc-500 block mb-1">本命ポジション</label>
                  <div class="text-2xl font-mono text-rose-400">${p.honmei}</div>
                </div>

                <div>
                  <label class="text-xs text-zinc-500 block mb-1">買い目</label>
                  <div class="font-mono text-sm space-y-1">
                    ${p.bets.map(bet => `
                      <div class="flex justify-between text-zinc-300">
                        <span>${bet}</span>
                        <span class="text-zinc-500">${countSingleBet(bet)}点</span>
                      </div>
                    `).join('')}
                  </div>
                  <div class="border-t border-zinc-700 mt-2 pt-2 flex justify-between">
                    <span class="text-sm text-zinc-400">合計</span>
                    <span class="text-lg font-medium text-rose-400">${totalBets}点</span>
                  </div>
                </div>

                ${p.memo ? `
                  <div>
                    <label class="text-xs text-zinc-500 block mb-1">メモ</label>
                    <div class="text-sm text-zinc-400 whitespace-pre-wrap">${p.memo}</div>
                  </div>
                ` : ''}
              </div>
            </div>

            <div class="flex gap-3">
              <button id="editBtn" class="flex-1 py-3 bg-zinc-800 text-zinc-300 rounded-xl hover:bg-zinc-700 transition">
                編集
              </button>
              <button id="deleteBtn" data-id="${p.id}" class="px-6 py-3 border border-zinc-700 text-zinc-500 rounded-xl hover:bg-zinc-900 hover:text-red-400 hover:border-red-400/30 transition">
                削除
              </button>
            </div>
          </div>
        </main>
      `;
    }

    function renderInput() {
      const isEdit = state.view === 'edit';
      const similarPatterns = getSimilarPatterns();
      const betCalc = state.bets.trim() ? countAllBets(state.bets) : null;

      return `
        <header class="sticky top-0 z-50 bg-zinc-950/95 backdrop-blur border-b border-zinc-800">
          <div class="max-w-2xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
              <button id="backBtn" class="text-zinc-400 hover:text-zinc-200 transition flex items-center gap-1">
                <span>←</span>
                <span class="text-sm">戻る</span>
              </button>
              <h1 class="text-sm text-zinc-400">${isEdit ? '編集' : '新規パターン'}</h1>
              <div class="w-16"></div>
            </div>
          </div>
        </header>

        <main class="max-w-2xl mx-auto px-4 py-6">
          <div class="space-y-6">
            <!-- タイトル -->
            <div>
              <label class="text-xs text-zinc-500 block mb-2">タイトル</label>
              <input
                type="text"
                id="titleInput"
                value="${state.title}"
                placeholder="例: 2分戦・先行有利"
                class="w-full px-4 py-3 bg-zinc-900 border border-zinc-800 rounded-xl focus:outline-none focus:border-zinc-600 transition"
              >
            </div>

            <!-- ライン入力 -->
            <div>
              <label class="text-xs text-zinc-500 block mb-2">ライン構成</label>
              <input
                type="text"
                id="lineInput"
                value="${state.lineInput}"
                placeholder="例: 123-4567"
                class="w-full px-4 py-3 bg-zinc-900 border border-zinc-800 rounded-xl font-mono focus:outline-none focus:border-zinc-600 transition"
              >
              <p class="text-xs text-zinc-600 mt-1">ハイフンでライン区切り</p>

              ${similarPatterns.length > 0 ? `
                <div class="mt-3 p-3 bg-amber-500/10 border border-amber-500/30 rounded-xl">
                  <div class="flex items-center gap-2 mb-2">
                    <span class="text-amber-400 text-sm">⚠</span>
                    <span class="text-xs text-amber-400">類似パターン ${similarPatterns.length}件</span>
                  </div>
                  <div class="space-y-2 max-h-40 overflow-y-auto">
                    ${similarPatterns.map(p => `
                      <div
                        data-similar-id="${p.id}"
                        class="similar-pattern flex justify-between items-center p-2 bg-zinc-900/50 rounded-lg cursor-pointer hover:bg-zinc-800 transition"
                      >
                        <div>
                          <div class="text-sm text-zinc-300">${p.title}</div>
                          <div class="text-xs text-zinc-500 font-mono">${p.lineInput}</div>
                        </div>
                        <span class="text-xs text-zinc-500">
                          ${p.bets.reduce((sum, bet) => sum + countSingleBet(bet), 0)}点
                        </span>
                      </div>
                    `).join('')}
                  </div>
                </div>
              ` : ''}
            </div>

            <!-- ライン固定表示 -->
            ${state.lineInput.trim() ? `
              <div class="sticky top-16 z-40 bg-zinc-950/95 backdrop-blur border border-zinc-800 rounded-xl p-3 -mx-1">
                <div class="flex items-center justify-between">
                  <div class="flex items-center gap-2">
                    <span class="text-xs text-zinc-500">ライン:</span>
                    <span class="font-mono text-lg text-rose-400">${state.lineInput}</span>
                  </div>
                  <div class="flex gap-1">
                    ${state.parsedLines.map((line, idx) => `
                      <span class="text-xs px-2 py-1 bg-zinc-800 rounded text-zinc-400">
                        ${state.lineAdvantages[idx] || '◯'} ${line.positions.join('')}
                      </span>
                    `).join('')}
                  </div>
                </div>
              </div>
            ` : ''}

            <!-- 各ラインの設定 -->
            ${state.parsedLines.length > 0 ? `
              <div class="space-y-4">
                <label class="text-xs text-zinc-500 block">各ラインの設定</label>
                ${state.parsedLines.map((line, idx) => `
                  <div class="bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 space-y-3">
                    <div class="flex items-center gap-3">
                      <span class="font-mono text-lg text-rose-400">${line.positions.join('')}</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                      <div>
                        <label class="text-xs text-zinc-600 block mb-1">戦法</label>
                        <select
                          data-line-idx="${idx}"
                          class="tactic-select w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-lg text-sm focus:outline-none"
                        >
                          ${TACTICS.map(t => `<option value="${t}" ${state.lineTactics[idx] === t ? 'selected' : ''}>${t}</option>`).join('')}
                        </select>
                      </div>

                      <div>
                        <label class="text-xs text-zinc-600 block mb-1">優劣</label>
                        <div class="flex gap-1">
                          ${ADVANTAGES.map(a => `
                            <button
                              data-line-idx="${idx}"
                              data-advantage="${a}"
                              class="advantage-btn flex-1 py-2 rounded-lg text-lg transition ${
                                state.lineAdvantages[idx] === a
                                  ? 'bg-rose-500/20 text-rose-400 border border-rose-500/30'
                                  : 'bg-zinc-800 text-zinc-500 border border-zinc-700'
                              }"
                            >
                              ${a}
                            </button>
                          `).join('')}
                        </div>
                      </div>
                    </div>

                    <div>
                      <label class="text-xs text-zinc-600 block mb-2">状況（複数選択可）</label>
                      <div class="flex flex-wrap gap-1.5">
                        ${SITUATIONS.map(s => `
                          <button
                            data-line-idx="${idx}"
                            data-situation="${s}"
                            class="situation-btn px-2 py-1 text-xs rounded-md transition ${
                              (state.lineSituations[idx] || []).includes(s)
                                ? 'bg-rose-500/20 text-rose-400 border border-rose-500/30'
                                : 'bg-zinc-800 text-zinc-500 border border-zinc-700 hover:border-zinc-600'
                            }"
                          >
                            ${s}
                          </button>
                        `).join('')}
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : ''}

            <!-- 本命ポジション -->
            <div>
              <label class="text-xs text-zinc-500 block mb-2">本命ポジション</label>
              <div class="flex gap-1.5">
                ${[1,2,3,4,5,6,7,8,9].map(n => `
                  <button
                    data-honmei="${n}"
                    class="honmei-btn w-10 h-10 rounded-lg font-mono transition ${
                      state.honmei === n
                        ? 'bg-rose-500 text-white'
                        : 'bg-zinc-800 text-zinc-500 border border-zinc-700 hover:border-zinc-600'
                    }"
                  >
                    ${n}
                  </button>
                `).join('')}
              </div>
            </div>

            <!-- 買い目 -->
            <div>
              <label class="text-xs text-zinc-500 block mb-2">買い目</label>
              <textarea
                id="betsInput"
                placeholder="例:
12-124-12345
4-45-4567"
                rows="4"
                class="w-full px-4 py-3 bg-zinc-900 border border-zinc-800 rounded-xl font-mono text-sm focus:outline-none focus:border-zinc-600 transition resize-none"
              >${state.bets}</textarea>

              ${betCalc ? `
                <div class="mt-2 p-3 bg-zinc-900/50 border border-zinc-800 rounded-lg">
                  <div class="space-y-1">
                    ${betCalc.results.map(r => `
                      <div class="flex justify-between text-sm">
                        <span class="font-mono text-zinc-400">${r.bet}</span>
                        <span class="text-zinc-500">${r.count}点</span>
                      </div>
                    `).join('')}
                  </div>
                  <div class="border-t border-zinc-700 mt-2 pt-2 flex justify-between">
                    <span class="text-sm text-zinc-400">合計</span>
                    <span class="text-lg font-medium text-rose-400">${betCalc.total}点</span>
                  </div>
                </div>
              ` : ''}

              <p class="text-xs text-zinc-600 mt-1">1行1フォーメーションで入力</p>
            </div>

            <!-- メモ -->
            <div>
              <label class="text-xs text-zinc-500 block mb-2">メモ（任意）</label>
              <textarea
                id="memoInput"
                placeholder="補足や解説を入力..."
                rows="3"
                class="w-full px-4 py-3 bg-zinc-900 border border-zinc-800 rounded-xl text-sm focus:outline-none focus:border-zinc-600 transition resize-none"
              >${state.memo}</textarea>
            </div>

            <!-- 保存ボタン -->
            <button id="saveBtn" class="w-full py-4 bg-rose-500 text-white rounded-xl font-medium hover:bg-rose-600 transition">
              ${isEdit ? '更新する' : '保存する'}
            </button>
          </div>
        </main>
      `;
    }

    // ===== イベント =====
    function attachEventListeners() {
      // 戻るボタン
      document.getElementById('backBtn')?.addEventListener('click', () => {
        resetForm();
        state.view = 'list';
        state.selectedPattern = null;
        render();
      });

      // 新規ボタン
      document.getElementById('newBtn')?.addEventListener('click', () => {
        resetForm();
        state.view = 'input';
        render();
      });

      // エクスポート
      document.getElementById('exportBtn')?.addEventListener('click', exportData);

      // インポート
      document.getElementById('importInput')?.addEventListener('change', (e) => {
        if (e.target.files[0]) {
          importData(e.target.files[0]);
        }
      });

      // 検索 - debounceで更新
      const searchInputEl = document.getElementById('searchInput');
      searchInputEl?.addEventListener('input', (e) => {
        state.searchQuery = e.target.value;
        debounceRender(300);
      });

      // カテゴリフィルター
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.categoryFilter = btn.dataset.category;
          render();
        });
      });

      // ソート
      document.getElementById('sortSelect')?.addEventListener('change', (e) => {
        state.sortBy = e.target.value;
        render();
      });

      // パターンカード
      document.querySelectorAll('.pattern-card').forEach(card => {
        card.addEventListener('click', () => {
          state.selectedPattern = state.patterns.find(p => p.id === card.dataset.patternId);
          state.view = 'detail';
          render();
        });
      });

      // 編集ボタン
      document.getElementById('editBtn')?.addEventListener('click', () => {
        handleEdit(state.selectedPattern);
      });

      // 削除ボタン
      document.getElementById('deleteBtn')?.addEventListener('click', (e) => {
        handleDelete(e.target.dataset.id);
      });

      // タイトル入力
      document.getElementById('titleInput')?.addEventListener('input', (e) => {
        state.title = e.target.value;
      });

      // ライン入力 - blur時に更新（入力中はキーボード消えない）
      const lineInputEl = document.getElementById('lineInput');
      lineInputEl?.addEventListener('input', (e) => {
        state.lineInput = e.target.value;
        state.parsedLines = parseLines(e.target.value);
        
        // Initialize line settings
        state.parsedLines.forEach((_, idx) => {
          if (!state.lineTactics[idx]) state.lineTactics[idx] = TACTICS[0];
          if (!state.lineAdvantages[idx]) state.lineAdvantages[idx] = '◯';
          if (!state.lineSituations[idx]) state.lineSituations[idx] = [];
        });
        // 入力中は再描画しない
      });
      lineInputEl?.addEventListener('blur', () => {
        render();
      });

      // 類似パターンクリック
      document.querySelectorAll('.similar-pattern').forEach(el => {
        el.addEventListener('click', () => {
          state.selectedPattern = state.patterns.find(p => p.id === el.dataset.similarId);
          state.view = 'detail';
          render();
        });
      });

      // 戦法選択
      document.querySelectorAll('.tactic-select').forEach(select => {
        select.addEventListener('change', (e) => {
          state.lineTactics[e.target.dataset.lineIdx] = e.target.value;
        });
      });

      // 優劣選択
      document.querySelectorAll('.advantage-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.lineAdvantages[btn.dataset.lineIdx] = btn.dataset.advantage;
          render();
        });
      });

      // 状況選択
      document.querySelectorAll('.situation-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = btn.dataset.lineIdx;
          const situation = btn.dataset.situation;
          const current = state.lineSituations[idx] || [];
          
          if (current.includes(situation)) {
            state.lineSituations[idx] = current.filter(s => s !== situation);
          } else {
            state.lineSituations[idx] = [...current, situation];
          }
          render();
        });
      });

      // 本命選択
      document.querySelectorAll('.honmei-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.honmei = parseInt(btn.dataset.honmei);
          render();
        });
      });

      // 買い目入力 - blur時に更新
      const betsInputEl = document.getElementById('betsInput');
      betsInputEl?.addEventListener('input', (e) => {
        state.bets = e.target.value;
        // 入力中は再描画しない
      });
      betsInputEl?.addEventListener('blur', () => {
        render();
      });

      // メモ入力
      document.getElementById('memoInput')?.addEventListener('input', (e) => {
        state.memo = e.target.value;
      });

      // 保存ボタン
      document.getElementById('saveBtn')?.addEventListener('click', () => {
        if (state.view === 'edit') {
          handleUpdate();
        } else {
          handleSave();
        }
      });
    }

    // ===== 初期化 =====
    loadPatterns();
    render();
  </script>
</body>
</html>
