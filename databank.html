<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="robots" content="noindex,nofollow">
<title>Brain Data Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f0f0f;
    --header:#15141a;
    --line:rgba(255,255,255,.08);
    --txt:rgba(255,255,255,.92);
    --sub:rgba(255,255,255,.5);
    --faint:rgba(255,255,255,.3);
    --rose:#d98ca6;
    --rose-soft:#c25f7d;
    --rose-deep:#b04a6a;
    --rose-deepest:#a34862;
    --err:#e0738f;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{background:var(--bg);}
  body{
    background:var(--bg);
    color:var(--txt);
    font-family:'Noto Sans JP',sans-serif;
    min-height:100vh;
    overflow-x:clip;
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }

  /* ===== 共通ロゴ動き ===== */
  @keyframes logoShake{
    0%{transform:translate(0,0);}
    1.5%{transform:translate(-2px,1px);}
    3%{transform:translate(1px,-2px);}
    4.5%{transform:translate(-1px,-1px);}
    6%{transform:translate(2px,1px);}
    7.5%{transform:translate(-1px,2px);}
    9%{transform:translate(1px,-1px);}
    10.5%{transform:translate(-2px,0);}
    12%{transform:translate(1px,1px);}
    13.5%{transform:translate(-1px,-1px);}
    15%{transform:translate(0,0);}
    100%{transform:translate(0,0);}
  }
  @keyframes shakeX{0%,100%{transform:translateX(0);}18%{transform:translateX(-9px);}38%{transform:translateX(9px);}58%{transform:translateX(-6px);}78%{transform:translateX(6px);}}
  @keyframes softPulse{0%,100%{opacity:.42;}50%{opacity:.62;}}

  /* ===== 遷移画面（ブラックアウト） ===== */
  #boot{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:24px;z-index:100;
    transition:opacity .6s ease;
  }
  #boot.hide{opacity:0;pointer-events:none;}
  .boot-logo{
    width:80px;height:80px;display:block;
    opacity:0;transition:opacity .8s ease;
    animation:logoShake 1.4s ease-in-out infinite;
  }
  .boot-logo.in{opacity:.45;}
  .boot-word{
    font-family:'Oswald',sans-serif;font-weight:300;
    font-size:14px;letter-spacing:.05em;
    color:#7c7c7c;
    padding-left:.05em;
    opacity:0;transition:opacity .9s ease .15s;
  }
  .boot-word.in{opacity:1;}

  /* ===== ログイン画面 ===== */
  #login{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px calc(24px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(24px + env(safe-area-inset-left));
    z-index:90;opacity:0;pointer-events:none;
    transition:opacity .55s ease;
  }
  #login.show{opacity:1;pointer-events:auto;}
  #login.leaving{transition:opacity 1.2s ease;}
  .login-logo{width:48px;height:48px;display:block;opacity:.45;margin-bottom:24px;}
  .login-word{
    font-family:'Oswald',sans-serif;font-weight:400;
    font-size:28px;letter-spacing:.02em;color:rgba(255,255,255,.72);
    position:relative;padding-bottom:11px;padding-left:.02em;
  }
  .login-word::after{
    content:'';position:absolute;left:50%;bottom:0;
    transform:translateX(-50%);
    width:30px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,var(--rose-deep),var(--rose));
  }
  .login-sub{
    margin-top:15px;font-size:11.5px;letter-spacing:.2em;
    color:var(--faint);padding-left:.2em;
  }

  /* セグメントPIN（署名要素） */
  .pin{display:flex;gap:12px;margin-top:38px;}
  .pin.error{animation:shakeX .42s ease;}
  .pin input{
    width:52px;height:64px;text-align:center;
    font-family:'Bebas Neue',cursive;font-size:32px;line-height:1;
    color:var(--txt);caret-color:var(--rose);
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.12);
    border-radius:13px;outline:none;
    transition:border-color .2s,box-shadow .2s,background .2s;
  }
  .pin input::-webkit-outer-spin-button,
  .pin input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .pin input.filled{border-color:rgba(217,140,166,.38);background:rgba(217,140,166,.06);}
  .pin input:focus{
    border-color:var(--rose-soft);
    background:rgba(255,255,255,.06);
    box-shadow:0 0 0 3px rgba(194,95,125,.18), 0 0 20px rgba(217,140,166,.22);
  }

  .login-err{
    height:18px;margin-top:18px;
    font-size:12px;letter-spacing:.04em;color:var(--err);
    opacity:0;transition:opacity .2s;
  }
  .login-err.show{opacity:1;}

  /* ===== データバンク ホーム ===== */
  #home{display:none;flex-direction:column;min-height:100vh;background:#0f0f0f;}
  #home.show{display:flex;}

  .db-header{
    background:#0f0f0f;
    border-bottom:1px solid var(--line);
    padding:env(safe-area-inset-top) 16px 0;
    min-height:calc(56px + env(safe-area-inset-top));
    display:flex;align-items:center;justify-content:center;
    position:sticky;top:0;z-index:50;
    transform:translateY(-100%);
    transition:transform .6s cubic-bezier(.4,0,.2,1);
  }
  .db-header .title{
    font-family:'Oswald',sans-serif;font-size:19px;font-weight:400;
    letter-spacing:.03em;color:rgba(255,255,255,.68);
  }

  .db-main{
    flex:1;
    position:relative;
    background:#0f0f0f;
  }
  /* 中央から広がる白ズーム */
  .db-white{
    position:fixed;top:50%;left:50%;
    width:320vmax;height:320vmax;
    transform:translate(-50%,-50%) scale(0);
    transform-origin:center;
    background:radial-gradient(circle, #ffffff 55%, rgba(255,255,255,0) 82%);
    z-index:1;
    transition:transform 2.8s cubic-bezier(.33,0,.3,1);
  }
  /* ===== データバンク 検索UI（白背景＝濃色文字） ===== */
  .db-content{
    position:relative;z-index:2;
    width:100%;max-width:640px;margin:0 auto;
    padding:26px 16px 60px;text-align:left;
    opacity:0;transition:opacity .7s ease;
  }
  .sp-eyebrow{font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:500;letter-spacing:.34em;color:var(--rose-deep);}
  .sp-title{font-family:'Oswald',sans-serif;font-weight:500;font-size:24px;letter-spacing:.01em;color:#1c1c1e;margin:6px 0 4px;}
  .sp-meta{font-size:11px;color:#a0a0a6;letter-spacing:.03em;margin-bottom:24px;}
  .fg{margin-bottom:20px;}
  .fl{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;color:#3a3a3e;margin-bottom:10px;}
  .fl-sub{font-size:10px;font-weight:400;color:#a0a0a6;margin-left:7px;letter-spacing:0;}
  .date-row{display:flex;align-items:center;gap:10px;}
  .date-row input{flex:1;min-width:0;background:#fff;border:1px solid rgba(0,0,0,.14);border-radius:10px;padding:10px 12px;color:#1c1c1e;font-family:inherit;font-size:13px;color-scheme:light;}
  .date-row input:focus{outline:none;border-color:var(--rose-soft);box-shadow:0 0 0 3px rgba(194,95,125,.12);}
  .date-row .tilde{color:#bbb;flex:none;}
  .presets{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .preset{font-size:11px;padding:6px 12px;border-radius:14px;background:#f3f3f4;border:1px solid rgba(0,0,0,.08);color:#6a6a70;cursor:pointer;transition:all .15s;}
  .preset:active{transform:scale(.97);}
  .preset.on{background:rgba(217,140,166,.15);border-color:var(--rose-soft);color:var(--rose-deep);font-weight:700;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chips.scroll{max-height:150px;overflow-y:auto;padding:4px;margin:-4px;}
  .chip{font-size:12px;padding:6px 12px;border-radius:16px;background:#f3f3f4;border:1px solid rgba(0,0,0,.08);color:#6a6a70;cursor:pointer;transition:all .15s;user-select:none;-webkit-user-select:none;}
  .chip:active{transform:scale(.97);}
  .chip.on{background:rgba(217,140,166,.15);border-color:var(--rose-soft);color:var(--rose-deep);font-weight:700;}
  .seg{display:inline-flex;border:1px solid rgba(0,0,0,.12);border-radius:10px;overflow:hidden;}
  .seg button{font-family:inherit;font-size:12px;padding:8px 17px;background:#fff;border:none;color:#6a6a70;cursor:pointer;border-right:1px solid rgba(0,0,0,.1);}
  .seg button:last-child{border-right:none;}
  .seg button.on{background:rgba(217,140,166,.15);color:var(--rose-deep);font-weight:700;}
  .search-btn{width:100%;margin-top:6px;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--rose-deep),var(--rose-soft));color:#fff;font-family:'Oswald',sans-serif;font-size:15px;font-weight:500;letter-spacing:.1em;cursor:pointer;box-shadow:0 6px 18px rgba(176,74,106,.28);transition:filter .15s,transform .1s;}
  .search-btn:active{transform:scale(.99);}
  /* 結果 */
  .res-bar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;}
  .res-count{font-size:13px;color:#3a3a3e;}
  .res-count b{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--rose-deep);letter-spacing:.02em;margin-right:4px;vertical-align:-2px;}
  .res-back{font-size:12px;color:#6a6a70;cursor:pointer;border:1px solid rgba(0,0,0,.12);border-radius:14px;padding:5px 13px;}
  .res-back:active{transform:scale(.97);}
  .res-note{font-size:11px;color:#a0a0a6;margin:10px 0 16px;line-height:1.6;border-top:1px solid rgba(0,0,0,.07);padding-top:12px;}
  .preview-banner{font-size:11px;color:var(--rose-deep);background:rgba(217,140,166,.1);border:1px solid rgba(217,140,166,.3);border-radius:9px;padding:9px 12px;margin-bottom:16px;line-height:1.6;}
  .race{background:#fafafa;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:13px 14px;margin-bottom:9px;}
  .race-h{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:8px;}
  .race-date{font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:.04em;color:#2a2a2e;}
  .race-venue{font-size:13px;font-weight:700;color:#1c1c1e;}
  .race-no{font-size:11px;font-weight:700;color:var(--rose-deep);border:1px solid rgba(176,74,106,.4);border-radius:9px;padding:1px 7px;}
  .race-tag{font-size:10.5px;color:#7a7a80;background:#efefef;border-radius:7px;padding:2px 8px;}
  .race-tag.girls{color:var(--rose-deep);background:rgba(217,140,166,.13);}
  .race-line{font-size:12px;line-height:1.75;display:flex;gap:9px;}
  .race-line .k{color:#9a9a9e;min-width:46px;flex:none;}
  .race-line .v{color:#2a2a2e;}
  .race-line .v .mk{color:var(--rose-deep);font-weight:700;}
  .race-line .yen{font-weight:700;color:#1c1c1e;}
  .res-empty{text-align:center;color:#8a8a90;font-size:13px;padding:46px 16px;line-height:1.8;}
  .res-loading{text-align:center;color:#8a8a90;font-size:13px;padding:34px 0;}

  /* 演出ステート */
  #home.bars-in .db-header{transform:translateY(0);}
  #home.bars-in .db-footer{transform:translateY(0);}
  #home.white-in .db-white{transform:translate(-50%,-50%) scale(1);}
  #home.content-in .db-content{opacity:1;}
  /* アンロック済みの直接表示（演出なしで最終状態） */
  #home.settled .db-header,#home.settled .db-footer{transform:none;transition:none;}
  #home.settled .db-white{transform:translate(-50%,-50%) scale(1);transition:none;}
  #home.settled .db-content{opacity:1;transition:none;}

  /* ===== フッター（gpt流用） ===== */
  .db-footer{
    background:#0f0f0f;
    border-top:1px solid var(--line);
    padding:22px 20px;
    padding-bottom:max(26px, env(safe-area-inset-bottom));
    position:relative;z-index:50;
    transform:translateY(100%);
    transition:transform .6s cubic-bezier(.4,0,.2,1);
  }
  .db-footer .brand{
    text-align:center;
    font-family:'Oswald',sans-serif;font-size:15px;font-weight:400;
    letter-spacing:.04em;color:rgba(255,255,255,.72);
    margin-bottom:7px;padding-left:.04em;
  }
  .db-footer .brand::after{
    content:'';display:block;width:28px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,var(--rose-deep),var(--rose));
    margin:8px auto 0;opacity:.85;
  }
  .db-divider{height:1px;background:rgba(255,255,255,.1);margin:0 0 16px;}
  .db-nav{display:flex;justify-content:center;flex-wrap:wrap;gap:26px;margin-bottom:16px;}
  .db-nav a,.db-nav span{
    font-size:12px;color:rgba(255,255,255,.5);
    text-decoration:none;cursor:pointer;transition:color .2s;
  }
  .db-nav a:hover,.db-nav span:hover{color:rgba(255,255,255,.8);}
  .db-copy{text-align:center;font-size:10px;letter-spacing:.05em;color:rgba(255,255,255,.35);}

  @media (prefers-reduced-motion:reduce){
    .boot-logo,.db-content img{animation:none;}
    #boot,#login,.pin input{transition:none;}
  }
</style>
</head>
<body>

<!-- ① 遷移画面 -->
<div id="boot">
  <img class="boot-logo" data-logo alt="Brain">
  <div class="boot-word">Brain Data Bank</div>
</div>

<!-- ② ログイン画面 -->
<div id="login">
  <img class="login-logo" data-logo alt="Brain">
  <div class="login-word">Brain Data Bank</div>
  <div class="login-sub">競輪レースデータ検索</div>
  <div class="pin" id="pin">
    <input type="tel" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="パスコード1桁目">
    <input type="tel" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="パスコード2桁目">
    <input type="tel" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="パスコード3桁目">
    <input type="tel" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="パスコード4桁目">
  </div>
  <div class="login-err" id="loginErr">パスコードが違います</div>
</div>

<!-- ③ データバンク ホーム -->
<div id="home">
  <header class="db-header">
    <span class="title">Brain Data Bank</span>
  </header>

  <main class="db-main">
    <div class="db-white"></div>
    <div class="db-content">
      <!-- 検索パネル -->
      <section class="sp" id="searchPanel">
        <div class="sp-eyebrow">RACE DATABANK</div>
        <h1 class="sp-title">過去レース検索</h1>
        <div class="sp-meta">2022.04 – 2026.06 ・ 113,090 レース</div>

        <div class="fg">
          <label class="fl">開催日</label>
          <div class="date-row">
            <input type="date" id="dFrom" min="2022-04-28" max="2026-06-15">
            <span class="tilde">〜</span>
            <input type="date" id="dTo" min="2022-04-28" max="2026-06-15">
          </div>
          <div class="presets" id="presets">
            <span class="preset" data-p="1m">直近1ヶ月</span>
            <span class="preset" data-p="2026">2026年</span>
            <span class="preset" data-p="all">全期間</span>
          </div>
        </div>

        <div class="fg">
          <label class="fl">競輪場 <span class="fl-sub">未選択＝全場</span></label>
          <div class="chips scroll" id="venueChips"></div>
        </div>

        <div class="fg">
          <label class="fl">グレード <span class="fl-sub">未選択＝全グレード</span></label>
          <div class="chips" id="gradeChips"></div>
        </div>

        <div class="fg">
          <label class="fl">ライン構成 <span class="fl-sub">未選択＝全構成</span></label>
          <div class="chips" id="lineChips"></div>
        </div>

        <div class="fg">
          <label class="fl">ガールズ（L級）</label>
          <div class="seg" id="girlsSeg">
            <button data-v="off" class="on">除外</button>
            <button data-v="only">のみ</button>
            <button data-v="all">含む</button>
          </div>
        </div>

        <div class="fg">
          <label class="fl">表示項目</label>
          <div class="chips" id="fieldChips"></div>
        </div>

        <button class="search-btn" id="searchBtn">検索する</button>
      </section>

      <!-- 結果 -->
      <section class="res" id="resultPanel" hidden>
        <div class="res-bar">
          <span class="res-count" id="resCount"></span>
          <span class="res-back" id="resBack">条件に戻る</span>
        </div>
        <div id="resBody"></div>
      </section>
    </div>
  </main>

  <footer class="db-footer">
    <div class="brand">Brain Data Bank</div>
    <div class="db-divider"></div>
    <nav class="db-nav">
      <span id="toTop">ページ上部へ</span>
      <a href="https://note.com/qa/brainkeirin" target="_blank" rel="noopener">ご要望はコチラ</a>
    </nav>
    <div class="db-copy">Brain 競輪レースデータ検索</div>
  </footer>
</div>

            +(rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))
            +w[i3-7]
            +(rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10))
          )|0
        );
      var temp2=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))
        +((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(temp1+temp2)|0].concat(hash);
      hash[4]=(hash[4]+temp1)|0;
    }
    for(var i4=0;i4<8;i4++){hash[i4]=(hash[i4]+oldHash[i4])|0;}
  }
  for(var i5=0;i5<8;i5++){
    for(var j3=3;j3+1;j3--){
      var b=(hash[i5]>>(j3*8))&255;
      result+=((b<16)?0:'')+b.toString(16);
    }
  }
  return result;
}

async function sha256hex(msg){
  try{
    if(window.crypto && crypto.subtle){
      const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
      return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    }
  }catch(e){}
  return sha256sync(msg);
}

/* ===== 画面要素 ===== */
const boot=document.getElementById('boot');
const login=document.getElementById('login');
const home=document.getElementById('home');
const bootLogo=boot.querySelector('.boot-logo');
const bootWord=boot.querySelector('.boot-word');
const pin=document.getElementById('pin');
const inputs=[...pin.querySelectorAll('input')];
const loginErr=document.getElementById('loginErr');

/* ===== セッション内のアンロック状態 ===== */
function getUnlocked(){ try{ return sessionStorage.getItem('db_unlock')==='1'; }catch(e){ return false; } }
function setUnlocked(){ try{ sessionStorage.setItem('db_unlock','1'); }catch(e){} }

/* ===== 起動フロー ===== */
window.addEventListener('load', ()=>{
  if(getUnlocked()){
    boot.classList.add('hide');
    boot.style.display='none';
    home.classList.add('show','settled');
    return;
  }
  runBoot();
});

function runBoot(){
  setTimeout(()=>bootLogo.classList.add('in'), 120);
  setTimeout(()=>bootWord.classList.add('in'), 480);
  setTimeout(()=>{
    boot.classList.add('hide');
    setTimeout(()=>{ boot.style.display='none'; }, 600);
    login.classList.add('show');
    setTimeout(()=>inputs[0].focus(), 250);
  }, 3000);
}

/* ===== PIN 入力挙動 ===== */
inputs.forEach((inp, idx)=>{
  inp.addEventListener('input', ()=>{
    inp.value=inp.value.replace(/[^0-9]/g,'').slice(0,1);
    inp.classList.toggle('filled', inp.value!=='');
    clearError();
    if(inp.value && idx<inputs.length-1) inputs[idx+1].focus();
    if(allFilled()) verify();
  });
  inp.addEventListener('keydown', (e)=>{
    if(e.key==='Backspace' && !inp.value && idx>0){
      inputs[idx-1].focus();
      inputs[idx-1].value='';
      inputs[idx-1].classList.remove('filled');
    }
    if(e.key==='Enter' && allFilled()) verify();
  });
  inp.addEventListener('paste', (e)=>{
    e.preventDefault();
    const digits=(e.clipboardData.getData('text')||'').replace(/[^0-9]/g,'').slice(0,inputs.length);
    if(!digits) return;
    inputs.forEach((c,i)=>{ c.value=digits[i]||''; c.classList.toggle('filled', !!digits[i]); });
    (inputs[digits.length] || inputs[inputs.length-1]).focus();
    if(allFilled()) verify();
  });
});

function allFilled(){ return inputs.every(i=>i.value!==''); }
function code(){ return inputs.map(i=>i.value).join(''); }
function clearError(){ loginErr.classList.remove('show'); }

let checking=false;
async function verify(){
  if(checking) return;
  checking=true;
  const h=await sha256hex(code());
  if(h===PASS_HASH){
    onSuccess();
  }else{
    onError();
    checking=false;
  }
}

function onError(){
  loginErr.classList.add('show');
  pin.classList.remove('error');
  void pin.offsetWidth;            /* リフロー強制でアニメ再生 */
  pin.classList.add('error');
  inputs.forEach(i=>{ i.value=''; i.classList.remove('filled'); });
  setTimeout(()=>inputs[0].focus(), 120);
}

function onSuccess(){
  setUnlocked();
  inputs.forEach(i=>i.blur());
  login.classList.add('leaving');               // フェードアウトをゆっくりに
  login.classList.remove('show');               // ① 文字・ロゴ・入力窓をゆっくり完全フェードアウト
  setTimeout(()=>{
    login.style.display='none';
    runHomeIntro();                             // → 画面全体ダークグレーのみ
  }, 1300);
}

/* ログイン→ホームの演出シーケンス（t=0：完全ダークグレー） */
function runHomeIntro(){
  home.classList.add('show');                                  // t=0 ダークグレー全面
  setTimeout(()=>home.classList.add('bars-in'), 1000);         // +1.0s ヘッダー上→/フッター下→ 同時スライドイン
  setTimeout(()=>home.classList.add('white-in'), 2400);        // +2.4s 中央から白ズームイン（2.8秒かけてゆっくり、境目ぼかし）
  setTimeout(()=>home.classList.add('content-in'), 5300);      // 白充填後 コンテンツ(ロゴ＋案内文)フェードイン
}

  var sel={grades:new Set(),lines:new Set(),venues:new Set(),girls:'off',fields:new Set(DEFAULT_FIELDS)};
  var YEAR_CACHE={}, usedSample=false;
  var $=function(id){return document.getElementById(id);};

  /* ---- チップ生成 ---- */
  function mkChip(label,on,toggle){
    var b=document.createElement('span');
    b.className='chip'+(on?' on':''); b.textContent=label;
    b.addEventListener('click',function(){ b.classList.toggle('on'); toggle(b.classList.contains('on')); });
    return b;
  }
  function buildChips(){
    var vc=$('venueChips');
    VENUES.forEach(function(v){ vc.appendChild(mkChip(v,false,function(on){ on?sel.venues.add(v):sel.venues.delete(v); })); });
    var gc=$('gradeChips');
    GRADE_ORDER.forEach(function(g){ gc.appendChild(mkChip(GRADE_LABEL[g],false,function(on){ on?sel.grades.add(g):sel.grades.delete(g); })); });
    var lc=$('lineChips');
    LINES.forEach(function(l){ lc.appendChild(mkChip(l,false,function(on){ on?sel.lines.add(l):sel.lines.delete(l); })); });
    var fc=$('fieldChips');
    FIELD_DEFS.forEach(function(f){ var on=sel.fields.has(f[0]); fc.appendChild(mkChip(f[1],on,function(o){ o?sel.fields.add(f[0]):sel.fields.delete(f[0]); })); });
    /* ガールズ セグメント */
    [].forEach.call($('girlsSeg').querySelectorAll('button'),function(btn){
      btn.addEventListener('click',function(){
        [].forEach.call($('girlsSeg').querySelectorAll('button'),function(b){b.classList.remove('on');});
        btn.classList.add('on'); sel.girls=btn.getAttribute('data-v');
      });
    });
    /* プリセット */
    [].forEach.call($('presets').querySelectorAll('.preset'),function(p){
      p.addEventListener('click',function(){ applyPreset(p.getAttribute('data-p'), p); });
    });
  }

  function fmtDate(d){ return d.toISOString().slice(0,10); }
  function applyPreset(kind, el){
    [].forEach.call($('presets').querySelectorAll('.preset'),function(p){p.classList.remove('on');});
    if(el) el.classList.add('on');
    if(kind==='1m'){ var to=new Date(DATA_MAX), from=new Date(DATA_MAX); from.setMonth(from.getMonth()-1);
      $('dFrom').value=fmtDate(from); $('dTo').value=DATA_MAX; }
    else if(kind==='2026'){ $('dFrom').value='2026-01-01'; $('dTo').value=DATA_MAX; }
    else { $('dFrom').value=DATA_MIN; $('dTo').value=DATA_MAX; }
  }

  /* ---- データ読み込み（年シャード／失敗時サンプル） ---- */
  function loadYear(y){
    if(YEAR_CACHE[y]) return Promise.resolve(YEAR_CACHE[y]);
    return fetch(DATA_BASE+'races-'+y+'.json').then(function(r){
      if(!r.ok) throw new Error('not found'); return r.json();
    }).then(function(j){ YEAR_CACHE[y]=j; return j; });
  }
  function ci(cols){ var m={}; cols.forEach(function(c,i){m[c]=i;}); return m; }

  /* ---- 検索 ---- */
  function runSearch(){
    var from=$('dFrom').value||DATA_MIN, to=$('dTo').value||DATA_MAX;
    if(from>to){ var t=from; from=to; to=t; }
    var y0=+from.slice(0,4), y1=+to.slice(0,4), years=[];
    for(var y=y0;y<=y1;y++) years.push(y);
    showResults(); $('resBody').innerHTML='<div class="res-loading">読み込み中…</div>';
    $('resCount').innerHTML='';
    usedSample=false;
    Promise.all(years.map(loadYear)).then(function(sets){
      finish(sets, from, to);
    }).catch(function(){
      usedSample=true; finish([EMBEDDED], from, to);
    });
  }

  function finish(sets, from, to){
    var matched=[];
    sets.forEach(function(ds){
      var c=ci(ds.cols), rows=ds.rows;
      for(var i=0;i<rows.length;i++){
        var r=rows[i], d=r[c.date];
        if(d<from||d>to) continue;
        if(sel.venues.size && !sel.venues.has(r[c.venue])) continue;
        if(sel.grades.size && !sel.grades.has(r[c.grade])) continue;
        if(sel.lines.size && !sel.lines.has(r[c.line_type])) continue;
        var cls=r[c.race_class];
        if(sel.girls==='off' && cls==='L級') continue;
        if(sel.girls==='only' && cls!=='L級') continue;
        matched.push({r:r,c:c});
      }
    });
    matched.sort(function(a,b){
      var da=a.r[a.c.date], db=b.r[b.c.date];
      if(da!==db) return da<db?1:-1;
      if(a.r[a.c.venue]!==b.r[b.c.venue]) return a.r[a.c.venue]<b.r[b.c.venue]?-1:1;
      return a.r[a.c.race_no]-b.r[b.c.race_no];
    });
    render(matched);
  }

  function yen(n){ return (n==null)?'-':Number(n).toLocaleString('ja-JP'); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,function(x){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[x];}); }

  function raceHTML(m){
    var r=m.r, c=m.c, cls=r[c.race_class], isG=(cls==='L級');
    var tags='<span class="race-tag">'+esc(GRADE_LABEL[r[c.grade]]||'')+'</span>'
           +'<span class="race-tag'+(isG?' girls':'')+'">'+esc(cls)+'</span>'
           +'<span class="race-tag">'+esc(r[c.line_type])+'</span>';
    var h='<div class="race"><div class="race-h">'
        +'<span class="race-date">'+esc(r[c.date])+'</span>'
        +'<span class="race-venue">'+esc(r[c.venue])+'</span>'
        +'<span class="race-no">'+esc(r[c.race_no])+'R</span>'+tags+'</div>';
    function row(k,v){ return '<div class="race-line"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>'; }
    if(sel.fields.has('result')){
      var res=(r[c.result]||[]).join('-');
      h+=row('着順', esc(res));
    }
    if(sel.fields.has('ai')){
      h+=row('AI印','<span class="mk">◎</span>'+esc(r[c.ai_h])+' <span class="mk">○</span>'+esc(r[c.ai_t])
            +' <span class="mk">▲</span>'+esc(r[c.ai_n])+' <span class="mk">△</span>'+esc(r[c.ai_r]));
    }
    if(sel.fields.has('tri')){
      h+=row('3連単', esc(r[c.tri_combo])+' <span class="yen">'+yen(r[c.tri_yen])+'円</span> ('+esc(r[c.tri_ninki])+'人気)');
    }
    if(sel.fields.has('trio')){
      h+=row('3連複', esc(r[c.trio_combo])+' <span class="yen">'+yen(r[c.trio_yen])+'円</span> ('+esc(r[c.trio_ninki])+'人気)');
    }
    if(sel.fields.has('exa')){
      h+=row('2車単', esc(r[c.exa_combo])+' <span class="yen">'+yen(r[c.exa_yen])+'円</span> ('+esc(r[c.exa_ninki])+'人気)');
    }
    if(sel.fields.has('kimarite')){
      var k=esc(r[c.kimarite_1]||'')+(r[c.kimarite_2]?' / '+esc(r[c.kimarite_2]):'');
      h+=row('決まり手', k||'-');
    }
    return h+'</div>';
  }

  function render(matched){
    var total=matched.length, body=$('resBody');
    $('resCount').innerHTML='<b>'+total.toLocaleString('ja-JP')+'</b>件';
    if(total===0){ body.innerHTML='<div class="res-empty">該当するレースがありません。<br>条件をゆるめて再検索してください。</div>'; return; }
    var html='';
    if(usedSample) html+='<div class="preview-banner">プレビュー（サンプル）表示中です。年別データを配置すると全レースを検索できます。</div>';
    if(total>RENDER_CAP) html+='<div class="res-note">直近 '+RENDER_CAP+' 件を表示しています（全 '+total.toLocaleString('ja-JP')+' 件ヒット）。期間や競輪場で絞り込むと全件を確認できます。</div>';
    var lim=Math.min(total,RENDER_CAP);
    for(var i=0;i<lim;i++) html+=raceHTML(matched[i]);
    body.innerHTML=html;
    document.querySelector('.db-main').scrollIntoView({block:'start'});
  }

  function showResults(){ $('searchPanel').hidden=true; $('resultPanel').hidden=false; }
  function showSearch(){ $('resultPanel').hidden=true; $('searchPanel').hidden=false; }

  function init(){
    if(!$('searchPanel')) return;
    buildChips();
    applyPreset('1m', $('presets').querySelector('[data-p="1m"]'));
    $('searchBtn').addEventListener('click', runSearch);
    $('resBack').addEventListener('click', showSearch);
  }
  init();
})();

  window.scrollTo({top:0, behavior:'smooth'});
