<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="robots" content="noindex,nofollow">
<title>Brain Data Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f0f0f;
    --header:#15141a;
    --line:rgba(255,255,255,.08);
    --txt:rgba(255,255,255,.92);
    --sub:rgba(255,255,255,.5);
    --faint:rgba(255,255,255,.3);
    --rose:#d98ca6;
    --rose-soft:#c25f7d;
    --rose-deep:#b04a6a;
    --rose-deepest:#a34862;
    --err:#e0738f;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{background:var(--bg);}
  body{
    background:var(--bg);
    color:var(--txt);
    font-family:'Noto Sans JP',sans-serif;
    min-height:100vh;
    overflow-x:clip;
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }

  /* ===== 共通ロゴ動き ===== */
  @keyframes floatY{0%,100%{transform:translateY(-7px);}50%{transform:translateY(8px);}}
  @keyframes shakeX{0%,100%{transform:translateX(0);}18%{transform:translateX(-9px);}38%{transform:translateX(9px);}58%{transform:translateX(-6px);}78%{transform:translateX(6px);}}
  @keyframes softPulse{0%,100%{opacity:.42;}50%{opacity:.62;}}

  /* ===== 遷移画面（ブラックアウト） ===== */
  #boot{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:24px;z-index:100;
    transition:opacity .6s ease;
  }
  #boot.hide{opacity:0;pointer-events:none;}
  .boot-logo{
    width:80px;height:80px;display:block;
    opacity:0;transition:opacity .8s ease;
    animation:floatY 3.6s ease-in-out infinite;
    filter:drop-shadow(0 8px 22px rgba(0,0,0,.5));
  }
  .boot-logo.in{opacity:.5;}
  .boot-word{
    font-family:'Oswald',sans-serif;font-weight:300;
    font-size:14px;letter-spacing:.05em;
    color:#7c7c7c;
    padding-left:.05em;
    opacity:0;transition:opacity .9s ease .15s;
  }
  .boot-word.in{opacity:1;}

  /* ===== ログイン画面 ===== */
  #login{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px calc(24px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(24px + env(safe-area-inset-left));
    z-index:90;opacity:0;pointer-events:none;
    transition:opacity .55s ease;
  }
  #login.show{opacity:1;pointer-events:auto;}
  .login-logo{width:48px;height:48px;display:block;opacity:.5;margin-bottom:24px;}
  .login-word{
    font-family:'Oswald',sans-serif;font-weight:400;
    font-size:28px;letter-spacing:.02em;color:rgba(255,255,255,.72);
    position:relative;padding-bottom:11px;padding-left:.02em;
  }
  .login-word::after{
    content:'';position:absolute;left:50%;bottom:0;
    transform:translateX(-50%);
    width:30px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,var(--rose-deep),var(--rose));
  }
  .login-sub{
    margin-top:15px;font-size:11.5px;letter-spacing:.2em;
    color:var(--faint);padding-left:.2em;
  }

  /* セグメントPIN（署名要素） */
  .pin{display:flex;gap:12px;margin-top:38px;}
  .pin.error{animation:shakeX .42s ease;}
  .pin input{
    width:52px;height:64px;text-align:center;
    font-family:'Bebas Neue',cursive;font-size:32px;line-height:1;
    color:var(--txt);caret-color:var(--rose);
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.12);
    border-radius:13px;outline:none;
    transition:border-color .2s,box-shadow .2s,background .2s;
  }
  .pin input::-webkit-outer-spin-button,
  .pin input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .pin input.filled{border-color:rgba(217,140,166,.38);background:rgba(217,140,166,.06);}
  .pin input:focus{
    border-color:var(--rose-soft);
    background:rgba(255,255,255,.06);
    box-shadow:0 0 0 3px rgba(194,95,125,.18), 0 0 20px rgba(217,140,166,.22);
  }

  .login-err{
    height:18px;margin-top:18px;
    font-size:12px;letter-spacing:.04em;color:var(--err);
    opacity:0;transition:opacity .2s;
  }
  .login-err.show{opacity:1;}

  /* ===== データバンク ホーム ===== */
  #home{display:none;flex-direction:column;min-height:100vh;}
  #home.show{display:flex;}

  .db-header{
    background:#0f0f0f;
    border-bottom:1px solid var(--line);
    padding:env(safe-area-inset-top) 16px 0;
    min-height:calc(56px + env(safe-area-inset-top));
    display:flex;align-items:center;justify-content:center;
    position:sticky;top:0;z-index:50;
  }
  .db-header .title{
    font-family:'Oswald',sans-serif;font-size:19px;font-weight:400;
    letter-spacing:.03em;color:rgba(255,255,255,.68);
  }

  .db-main{
    flex:1;
    background:#ffffff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:16px;
    padding:72px 24px;
  }
  .db-main img{width:50px;height:50px;display:block;animation:softPulse 3s ease-in-out infinite;}
  .db-soon{font-size:15px;font-weight:500;letter-spacing:.08em;color:#4a4a4a;}
  .db-soon-sub{font-size:11.5px;letter-spacing:.05em;color:#9a9a9a;line-height:1.7;}

  /* ===== フッター（gpt流用） ===== */
  .db-footer{
    background:#0f0f0f;
    border-top:1px solid var(--line);
    padding:22px 20px;
    padding-bottom:max(26px, env(safe-area-inset-bottom));
  }
  .db-footer .brand{
    text-align:center;
    font-family:'Oswald',sans-serif;font-size:15px;font-weight:400;
    letter-spacing:.04em;color:rgba(255,255,255,.72);
    margin-bottom:7px;padding-left:.04em;
  }
  .db-footer .brand::after{
    content:'';display:block;width:28px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,var(--rose-deep),var(--rose));
    margin:8px auto 0;opacity:.85;
  }
  .db-divider{height:1px;background:rgba(255,255,255,.1);margin:0 0 16px;}
  .db-nav{display:flex;justify-content:center;flex-wrap:wrap;gap:26px;margin-bottom:16px;}
  .db-nav a,.db-nav span{
    font-size:12px;color:rgba(255,255,255,.5);
    text-decoration:none;cursor:pointer;transition:color .2s;
  }
  .db-nav a:hover,.db-nav span:hover{color:rgba(255,255,255,.8);}
  .db-copy{text-align:center;font-size:10px;letter-spacing:.05em;color:rgba(255,255,255,.35);}

  @media (prefers-reduced-motion:reduce){
    .boot-logo,.db-main img{animation:none;}
    #boot,#login,.pin input{transition:none;}
  }
</style>
</head>
<body>

<!-- ① 遷移画面 -->
<div id="boot">
  <img class="boot-logo" data-logo alt="Brain">
  <div class="boot-word">Brain Data Bank</div>
</div>

<!-- ② ログイン画面 -->
<div id="login">
  <img class="login-logo" data-logo alt="Brain">
  <div class="login-word">Brain Data Bank</div>
  <div class="login-sub">競輪レースデータ検索</div>
  <div class="pin" id="pin">
    <input type="tel" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="パスコード1桁目">
    <input type="tel" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="パスコード2桁目">
    <input type="tel" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="パスコード3桁目">
    <input type="tel" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="パスコード4桁目">
  </div>
  <div class="login-err" id="loginErr">パスコードが違います</div>
</div>

<!-- ③ データバンク ホーム -->
<div id="home">
  <header class="db-header">
    <span class="title">Brain Data Bank</span>
  </header>

  <main class="db-main">
    <img data-logo alt="Brain">
    <div class="db-soon">現在製作中です</div>
    <div class="db-soon-sub">レースデータ検索機能は順次公開予定</div>
  </main>

  <footer class="db-footer">
    <div class="brand">Brain Data Bank</div>
    <div class="db-divider"></div>
    <nav class="db-nav">
      <span id="toTop">ページ上部へ</span>
      <a href="https://note.com/qa/brainkeirin" target="_blank" rel="noopener">ご要望はコチラ</a>
    </nav>
    <div class="db-copy">Brain 競輪レースデータ検索</div>
  </footer>
</div>

/* ===== パスコード照合（難読化：平文を持たずハッシュ比較） ===== */
const PASS_HASH='8c244b370747c1930a4e0967254778ddbb69f6a409e62beebe5f92191a09a3a1';

function sha256sync(ascii){
  function rightRotate(value,amount){return (value>>>amount)|(value<<(32-amount));}
  var mathPow=Math.pow, maxWord=mathPow(2,32);
  var result='', words=[], asciiBitLength=ascii.length*8;
  var hash=sha256sync.h=sha256sync.h||[];
  var k=sha256sync.k=sha256sync.k||[];
  var primeCounter=k.length, isComposite={};
  for(var candidate=2;primeCounter<64;candidate++){
    if(!isComposite[candidate]){
      for(var i=0;i<313;i+=candidate){isComposite[i]=candidate;}
      hash[primeCounter]=(mathPow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii+='\x80';
  while(ascii.length%64-56) ascii+='\x00';
  for(var i2=0;i2<ascii.length;i2++){
    var j=ascii.charCodeAt(i2);
    if(j>>8) return '';
    words[i2>>2]|=j<<((3-i2)%4)*8;
  }
  words[words.length]=((asciiBitLength/maxWord)|0);
  words[words.length]=(asciiBitLength);
  for(var j2=0;j2<words.length;){
    var w=words.slice(j2,j2+=16);
    var oldHash=hash;
    hash=hash.slice(0,8);
    for(var i3=0;i3<64;i3++){
      var w15=w[i3-15], w2=w[i3-2];
      var a=hash[0], e=hash[4];
      var temp1=hash[7]
        +(rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25))
        +((e&hash[5])^((~e)&hash[6]))
        +k[i3]
        +(w[i3]=(i3<16)?w[i3]:(
            w[i3-16]
            +(rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))
            +w[i3-7]
            +(rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10))
          )|0
        );
      var temp2=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))
        +((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(temp1+temp2)|0].concat(hash);
      hash[4]=(hash[4]+temp1)|0;
    }
    for(var i4=0;i4<8;i4++){hash[i4]=(hash[i4]+oldHash[i4])|0;}
  }
  for(var i5=0;i5<8;i5++){
    for(var j3=3;j3+1;j3--){
      var b=(hash[i5]>>(j3*8))&255;
      result+=((b<16)?0:'')+b.toString(16);
    }
  }
  return result;
}

async function sha256hex(msg){
  try{
    if(window.crypto && crypto.subtle){
      const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
      return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    }
  }catch(e){}
  return sha256sync(msg);
}

const login=document.getElementById('login');
const home=document.getElementById('home');
const bootLogo=boot.querySelector('.boot-logo');
const bootWord=boot.querySelector('.boot-word');
const pin=document.getElementById('pin');
const inputs=[...pin.querySelectorAll('input')];
const loginErr=document.getElementById('loginErr');

/* ===== セッション内のアンロック状態 ===== */
function getUnlocked(){ try{ return sessionStorage.getItem('db_unlock')==='1'; }catch(e){ return false; } }
function setUnlocked(){ try{ sessionStorage.setItem('db_unlock','1'); }catch(e){} }

/* ===== 起動フロー ===== */
window.addEventListener('load', ()=>{
  if(getUnlocked()){
    boot.classList.add('hide');
    boot.style.display='none';
    showHome();
    return;
  }
  runBoot();
});

function runBoot(){
  setTimeout(()=>bootLogo.classList.add('in'), 120);
  setTimeout(()=>bootWord.classList.add('in'), 480);
  setTimeout(()=>{
    boot.classList.add('hide');
    setTimeout(()=>{ boot.style.display='none'; }, 600);
    login.classList.add('show');
    setTimeout(()=>inputs[0].focus(), 250);
  }, 3000);
}

/* ===== PIN 入力挙動 ===== */
inputs.forEach((inp, idx)=>{
  inp.addEventListener('input', ()=>{
    inp.value=inp.value.replace(/[^0-9]/g,'').slice(0,1);
    inp.classList.toggle('filled', inp.value!=='');
    clearError();
    if(inp.value && idx<inputs.length-1) inputs[idx+1].focus();
    if(allFilled()) verify();
  });
  inp.addEventListener('keydown', (e)=>{
    if(e.key==='Backspace' && !inp.value && idx>0){
      inputs[idx-1].focus();
      inputs[idx-1].value='';
      inputs[idx-1].classList.remove('filled');
    }
    if(e.key==='Enter' && allFilled()) verify();
  });
  inp.addEventListener('paste', (e)=>{
    e.preventDefault();
    const digits=(e.clipboardData.getData('text')||'').replace(/[^0-9]/g,'').slice(0,inputs.length);
    if(!digits) return;
    inputs.forEach((c,i)=>{ c.value=digits[i]||''; c.classList.toggle('filled', !!digits[i]); });
    (inputs[digits.length] || inputs[inputs.length-1]).focus();
    if(allFilled()) verify();
  });
});

function allFilled(){ return inputs.every(i=>i.value!==''); }
function code(){ return inputs.map(i=>i.value).join(''); }
function clearError(){ loginErr.classList.remove('show'); }

let checking=false;
async function verify(){
  if(checking) return;
  checking=true;
  const h=await sha256hex(code());
  if(h===PASS_HASH){
    onSuccess();
  }else{
    onError();
    checking=false;
  }
}

function onError(){
  loginErr.classList.add('show');
  pin.classList.remove('error');
  void pin.offsetWidth;            /* リフロー強制でアニメ再生 */
  pin.classList.add('error');
  inputs.forEach(i=>{ i.value=''; i.classList.remove('filled'); });
  setTimeout(()=>inputs[0].focus(), 120);
}

function onSuccess(){
  setUnlocked();
  inputs.forEach(i=>i.blur());
  login.classList.remove('show');
  setTimeout(()=>{
    login.style.display='none';
    showHome();
  }, 480);
}

function showHome(){
  home.classList.add('show');
}

/* ===== フッター ナビ ===== */
document.getElementById('toTop').addEventListener('click', ()=>{
  window.scrollTo({top:0, behavior:'smooth'});
});
</script>
</body>
</html>
