<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>brain – preview</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@300;400&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

/* ===== LOGIN ===== */

body{background:#f5f5f7;min-height:100vh;overflow:hidden;}
#screen-login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Noto Sans JP',sans-serif;overflow:hidden;position:relative;}
body::before{content:'';position:fixed;inset:0;background:none;pointer-events:none;}

.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:28px;animation:fadeDown .55s cubic-bezier(.22,1,.36,1) both;}
.logo-icon{width:110px;height:auto;}
.logo-text{font-family:'Bebas Neue',cursive;font-size:78px;letter-spacing:.22em;line-height:1;background:linear-gradient(155deg,#2a1a22 20%,#c0446e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 12px rgba(192,68,110,.15));}
.logo-sub{font-size:9px;color:#aaaaaa;letter-spacing:.3em;text-transform:uppercase;}
.logo-tagline{font-size:13px;color:#555;letter-spacing:.18em;margin-top:2px;font-family:'Outfit',sans-serif;font-weight:400;}
.agree-wrap{width:calc(100vw - 100px);max-width:300px;display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.agree-item{display:flex;align-items:flex-start;gap:10px;cursor:pointer;user-select:none;}
.agree-box{width:18px;height:18px;min-width:18px;border-radius:4px;border:1.5px solid rgba(0,0,0,.2);background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:border-color .15s,background .15s;}
.agree-item.checked .agree-box{border-color:#c0446e;background:rgba(192,68,110,.08);}
.agree-check{display:none;font-size:11px;color:#c0446e;line-height:1;}
.agree-item.checked .agree-check{display:block;}
.agree-text{font-family:'Outfit',sans-serif;font-weight:300;font-size:11px;color:#777;letter-spacing:.04em;line-height:1.5;}

.digits{display:flex;gap:12px;justify-content:center;margin-bottom:44px;animation:fadeUp .55s .05s cubic-bezier(.22,1,.36,1) both;}
.digit-box{width:min(52px,13vw);height:min(60px,15vw);background:rgba(255,255,255,.9);border:1px solid rgba(0,0,0,.12);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;transition:border-color .15s,box-shadow .15s,background .15s;box-shadow:0 2px 8px rgba(0,0,0,.08),inset 0 1px 2px rgba(255,255,255,.9);overflow:visible;}
.digit-box.active{background:rgba(255,255,255,1);border-color:rgba(192,68,110,.4);box-shadow:0 2px 10px rgba(0,0,0,.1),0 0 0 3px rgba(192,68,110,.1);}
.digit-box.done{border-color:rgba(192,68,110,.25);box-shadow:0 2px 6px rgba(0,0,0,.07);}
.digit-box.error{border-color:#ff4455!important;box-shadow:0 0 0 3px rgba(255,68,85,.12)!important;}

.cursor{display:none;width:2px;height:22px;background:#c0446e;border-radius:1px;animation:blink .85s step-end infinite;box-shadow:0 0 8px rgba(192,68,110,.8);}
.digit-box.active .cursor{display:block;}

.dot{width:9px;height:9px;background:#c0446e;border-radius:50%;box-shadow:0 0 6px rgba(192,68,110,.5);display:none;}
.digit-box.filled .dot{display:block;}
.digit-box.filled .cursor{display:none;}

.num{position:absolute;font-family:'Bebas Neue',cursive;font-size:28px;color:#c0446e;opacity:0;}
.digit-box.show-num .num{opacity:1;}
.digit-box.show-num .dot{display:none;}
.num.nc1{color:#fff;text-shadow:-1px -1px 0 #444,1px -1px 0 #444,-1px 1px 0 #444,1px 1px 0 #444;}
.num.nc2{color:#aaaaaa;text-shadow:0 0 8px rgba(140,140,140,.4);}
.num.nc3{color:#ff6666;text-shadow:0 0 10px rgba(220,50,50,.6);}
.num.nc4{color:#5588ff;text-shadow:0 0 10px rgba(40,100,220,.6);}
.num.nc5{color:#ffdd44;text-shadow:0 0 10px rgba(210,170,0,.6);}
.num.nc6{color:#44bb66;text-shadow:0 0 10px rgba(30,140,55,.6);}
.num.nc7{color:#ff8833;text-shadow:0 0 10px rgba(210,90,15,.6);}
.num.nc8{color:#ff66bb;text-shadow:0 0 10px rgba(200,45,135,.6);}
.num.nc9{color:#bb77ff;text-shadow:0 0 10px rgba(140,60,220,.6);}

.keypad-wrap{display:flex;flex-direction:column;gap:min(16px,4vw);align-items:center;animation:fadeUp .55s .1s cubic-bezier(.22,1,.36,1) both;}
.key-row{display:flex;gap:min(16px,4vw);justify-content:center;}

.key{
  width:min(72px,20vw);height:min(72px,20vw);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;position:relative;overflow:hidden;
  background:rgba(255,255,255,.42);
  border:1px solid rgba(255,255,255,.78);
  backdrop-filter:blur(12px) saturate(1.2);
  -webkit-backdrop-filter:blur(12px) saturate(1.2);
  box-shadow:
    0 4px 12px rgba(0,0,0,.06),
    inset 0 1.5px 2px rgba(255,255,255,.95),
    inset 0 -1px 2px rgba(0,0,0,.03);
  transition:transform .1s,box-shadow .1s;
}
.key::after{
  content:'';position:absolute;
  top:4px;left:8px;right:8px;height:42%;
  background:linear-gradient(180deg,rgba(255,255,255,.78) 0%,rgba(255,255,255,.06) 100%);
  border-radius:50% 50% 0 0/80% 80% 0 0;
  pointer-events:none;z-index:2;
}
.key::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(ellipse at 50% 115%,rgba(255,255,255,.32) 0%,transparent 58%);
  pointer-events:none;z-index:1;
}
.key:active{transform:scale(.88);box-shadow:0 2px 6px rgba(0,0,0,.06),inset 0 1px 2px rgba(255,255,255,.8);}
.klabel{font-family:'Bebas Neue',cursive;font-size:28px;line-height:1;position:relative;z-index:3;opacity:.78;letter-spacing:.02em;}

.k1{border-color:rgba(0,0,0,.1);box-shadow:4px 5px 14px rgba(180,180,180,.15),inset 0 1.5px 2px rgba(255,255,255,.95),inset 0 -1px 2px rgba(0,0,0,.03)}
.k1::before{background:radial-gradient(circle at 115% 115%,rgba(180,180,180,.28) 0%,rgba(180,180,180,.08) 35%,transparent 62%);pointer-events:none;z-index:1;}
.k1 .klabel{color:#fff;text-shadow:-1px -1px 0 #333,1px -1px 0 #333,-1px 1px 0 #333,1px 1px 0 #333,0 0 6px rgba(0,0,0,.4);}

.k2{border-color:rgba(0,0,0,.11);box-shadow:4px 5px 14px rgba(0,0,0,.10),inset 0 1.5px 2px rgba(255,255,255,.95),inset 0 -1px 2px rgba(0,0,0,.04)}
.k2::before{background:radial-gradient(circle at 115% 115%,rgba(90,90,90,.28) 0%,rgba(90,90,90,.08) 35%,transparent 62%);pointer-events:none;z-index:1;}
.k2 .klabel{color:#666;text-shadow:none;}

.k3{border-color:rgba(220,50,50,.1);box-shadow:4px 5px 14px rgba(220,50,50,.13),inset 0 1.5px 2px rgba(255,255,255,.95),inset 0 -1px 2px rgba(0,0,0,.04)}
.k3::before{background:radial-gradient(circle at 115% 115%,rgba(220,50,50,.10) 0%,transparent 55%);pointer-events:none;z-index:1;}
.k3 .klabel{color:#d44;}

.k4{border-color:rgba(40,100,220,.1);box-shadow:4px 5px 14px rgba(40,100,220,.13),inset 0 1.5px 2px rgba(255,255,255,.95),inset 0 -1px 2px rgba(0,0,0,.04)}
.k4::before{background:radial-gradient(circle at 115% 115%,rgba(40,100,220,.10) 0%,transparent 55%);pointer-events:none;z-index:1;}
.k4 .klabel{color:#46e;}

.k5{border-color:rgba(180,140,0,.1);box-shadow:4px 5px 14px rgba(180,140,0,.13),inset 0 1.5px 2px rgba(255,255,255,.95),inset 0 -1px 2px rgba(0,0,0,.04)}
.k5::before{background:radial-gradient(circle at 115% 115%,rgba(180,140,0,.10) 0%,transparent 55%);pointer-events:none;z-index:1;}
.k5 .klabel{color:#b8860b;}

.k6{border-color:rgba(30,140,55,.1);box-shadow:4px 5px 14px rgba(30,140,55,.13),inset 0 1.5px 2px rgba(255,255,255,.95),inset 0 -1px 2px rgba(0,0,0,.04)}
.k6::before{background:radial-gradient(circle at 115% 115%,rgba(30,140,55,.10) 0%,transparent 55%);pointer-events:none;z-index:1;}
.k6 .klabel{color:#2a8;}

.k7{border-color:rgba(200,90,15,.1);box-shadow:4px 5px 14px rgba(200,90,15,.13),inset 0 1.5px 2px rgba(255,255,255,.95),inset 0 -1px 2px rgba(0,0,0,.04)}
.k7::before{background:radial-gradient(circle at 115% 115%,rgba(200,90,15,.10) 0%,transparent 55%);pointer-events:none;z-index:1;}
.k7 .klabel{color:#c60;}

.k8{border-color:rgba(230,70,155,.12);box-shadow:4px 5px 14px rgba(230,70,155,.15),inset 0 1.5px 2px rgba(255,255,255,.95),inset 0 -1px 2px rgba(0,0,0,.04)}
.k8::before{background:radial-gradient(circle at 115% 115%,rgba(230,70,155,.12) 0%,transparent 55%);pointer-events:none;z-index:1;}
.k8 .klabel{color:#e54a9b;}

.k9{border-color:rgba(130,60,200,.1);box-shadow:4px 5px 14px rgba(130,60,200,.13),inset 0 1.5px 2px rgba(255,255,255,.95),inset 0 -1px 2px rgba(0,0,0,.04)}
.k9::before{background:radial-gradient(circle at 115% 115%,rgba(130,60,200,.10) 0%,transparent 55%);pointer-events:none;z-index:1;}
.k9 .klabel{color:#84c;}

.error-msg{text-align:center;font-size:11px;color:#e03040;height:16px;margin-top:20px;letter-spacing:.06em;}
.error-msg.shake{animation:shake .35s ease;}

@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes particle-burst{
  0%{transform:translate(-50%,-50%) rotate(var(--angle)) translateY(0px) scale(1);opacity:1;}
  60%{opacity:.8;}
  100%{transform:translate(-50%,-50%) rotate(var(--angle)) translateY(var(--dist)) scale(0);opacity:0;}
}
.particle{position:absolute;top:50%;left:50%;width:4px;height:4px;border-radius:50%;pointer-events:none;z-index:10;animation:particle-burst var(--dur,0.45s) ease-out forwards;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}40%{transform:translateX(7px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
@keyframes flashOut{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.8);}
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-18px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes prpr{
  0%{transform:translate(0,0) rotate(0deg) scale(1);}
  8%{transform:translate(-4px,-3px) rotate(-3deg) scale(1.04);}
  16%{transform:translate(4px,3px) rotate(3deg) scale(.97);}
  24%{transform:translate(-3px,4px) rotate(-2deg) scale(1.03);}
  32%{transform:translate(3px,-4px) rotate(2.5deg) scale(.98);}
  40%{transform:translate(-4px,2px) rotate(-3deg) scale(1.04);}
  48%{transform:translate(4px,-3px) rotate(2deg) scale(.97);}
  56%{transform:translate(-2px,4px) rotate(-2deg) scale(1.02);}
  64%{transform:translate(3px,3px) rotate(2.5deg) scale(.99);}
  72%{transform:translate(-3px,-2px) rotate(-1.5deg) scale(1.01);}
  80%{transform:translate(2px,2px) rotate(1deg) scale(1);}
  90%{transform:translate(-1px,-1px) rotate(-.5deg) scale(1);}
  100%{transform:translate(0,0) rotate(0deg) scale(1);}
}
.prpr{animation:prpr .55s ease-in-out;}

#successOverlay{
  position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
}
#successOverlay.show{pointer-events:all;}

.success-rays{
  position:absolute;inset:0;
  background:conic-gradient(from 0deg,transparent 0deg,rgba(192,68,110,.13) 10deg,transparent 20deg,transparent 40deg,rgba(192,68,110,.09) 50deg,transparent 60deg,transparent 80deg,rgba(192,68,110,.11) 90deg,transparent 100deg,transparent 120deg,rgba(192,68,110,.08) 130deg,transparent 140deg,transparent 160deg,rgba(192,68,110,.12) 170deg,transparent 180deg,transparent 200deg,rgba(192,68,110,.1) 210deg,transparent 220deg,transparent 240deg,rgba(192,68,110,.09) 250deg,transparent 260deg,transparent 280deg,rgba(192,68,110,.13) 290deg,transparent 300deg,transparent 320deg,rgba(192,68,110,.08) 330deg,transparent 360deg);
  animation:rayspin 4s linear infinite;
  opacity:0;transform-origin:center;
}
@keyframes rayspin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.success-glow{
  position:absolute;width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle,rgba(192,68,110,.28) 0%,rgba(192,68,110,.08) 45%,transparent 70%);
  opacity:0;transform:scale(.4);
}

.success-text{
  position:relative;z-index:2;
  font-family:'Bebas Neue',cursive;
  font-size:80px;letter-spacing:.18em;
  background:linear-gradient(145deg,#fff 10%,#ff88aa 50%,#c0446e 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(192,68,110,.9)) drop-shadow(0 0 60px rgba(192,68,110,.5));
  opacity:0;transform:scale(1.8);
}
.success-sub{
  position:relative;z-index:2;
  font-family:'Outfit',sans-serif;font-weight:300;font-size:13px;
  color:#c0446e;letter-spacing:.35em;text-transform:uppercase;
  opacity:0;transform:translateY(10px);margin-top:6px;
}
#confettiCanvas{position:fixed;inset:0;z-index:998;pointer-events:none;}

#transitionVeil{
  position:fixed;inset:0;z-index:1000;pointer-events:none;
  background:radial-gradient(ellipse at center,#ffffff 0%,#fdfcfd 60%,#ffffff 100%);
  opacity:0;
}
#loadingVeil{
  position:fixed;inset:0;z-index:2000;pointer-events:none;
  background:#ffffff;
  opacity:1;
  transition:opacity 1.2s cubic-bezier(0.4,0,0.2,1);
}

#veilCity{
  position:absolute;
  inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue','Noto Sans JP',sans-serif;
  font-weight:900;
  font-size:20vw;
  letter-spacing:.06em;
  color:rgba(180,180,180,0.5);
  opacity:0;
  pointer-events:none;
  text-align:center;
  padding:0 20px;
  transform:scale(0.65);
  transform-origin:center center;
  overflow:hidden;
  white-space:nowrap;
}

/* ===== MAIN ===== */
#screen-main{ display:none; opacity:0; transition:opacity 1.6s ease; min-height:100vh; width:100%; overflow-x:clip; position:relative; }
#screen-main.visible{ display:block; }

#screen-main *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f2f3f5;
  --bg2:#ffffff;
  --bg3:#f7f8fa;
  --border:#e0e2e8;
  --border2:#c8cad4;
  --text:#3a3d4a;
  --sub:#5a5f78;
  --sub2:#9095aa;
  --accent:#1a6fff;
  --accent2:#0d52cc;
  --red:#e82c2c;
  --top-bg:#c8f0d8;
  --top-text:#0a7a3a;
  --row-even:#ffffff;
  --row-odd:#f7f8fa;
  --fix-bg:#ffffff;
}

#screen-main{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;min-height:100vh;}

/* ===== ヘッダー ===== */
#screen-main .app-header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 12px;
  display:flex;
  align-items:stretch;
  height:44px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
#screen-main .header-left{display:flex;align-items:center;gap:8px;}
#screen-main .header-badge{
  background:#e07830;
  color:#fff;
  font-size:10px;
  font-weight:700;
  padding:2px 6px;
  border-radius:3px;
  letter-spacing:.05em;
}
#screen-main .header-title{font-size:18px;font-weight:900;color:var(--text);}
#screen-main .header-sub{font-size:11px;color:var(--sub);margin-left:4px;}

/* ===== レースタブ ===== */
#screen-main .race-tab-bar{
  background:var(--bg);
  display:flex;
  overflow-x:auto;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  /* stickyなし：スクロールで流れる */
  padding:5px 10px;
  gap:8px;
  border-bottom:1px solid var(--border);
}
#screen-main .race-tab-bar::-webkit-scrollbar{display:none;}
#screen-main .race-tab{
  flex-shrink:0;
  width:calc((100vw - 20px) / 4.8);
  min-width:72px;
  padding:8px 4px 6px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border-radius:12px;
  border:1.5px solid var(--border);
  background:var(--bg2);
  gap:3px;
  box-shadow:0 1px 3px rgba(0,0,0,.07);
  transition:all .12s;
}
#screen-main .race-tab .tab-num{
  font-family:'Roboto Condensed',sans-serif;
  font-size:20px;
  font-weight:800;
  color:var(--sub);
  line-height:1;
}
#screen-main .race-tab .tab-cls{
  font-size:9px;
  color:var(--sub);
  line-height:1;
  letter-spacing:.02em;
}
#screen-main .race-tab.active{
  border-color:#5cc640;
  border-width:1.5px;
  background:var(--bg2);
  box-shadow:0 0 8px rgba(92,198,64,.4), 0 0 16px rgba(92,198,64,.18);
}
#screen-main .race-tab.active .tab-num{color:var(--text);}
#screen-main .race-tab.active .tab-cls{color:var(--sub);}

/* ===== レース情報バー ===== */
#screen-main .race-info-bar{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:8px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  position:sticky;top:44px;z-index:98;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
#screen-main .race-info-left{display:flex;align-items:flex-end;gap:8px;}
#screen-main .race-num{
  font-family:'Roboto Condensed',sans-serif;
  font-size:32px;
  font-weight:800;
  color:var(--text);
  line-height:1;
}
#screen-main .race-grade{
  font-size:10px;
  color:#ffffff;
  background:#7a8099;
  padding:1px 5px;
  border-radius:3px;
  margin-bottom:3px;
}
#screen-main .grade-f1{background:#e07830;}
#screen-main .grade-f2{background:#29aac8;}
#screen-main .grade-g{background:#3aaa3a;}
#screen-main .race-info-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:2px;
}
#screen-main .time-row{display:flex;align-items:center;gap:4px;}
#screen-main .time-lbl{font-size:9px;color:var(--sub2);letter-spacing:.08em;}
#screen-main .time-val{
  font-family:'Roboto Condensed',sans-serif;
  font-size:17px;
  font-weight:700;
  color:var(--text);
}
#screen-main .time-val.deadline{color:var(--red);}

/* ===== 並び予想 ===== */
#screen-main .lineup-bar{
  background:var(--bg3);
  border-bottom:1px solid var(--border);
  padding:6px 12px;
  display:flex;
  align-items:center;
  gap:0;
  flex-wrap:wrap;
  position:sticky;top:92px;z-index:97;
}
#screen-main .lineup-lbl{display:none;}
#screen-main .lineup-body{display:flex;align-items:center;gap:0;}
#screen-main .lineup-group{display:flex;align-items:center;gap:1px;}
#screen-main .lineup-num{
  width:14px;height:14px;
  border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Roboto Condensed',sans-serif;
  font-size:9px;font-weight:700;
  flex-shrink:0;
}
#screen-main .lineup-arrow{font-size:18px;color:var(--text);margin-right:8px;line-height:1;}
#screen-main .lineup-sep{font-size:14px;color:var(--sub);margin:0 2px;line-height:1;}

/* ===== 出走表テーブル ===== */
#screen-main .table-container{
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
}
#screen-main .table-container::-webkit-scrollbar{height:3px;}
#screen-main .table-container::-webkit-scrollbar-track{background:transparent;}
#screen-main .table-container::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

#screen-main table.entry{
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
  border:2px solid var(--border2);
}

/* ヘッダー行 */
#screen-main table.entry thead tr{
  background:#eef0f5;
  border-bottom:2px solid var(--border2);
}
#screen-main table.entry thead th{
  font-size:10px;
  font-weight:700;
  color:var(--sub);
  padding:6px 0;
  white-space:nowrap;
  text-align:center;
  letter-spacing:.04em;
  border-right:1px solid var(--border);
}

/* データ行 */
#screen-main table.entry tbody tr{border-bottom:1px solid var(--border);}
#screen-main table.entry tbody tr:nth-child(odd){background:var(--row-odd);}
#screen-main table.entry tbody tr:nth-child(even){background:var(--row-even);}
#screen-main table.entry tbody tr:hover{background:#eef2ff;}
#screen-main table.entry tbody td{
  padding:7px 0;
  text-align:center;
  white-space:nowrap;
  border-right:1px solid var(--border);
  font-size:13px;
}

/* ===== 固定列（修正版） ===== */
#screen-main .col-fix{
  position:sticky;
  z-index:10;
  /* background:inherit を廃止 → 各セレクタで明示指定 */
  background-color:var(--row-even);
}
#screen-main .col-num{
  left:0;
  width:36px;min-width:36px;
  /* 右ボーダーをbox-shadowで代替（外枠と色・太さを統一） */
  box-shadow:2px 0 0 0 var(--border2);
  border-right:none !important;
}
#screen-main .col-name{
  left:36px;
  min-width:120px;max-width:120px;
  text-align:left !important;
  padding-left:8px !important;
  padding-top:5px !important;
  padding-bottom:5px !important;
  /* borderの代わりにbox-shadowで右ライン（stickyとborderの相性問題を回避） */
  box-shadow:2px 0 0 0 var(--border2);
  border-right:none !important;
}
/* thead 固定列：ヘッダー色を明示・z-indexを高く */
#screen-main thead .col-fix{
  z-index:11;
  background-color:#eef0f5 !important;
}
/* thead の車番列も太線に上書き */
#screen-main thead .col-num{
  box-shadow:2px 0 0 0 var(--border2) !important;
  border-right:none !important;
}
/* tbody 奇数行の固定列 */
#screen-main tbody tr:nth-child(odd) .col-fix{
  background-color:var(--row-odd);
}
/* tbody 偶数行の固定列 */
#screen-main tbody tr:nth-child(even) .col-fix{
  background-color:var(--row-even);
}
/* tbody ホバー時の固定列 */
#screen-main tbody tr:hover .col-fix{
  background-color:#eef2ff;
}

#screen-main .col-pt{min-width:54px;}
#screen-main .col-num2{min-width:30px;}
#screen-main .col-rate{min-width:44px;}
#screen-main .sep-l{border-left:2px solid var(--border2) !important;}
#screen-main .sep-r{border-right:2px solid var(--border2) !important;}
#screen-main .waku-num{font-size:11px;color:var(--sub2);}
#screen-main .pname{display:block;font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;}
#screen-main .pname-sub{display:block;font-size:9px;color:var(--sub);font-weight:400;white-space:nowrap;margin-top:1px;}
#screen-main .sty-badge{font-size:11px;color:var(--sub);}

/* 車番バッジ */
#screen-main .bnum{
  width:24px;height:24px;
  border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-family:'Roboto Condensed',sans-serif;
  font-size:13px;font-weight:700;
  border:1.5px solid;
  margin:0 auto;
}
#screen-main .c1{background:#d8d8d8;border-color:#bbb;color:#111;}
#screen-main .c2{background:#222;border-color:#111;color:#fff;}
#screen-main .c3{background:#dd2222;border-color:#bb1111;color:#fff;}
#screen-main .c4{background:#1e55bb;border-color:#1144aa;color:#fff;}
#screen-main .c5{background:#ddaa00;border-color:#bb8800;color:#111;}
#screen-main .c6{background:#229933;border-color:#117722;color:#fff;}
#screen-main .c7{background:#dd5500;border-color:#bb3300;color:#fff;}
#screen-main .c8{background:#cc2288;border-color:#aa1166;color:#fff;}
#screen-main .c9{background:#4455cc;border-color:#2233aa;color:#fff;}

#screen-main .pname{
  font-size:13px;
  font-weight:700;
  color:var(--text);
  display:block;
  white-space:nowrap;
}

#screen-main .sub{font-size:11px;color:var(--sub);}

#screen-main .nval{
  font-family:'Roboto Condensed',sans-serif;
  font-size:14px;
  font-weight:700;
  color:var(--text);
}
#screen-main .nval.dash{color:var(--sub2);font-size:12px;font-weight:400;}

#screen-main .rate{
  font-family:'Roboto Condensed',sans-serif;
  font-size:14px;
  font-weight:700;
  color:var(--text);
}
#screen-main .pct{font-size:9px;color:inherit;}

#screen-main .top-mark{
  background:#d6f5e3;
  border-radius:3px;
  padding:1px 5px;
  display:inline-block;
}

#screen-main .no-data{
  padding:32px 16px;
  text-align:center;
  color:var(--sub2);
  font-size:12px;
}

#screen-main .section-sep{
  height:6px;
  background:var(--bg);
}

</style>
</head>

<script>
const CODE='5558';
let input='';
let timers=[null,null,null,null];

function updateUI(){
  for(let i=0;i<4;i++){
    const b=document.getElementById('d'+i);
    b.classList.toggle('active', i===input.length && input.length<4);
    b.classList.toggle('filled', i<input.length);
    b.classList.toggle('done',   i<input.length);
    b.classList.remove('error');
  }
}

const keyColorMap={'1':'nc1','2':'nc2','3':'nc3','4':'nc4','5':'nc5','6':'nc6','7':'nc7','8':'nc8','9':'nc9'};
const keyColorRaw={'1':'#ffffff','2':'#aaaaaa','3':'#ff6666','4':'#5588ff','5':'#ffdd44','6':'#44bb66','7':'#ff8833','8':'#ff66bb','9':'#bb77ff'};

function burstParticles(box, color){
  const count=22;
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=(360/count)*i + Math.random()*22-11;
    const dist=(65+Math.random()*55)+'px';
    const dur=(0.5+Math.random()*0.3).toFixed(2)+'s';
    const size=(3+Math.random()*5).toFixed(1)+'px';
    p.style.cssText=`--angle:${angle}deg;--dist:-${dist};--dur:${dur};background:${color};width:${size};height:${size};box-shadow:0 0 10px 3px ${color};`;
    box.appendChild(p);
    setTimeout(()=>p.remove(), 900);
  }
  const lines=10;
  for(let i=0;i<lines;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=(360/lines)*i + Math.random()*18;
    const dist=(55+Math.random()*40)+'px';
    const dur=(0.42+Math.random()*0.22).toFixed(2)+'s';
    p.style.cssText=`--angle:${angle}deg;--dist:-${dist};--dur:${dur};background:${color};width:2px;height:14px;border-radius:1px;box-shadow:0 0 8px 2px ${color};`;
    box.appendChild(p);
    setTimeout(()=>p.remove(), 800);
  }
  const flash=document.createElement('div');
  flash.style.cssText='position:absolute;top:50%;left:50%;width:90px;height:90px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,'+color+'66 0%,transparent 70%);pointer-events:none;z-index:9;animation:flashOut .35s ease-out forwards;';
  box.appendChild(flash);
  setTimeout(()=>flash.remove(), 400);
}

function press(num){
  if(input.length>=4) return;
  if(navigator.vibrate) navigator.vibrate(18);
  const idx=input.length;
  input+=num;
  const b=document.getElementById('d'+idx);
  const numEl=b.querySelector('.num');
  numEl.textContent=num;
  numEl.className='num';
  if(keyColorMap[num]) numEl.classList.add(keyColorMap[num]);
  b.classList.add('show-num');
  burstParticles(b, keyColorRaw[num]||'#c0446e');
  clearTimeout(timers[idx]);
  timers[idx]=setTimeout(()=>{b.classList.remove('show-num');updateUI();},280);
  document.getElementById('errMsg').textContent='';
  document.getElementById('errMsg').classList.remove('shake');
  updateUI();
  if(input.length===4) setTimeout(()=>judge(),380);
}

function toggleCheck(id){
  document.getElementById(id).classList.toggle('checked');
}

function judge(){
  const ok1 = document.getElementById('chk1').classList.contains('checked');
  const ok2 = document.getElementById('chk2').classList.contains('checked');
  if(!ok1 || !ok2){
    const err=document.getElementById('errMsg');
    err.textContent='上記の項目にチェックを入れてください';
    err.classList.remove('shake');
    void err.offsetWidth;
    err.classList.add('shake');
    input='';
    for(let i=0;i<4;i++){
      const b=document.getElementById('d'+i);
      b.classList.remove('show-num','filled','done');
      b.querySelector('.num').textContent='';
    }
    updateUI();
    return;
  }
  if(input===CODE){
    if(navigator.vibrate) navigator.vibrate([30,40,60,40,100]);
    playSuccess();
  } else {
    input='';
    for(let i=0;i<4;i++){
      const b=document.getElementById('d'+i);
      b.classList.remove('show-num','filled','done');
      b.classList.add('error');
      b.querySelector('.num').textContent='';
    }
    const err=document.getElementById('errMsg');
    err.textContent='コードが違います';
    err.classList.remove('shake');
    void err.offsetWidth;
    err.classList.add('shake');
    setTimeout(()=>{
      for(let i=0;i<4;i++) document.getElementById('d'+i).classList.remove('error');
      updateUI();
    },700);
    updateUI();
  }
}

function addPrpr(el){
  el.classList.remove('prpr');
  void el.offsetWidth;
  el.classList.add('prpr');
  el.addEventListener('animationend',()=>el.classList.remove('prpr'),{once:true});
}

function startPrprLoop(){
  const logoWrap = document.querySelector('.logo-wrap');
  const keys = Array.from(document.querySelectorAll('.key'));
  const targets = [logoWrap, ...keys];
  let count = 0;
  const maxRounds = 4;
  function pulse(){
    if(count >= maxRounds * targets.length) return;
    const el = targets[count % targets.length];
    addPrpr(el);
    if(navigator.vibrate) navigator.vibrate(12);
    count++;
    setTimeout(pulse, 55);
  }
  pulse();
}

function playSuccess(){

function launchConfetti(maxDuration){
  const canvas=document.getElementById('confettiCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const colors=['#c0446e','#ff88aa','#ffffff','#ffdd44','#5588ff','#bb77ff','#44bb66','#ff8833'];
  const pieces=[];
  for(let i=0;i<50;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:-10-Math.random()*200,
      w:6+Math.random()*6,
      h:3+Math.random()*4,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360,
      vx:(Math.random()-0.5)*3,
      vy:2.5+Math.random()*3.5,
      vr:(Math.random()-0.5)*8,
      opacity:1
    });
  }
  let frame;
  const startTime=Date.now();
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const elapsed=(Date.now()-startTime)/1000;
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      p.vy+=0.06;
      if(elapsed>1.5) p.opacity=Math.max(0,p.opacity-0.012);
      ctx.save();
      ctx.globalAlpha=p.opacity;
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    if(elapsed<3.5) frame=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

function burstSynapse(logo){
  const rect = logo.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const count = 12 + Math.floor(Math.random()*8);
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    const angle = Math.random()*360;
    const dist = 30 + Math.random()*40;
    const size = 2 + Math.random()*3;
    const color = 'rgba(218,165,32,1)';
    p.style.cssText = `position:fixed;left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;border-radius:50%;background:${color};pointer-events:none;z-index:900;opacity:1;`;
    document.body.appendChild(p);
    const rad = angle * Math.PI/180;
    anime({
      targets: p,
      translateX: Math.cos(rad)*dist,
      translateY: Math.sin(rad)*dist,
      opacity: [1, 0],
      scale: [1, 0.2],
      duration: 250 + Math.random()*200,
      easing: 'easeOutExpo',
      complete: ()=> p.remove(),
    });
  }
}

function runTwitch(logo){
  const seq = twitchSets[Math.floor(Math.random()*twitchSets.length)];
  let chain = Promise.resolve();
  seq.forEach(step=>{
    chain = chain.then(()=>{
      burstSynapse(logo);
      return anime({
        targets: logo,
        translateX: step.x,
        translateY: step.y,
        rotate:     step.r,
        duration:   step.d,
        easing:     step.e,
      }).finished;
    });
  });
  return chain;
}

let twitchLoopActive = false;

function scheduleTwitch(logo){
  const rest = 3000 + Math.random()*7000;
  setTimeout(async ()=>{
    if(!twitchLoopActive) return;
    const bursts = 1 + Math.floor(Math.random()*3);
    for(let i=0;i<bursts;i++){
      if(!twitchLoopActive) return;
      await runTwitch(logo);
      if(i < bursts-1) await new Promise(r=>setTimeout(r, 60+Math.random()*290));
    }
    scheduleTwitch(logo);
  }, rest);
}

});

function isTop(arr, val) {
  if (val === null || val === 0) return false;
  const sorted = arr.filter(v => v !== null && v !== 0).sort((a,b) => b-a);
  return sorted.length > 0 && val === sorted[0];
}

function renderLineup(lineup) {
  const bar = document.getElementById('lineupBar');
  if (!lineup || lineup.length === 0) {
    bar.innerHTML = '<div class="lineup-lbl">並び予想</div><div class="lineup-body"><span style="color:var(--sub2);font-size:11px;">情報なし</span></div>';
    return;
  }
  let body = '<span class="lineup-arrow">←</span>';
  lineup.forEach((grp, gi) => {
    if (gi > 0) body += '<span class="lineup-sep">・</span>';
    body += '<div class="lineup-group">';
    grp.forEach((num, i) => {
      body += `<div class="lineup-num c${num}">${num}</div>`;
    });
    body += '</div>';
  });
  bar.innerHTML = '<div class="lineup-lbl">並び予想</div><div class="lineup-body">' + body + '</div>';
}

function renderTable(race) {
  const ps = race.players;

  document.getElementById('tHead').innerHTML = `
    <tr>
      <th class="col-fix col-num">車番</th>
      <th class="col-fix col-name">選手名</th>
      <th class="col-pt">競走得点</th>
      <th class="col-num2 sep-l">S</th>
      <th class="col-num2">B</th>
      <th class="col-num2 sep-l sep-r">脚</th>
      <th class="col-num2">逃</th>
      <th class="col-num2">捲</th>
      <th class="col-num2">差</th>
      <th class="col-num2">マ</th>
      <th class="col-num2 sep-l">1着</th>
      <th class="col-num2">2着</th>
      <th class="col-num2">3着</th>
      <th class="col-num2">着外</th>
      <th class="col-rate sep-l">勝率</th>
      <th class="col-rate">2連対率</th>
      <th class="col-rate">3連対率</th>
    </tr>`;

  if (!ps || ps.length === 0) {
    document.getElementById('tBody').innerHTML = `<tr><td colspan="18" class="no-data">データ準備中</td></tr>`;
    return;
  }

  const pts   = ps.map(p=>p.pt);
  const Ss    = ps.map(p=>p.S);
  const Bs    = ps.map(p=>p.B);
  const nigeA = ps.map(p=>p.nige);
  const makiA = ps.map(p=>p.maki);
  const sashiA= ps.map(p=>p.sashi);
  const markA = ps.map(p=>p.mark);
  const w1A   = ps.map(p=>p.w1);
  const w2A   = ps.map(p=>p.w2);
  const w3A   = ps.map(p=>p.w3);
  const winA  = ps.map(p=>p.win);
  const r2A   = ps.map(p=>p.r2);
  const r3A   = ps.map(p=>p.r3);

  const nd = (val, arr) => {
    if (val === null) return `<td><span class="nval dash">-</span></td>`;
    const top = isTop(arr, val);
    const disp = Number.isInteger(val) ? val : Math.round(val);
    return `<td><span class="nval${top?' top-mark':''}">${disp}</span></td>`;
  };
  const nd1 = (val, arr) => {
    if (val === null) return `<td><span class="nval dash">-</span></td>`;
    const top = isTop(arr, val);
    const disp = Number(val).toFixed(1);
    return `<td><span class="nval${top?' top-mark':''}">${disp}</span></td>`;
  };
  const nw = (val, arr) => {
    if (val === null) return `<td><span class="nval dash">-</span></td>`;
    const top = isTop(arr, val);
    return `<td><span class="nval${top?' top-mark':''}">${val}</span></td>`;
  };
  const pct = (val, arr) => {
    if (val === null) return `<td><span class="nval dash">-</span></td>`;
    const top = isTop(arr, val);
    return `<td><span class="rate${top?' top-mark':''}">${Math.round(val)}<span class="pct">%</span></span></td>`;
  };
  const sty  = (val) => `<td><span class="sty-badge">${val ?? '-'}</span></td>`;
  const styS = (val) => `<td class="sep-l sep-r"><span class="sty-badge">${val ?? '-'}</span></td>`;

  const addSepL = (td) => td.replace('<td>', '<td class="sep-l">').replace('<td><span class="nval dash">', '<td class="sep-l"><span class="nval dash">');

  document.getElementById('tBody').innerHTML = ps.map(p => `
    <tr>
      <td class="col-fix col-num"><div class="bnum c${p.n}">${p.n}</div></td>
      <td class="col-fix col-name">
        <span class="pname">${p.name}</span>
        <span class="pname-sub">${p.pref} ${p.cls} ${p.age}歳 ${p.ki}期</span>
      </td>
      ${nd1(p.pt, pts)}
      ${addSepL(nd(p.S, Ss))}
      ${nd(p.B, Bs)}
      ${styS(p.style)}
      ${nd(p.nige, nigeA)}
      ${nd(p.maki, makiA)}
      ${nd(p.sashi, sashiA)}
      ${nd(p.mark, markA)}
      ${addSepL(nw(p.w1, w1A))}
      ${nw(p.w2, w2A)}
      ${nw(p.w3, w3A)}
      ${nw(p.wout, [])}
      ${addSepL(pct(p.win, winA))}
      ${pct(p.r2, r2A)}
      ${pct(p.r3, r3A)}
    </tr>`).join('');
}

function gradeClass(cls) {
  if (!cls) return '';
  if (cls.includes('F1')) return 'grade-f1';
  if (cls.includes('F2')) return 'grade-f2';
  if (cls.match(/G[123]/)) return 'grade-g';
  return '';
}

function renderInfo(race) {
  document.getElementById('raceInfo').innerHTML = `
    <div class="race-info-left">
      <span class="race-num">${race.r}R</span>
      <span class="race-grade ${gradeClass(race.cls)}">${race.cls}</span>
    </div>
    <div class="race-info-right">
      <div class="time-row">
        <span class="time-lbl">締切</span>
        <span class="time-val deadline">${race.dl}</span>
      </div>
    </div>`;
}

let currentIdx = 0;

function selectRace(idx) {
  currentIdx = idx;
  const race = RACES[idx];
  document.querySelectorAll('.race-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
  // 選択タブをセンターに寄せる
  const bar = document.getElementById('tabBar');
  const activeTab = bar.querySelectorAll('.race-tab')[idx];
  if (activeTab) {
    const barW = bar.offsetWidth;
    const tabLeft = activeTab.offsetLeft;
    const tabW = activeTab.offsetWidth;
    bar.scrollTo({ left: tabLeft - barW / 2 + tabW / 2, behavior: 'smooth' });
  }
  renderInfo(race);
  renderLineup(race.lineup);
  renderTable(race);
  document.querySelector('.table-container').scrollLeft = 0;
}

function init() {
  const bar = document.getElementById('tabBar');
  RACES.forEach((r, i) => {
    const t = document.createElement('div');
    t.className = 'race-tab' + (i === 0 ? ' active' : '');
    t.innerHTML = `<span class="tab-num">${r.r}R</span><span class="tab-cls">${r.cls}</span>`;
    t.onclick = () => selectRace(i);
    bar.appendChild(t);
  });
  selectRace(0);
}

init();
</script>
</div>

<script>
// ===== KEIRIN PROXY 設定 =====
const PROXY = 'https://keirin-proxy.bomayekeirin.workers.dev/?url=';

function setStatus(msg, color) {
  const el = document.getElementById('fetchStatus');
  if (el) { el.textContent = msg; el.style.color = color || '#999'; }
}

function setFetchBtnState(loading) {
  const btn = document.getElementById('fetchBtn');
  if (!btn) return;
  btn.disabled = loading;
  btn.textContent = loading ? '取得中...' : 'レースデータを取得';
  btn.style.opacity = loading ? '.6' : '1';
}

async function fetchRaceData() {
  const input = document.getElementById('raceUrlInput');
  const rawUrl = (input ? input.value.trim() : '');
  if (!rawUrl) { setStatus('URLを入力してください', '#e04'); return; }

  // KEIRIN DREAMSのURLかチェック
  if (!rawUrl.includes('kdreams.jp') && !rawUrl.includes('keirin')) {
    setStatus('KEIRIN DREAMSのURLを入力してください', '#e04'); return;
  }

  setFetchBtnState(true);
  setStatus('データ取得中...', '#c0446e');

  try {
    const proxyUrl = PROXY + encodeURIComponent(rawUrl);
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();

    // HTMLをパース
    const parsed = parseKeirinHtml(html, rawUrl);
    if (!parsed) {
      setStatus('データの解析に失敗しました。別のURLをお試しください', '#e04');
      setFetchBtnState(false);
      return;
    }

    // RACESに反映
    applyParsedData(parsed);
    setStatus('✓ データ取得完了！', '#2a9d5c');
    setFetchBtnState(false);

  } catch(e) {
    setStatus('取得エラー: ' + e.message, '#e04');
    setFetchBtnState(false);
  }
}

function parseKeirinHtml(html, url) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // レース番号をURLから取得
  const rNumMatch = url.match(/(\d{2})(?=\/?$|[?#])/);
  let raceNo = rNumMatch ? parseInt(rNumMatch[1]) : null;

  // 選手テーブルを探す
  const rows = doc.querySelectorAll('table tr, .raceTable tr, .entry tr');
  if (!rows || rows.length < 2) {
    // テーブルが見つからない場合、別のセレクタを試す
    const altRows = doc.querySelectorAll('tr');
    if (!altRows || altRows.length < 2) return null;
  }

  const players = [];
  const allRows = doc.querySelectorAll('tr');

  for (const row of allRows) {
    const cells = row.querySelectorAll('td');
    if (cells.length < 3) continue;

    // 車番が含まれる行を探す（1〜9の数字）
    const firstCell = cells[0].textContent.trim();
    const carNum = parseInt(firstCell);
    if (isNaN(carNum) || carNum < 1 || carNum > 9) continue;

    // 選手名を探す（日本語を含むセル）
    let playerName = '';
    let pref = '';
    for (let i = 1; i < cells.length; i++) {
      const text = cells[i].textContent.trim();
      if (/[\u3040-\u9FAF]/.test(text) && text.length > 1 && text.length < 15) {
        if (!playerName) playerName = text;
      }
      // 都道府県
      if (/都|道|府|県/.test(text) && text.length < 6) {
        pref = text.replace(/都|道|府|県/, '');
      }
    }

    if (!playerName) continue;

    // 成績データを探す（数値セル）
    const nums = [];
    for (const cell of cells) {
      const n = parseFloat(cell.textContent.trim());
      if (!isNaN(n)) nums.push(n);
    }

    players.push({
      n: carNum,
      name: playerName,
      pref: pref || '不明',
      ki: nums[1] || null,
      age: nums[2] || null,
      cls: 'S1',
      style: '両',
      pt: nums[3] || null,
      fetched: true
    });
  }

  if (players.length === 0) return null;

  return { raceNo, players };
}

function applyParsedData(parsed) {
  if (!parsed) return;

  // レース番号が特定できた場合、該当レースのplayersを更新
  if (parsed.raceNo !== null) {
    const raceIdx = RACES.findIndex(r => r.r === parsed.raceNo);
    if (raceIdx >= 0) {
      parsed.players.forEach(p => {
        const existing = RACES[raceIdx].players.find(ep => ep.n === p.n);
        if (existing) Object.assign(existing, p);
        else RACES[raceIdx].players.push(p);
      });
      // 現在表示中のレースなら再描画
      if (currentIdx === raceIdx) {
        selectRace(currentIdx);
      }
      setStatus(`✓ ${parsed.raceNo}R のデータを更新しました！`, '#2a9d5c');
      return;
    }
  }

  // レース番号不明の場合は現在表示中のレースに反映
  parsed.players.forEach(p => {
    const existing = RACES[currentIdx].players.find(ep => ep.n === p.n);
    if (existing) Object.assign(existing, p);
  });
  selectRace(currentIdx);
  setStatus(`✓ ${RACES[currentIdx].r}R のデータを更新しました！`, '#2a9d5c');
}
</script>
