<style>
  :root{
    --bg:#060607;
    --line:rgba(255,255,255,.08);
    /* ミッドナイト＝紫グラデーション */
    --mid-deep:#4a2a6a;
    --mid:#7b4fb0;
    --mid-light:#a97fd0;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%;}
  html{background:#000;}               /* 最上部・オーバースクロール領域は純黒（ステータスバー映り込み対策） */
  body{
    background:var(--bg);
    color:rgba(255,255,255,.85);
    font-family:'Oswald',-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    min-height:100vh;
    overflow-x:clip;                   /* 横はみ出し防止（hiddenでなくclip） */
  }
  #midnight{
    min-height:100vh;
    display:flex;flex-direction:column;
    background:var(--bg);
    padding-top:env(safe-area-inset-top);   /* ステータスバー領域を空ける */
  }

  /* iOS：画面最上部（ステータスバー/ノッチ）を黒で固定。コンテンツの潜り込みを防ぐ */
  .mid-statusbar{
    position:fixed;
    top:0;left:0;right:0;
    height:env(safe-area-inset-top, 0px);    /* standalone時のみ実値（Safariでは0＝非表示） */
    background:#000;
    z-index:3000;                            /* 起動オーバーレイ(2500)より前面 */
    pointer-events:none;
  }
  /* standalone（ホーム画面から起動）時は確実に黒帯を出す */
  @media (display-mode:standalone){
    .mid-statusbar{ height:max(env(safe-area-inset-top, 0px), 20px); }
  }

  /* ===== 登場アニメ（ローディング解除後：ヘッダー→見出し→バー→カード1,2,3…）===== */
  .mid-hero, .mid-heading-wrap{
    opacity:0;
    transform:translateY(-10px);
  }
  .reveal .mid-hero{
    animation:midFadeDown .5s cubic-bezier(.22,1,.36,1) 0s forwards;
  }
  .reveal .mid-heading-wrap{
    animation:midFadeDown .5s cubic-bezier(.22,1,.36,1) .16s forwards;
  }
  @keyframes midFadeDown{
    from{opacity:0;transform:translateY(-10px);}
    to  {opacity:1;transform:translateY(0);}
  }

  /* ===== ヘッダー画像（通常ヘッダーバーなし） ===== */
  .mid-hero{
    position:relative;
    width:100%;
    line-height:0;                     /* 画像下の隙間消し */
    background:var(--bg);
  }
  .mid-hero img{
    display:block;
    width:100%;
    height:auto;
  }

  /* 右上：家ボタン（タップでホームへ遷移） */
  .mid-home-btn{
    position:absolute;
    right:calc(12px + env(safe-area-inset-right));
    top:12px;                                /* #midnight側でsafe-area分を確保済み */
    width:40px;height:40px;
    display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.72);
    text-decoration:none;border-radius:9px;
    background:rgba(0,0,0,.2);
    -webkit-tap-highlight-color:transparent;
    z-index:10;
    transition:color .18s,background .18s,transform .12s;
  }
  .mid-home-btn:hover{color:#fff;background:rgba(0,0,0,.32);}
  .mid-home-btn:active{transform:scale(.9);}

  /* ===== コンテンツ領域（内容は後日実装・現状はスペースのみ） ===== */
  .mid-main{
    flex:1;
    background:var(--bg);
    /* padding は内側の .mid-race-section が持つ */
  }

/* ===== 開催カード：下部トグル ＆ 展開エリア（レースセレクター） ===== */
/* トグル：段を作らずカード下端にそっと重ねる（レイアウトを一切押し広げない） */
.venue-toggle{
  position:absolute;
  left:50%;bottom:0px;
  transform:translateX(-50%);
  width:44px;height:20px;                 /* タップ領域は確保しつつ見た目は控えめ */
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:3;
  -webkit-tap-highlight-color:transparent;
}
.venue-toggle svg{
  width:15px;height:15px;
  color:rgba(255,255,255,.26);            /* さりげないグレー */
  transition:transform .32s cubic-bezier(.22,1,.36,1), color .2s;
}
.venue-toggle:active svg{color:rgba(255,255,255,.6);}
.venue-card.expanded .venue-toggle svg{transform:rotate(180deg);}   /* 開いたらくるっと上向き */

/* 展開スペース（カードが下に伸びる） */
.venue-expand{
  max-height:0;
  overflow:hidden;
  transition:max-height .42s cubic-bezier(.22,1,.36,1), opacity .3s ease;
  opacity:0;
}
.venue-card.expanded .venue-expand{
  max-height:240px;
  opacity:1;
}
.venue-expand-inner{
  padding-top:14px;
  padding-bottom:6px;                      /* トグルとの重なり回避（最小限） */
  margin-top:12px;
  border-top:1px solid rgba(255,255,255,.09);
}

/* レースセレクター（app流用 → ミッドナイト仕様） */
.mid-race-selector{
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  overflow-x:auto;overflow-y:hidden;
  padding:2px 0 4px;
}
.mid-race-selector::-webkit-scrollbar{display:none;}
.mid-race-selector-inner{
  display:flex;gap:9px;min-width:max-content;padding:2px 2px 4px;
}
.mid-race-btn{
  flex-shrink:0;
  width:78px;height:76px;
  padding:5px 5px 7px;
  border:1px solid rgba(168,130,220,.22);
  border-radius:13px;
  background:linear-gradient(160deg, rgba(38,34,50,.9) 0%, rgba(30,26,42,.9) 45%, rgba(54,32,88,.9) 100%);
  box-shadow:0 2px 8px rgba(0,0,0,.5), inset 0 1px 0 rgba(180,140,230,.14);
  font-family:inherit;cursor:pointer;
  transition:transform .14s, border-color .2s, box-shadow .2s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  position:relative;overflow:hidden;
}
.mid-race-btn:active{transform:scale(.94);}
.mid-race-btn.ended{opacity:.42;}
.mid-race-btn-num{font-size:19px;font-weight:700;color:#e8e6f0;line-height:1.1;}
.mid-race-btn-deadline{font-size:10px;font-weight:700;color:rgba(255,255,255,.62);white-space:nowrap;line-height:1.1;letter-spacing:.01em;}
.mid-race-btn-deadline.countdown{color:#ff5a68;font-weight:800;text-shadow:0 0 8px rgba(255,74,90,.35);}
.mid-race-btn-class{font-size:10px;font-weight:500;color:rgba(180,150,225,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.1;}
.mid-race-loading{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:18px 0;color:rgba(255,255,255,.45);font-size:11px;
}

  /* ===== フッター（resultのフッター流用・バーを紫グラデーションに） ===== */
  .mid-footer{
    background:var(--bg);
    border-top:1px solid var(--line);
    padding:22px 20px;
    padding-bottom:max(26px, env(safe-area-inset-bottom));
    position:relative;z-index:50;
  }
  .mid-footer .brand{
    text-align:center;
    font-family:'Oswald',sans-serif;font-size:15px;font-weight:400;
    letter-spacing:.04em;color:rgba(255,255,255,.72);
    margin-bottom:7px;padding-left:.04em;
  }
  .mid-footer .brand::after{
    content:'';display:block;width:28px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,var(--mid-deep),var(--mid-light));
    margin:8px auto 0;opacity:.9;
  }
  .mid-divider{height:1px;background:rgba(255,255,255,.1);margin:0 0 16px;}
  .mid-nav{display:flex;justify-content:center;flex-wrap:wrap;gap:26px;margin-bottom:16px;}
  .mid-nav a,.mid-nav span{
    font-size:12px;color:rgba(255,255,255,.5);
    text-decoration:none;cursor:pointer;transition:color .2s;
  }
  .mid-nav a:hover,.mid-nav span:hover{color:rgba(255,255,255,.8);}
  .mid-copy{text-align:center;font-size:10px;letter-spacing:.05em;color:rgba(255,255,255,.35);}

  /* ===== 遷移画面（app起動トランジション流用・ロゴのみ差し替え） ===== */
  .mn-boot{
    position:fixed;inset:0;
    background:#0f0f0f;                 /* メイン読み込みと同じダークグレー */
    display:flex;align-items:center;justify-content:center;
    z-index:2500;
    opacity:1;
  }
  .mn-boot.flash{transition:none;opacity:1;}
  .mn-boot.fade-out{opacity:0;transition:opacity .6s ease;}
  .mn-boot-logo{
    width:90px;height:auto;             /* app起動トランジション準拠 */
    opacity:0;
    transition:opacity .6s ease;
  }
  .mn-boot-logo.visible{opacity:.35;}   /* 透過（薄め） */
  .mn-boot-logo.shake{
    animation:areLogoShake .7s cubic-bezier(.36,.07,.19,.97) forwards;
  }
  .mn-boot-logo.hide{opacity:0;transition:opacity .15s ease;}
  @keyframes areLogoShake{
    0%{transform:rotate(0);}
    15%{transform:rotate(-5deg);}
    30%{transform:rotate(5deg);}
    45%{transform:rotate(-3deg);}
    60%{transform:rotate(3deg);}
    75%{transform:rotate(-1.5deg);}
    90%{transform:rotate(1deg);}
    100%{transform:rotate(0);}
  }

  /* ===== 見出し「ミッドナイト開催一覧」（2026-07-12） ===== */
  .mid-heading-wrap{
    padding:26px 20px 30px;              /* 下部余白を広げる */
    background:var(--bg);
    text-align:center;                   /* 左右中央揃え */
  }
  .mid-heading{
    display:inline-block;
    position:relative;
    font-size:26px;
    font-weight:700;
    letter-spacing:.04em;
    padding:0 4px 2px;
    z-index:0;
    opacity:.8;                          /* 20%透過 */
    /* グレー寄りグラデーション文字 */
    background:linear-gradient(180deg, #f2f3f5 0%, #c9ccd2 45%, #8f949e 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));   /* グレー影 */
  }
  /* 文字下部の背面バー：紫系グラデーション（暗め）・細め・10%透過／左→右へその場でスライド表示 */
  .mid-heading::after{
    content:'';
    position:absolute;
    left:0; right:0;
    bottom:3px;
    height:.24em;                        /* 細く */
    background:linear-gradient(90deg, #2a1642 0%, #46256e 55%, #5f3596 100%);   /* 暗めの紫グラデ */
    opacity:.9;                          /* 10%透過 */
    box-shadow:0 0 10px rgba(70,37,110,.45);
    border-radius:2px;
    z-index:-1;                          /* 文字の背面 */
    transform:skewX(-2deg) scaleX(0);
    transform-origin:left center;        /* 左端起点で右へ伸びる */
  }
  /* 登場アニメ発火 */
  .reveal .mid-heading::after{
    animation:midBarSweep .5s cubic-bezier(.22,1,.36,1) .34s forwards;
  }
  @keyframes midBarSweep{
    from{transform:skewX(-2deg) scaleX(0);}
    to  {transform:skewX(-2deg) scaleX(1);}
  }

  /* ===== 開催カードゾーン（app.html流用） ===== */
  .mid-race-section{
    padding:14px 16px 40px;
    background:var(--bg);
    flex:1;
  }
  .mid-race-section .venue-empty{
    text-align:center;
    color:rgba(255,255,255,.55);
    font-size:13px;
    padding:26px 0;
  }
  /* ローディング */
  .mid-loading{
    display:flex;align-items:center;justify-content:center;
    gap:10px;padding:34px 0;
    color:rgba(255,255,255,.6);font-size:13px;
  }
  .mid-spinner{
    width:18px;height:18px;border-radius:50%;
    border:2px solid rgba(255,255,255,.18);
    border-top-color:var(--mid-light);
    animation:midSpin .8s linear infinite;
  }
  @keyframes midSpin{to{transform:rotate(360deg);}}

/* 開催カード（ミッド脳：グレー寄りグラデーション・20%透過） */
.venue-card{
  /* かなり暗いダークグレー → パープル（パープル広め・強めの斜め2段）／透明度70%は背景アルファで表現 */
  background:linear-gradient(160deg, rgba(22,23,27,.3) 0%, rgba(22,23,27,.3) 28%, rgba(78,44,124,.3) 100%);
  opacity:1;                             /* 全体opacityは使わず、背景アルファ(.3)＝70%透過で表現（文字は透けさせない） */
  border-radius:16px;
  border:1px solid rgba(150,110,200,.18);
  padding:18px 18px;
  margin-bottom:26px;                    /* カード間の余白を広げる */
  min-height:80px;
  box-shadow:
    0 4px 14px rgba(0,0,0,.45),
    0 2px 6px rgba(0,0,0,.3),
    inset 0 1px 0 rgba(180,140,230,.16),
    inset 0 -1px 0 rgba(0,0,0,.25);
  cursor:pointer;
  opacity:0;
  transform:translateY(30px);
  transition:opacity .5s ease, transform .5s cubic-bezier(.22,1,.36,1), box-shadow .2s;
  position:relative;
  overflow:hidden;
}
/* 上のカードを前面に（影が下のカードを隠さないように） */
.venue-card:nth-child(1){z-index:20;}
.venue-card:nth-child(2){z-index:19;}
.venue-card:nth-child(3){z-index:18;}
.venue-card:nth-child(4){z-index:17;}
.venue-card:nth-child(5){z-index:16;}
.venue-card:nth-child(6){z-index:15;}
.venue-card:nth-child(7){z-index:14;}
.venue-card:nth-child(8){z-index:13;}
.venue-card:nth-child(9){z-index:12;}
.venue-card:nth-child(10){z-index:11;}
.venue-card:nth-child(n+11){z-index:10;}
/* ミッド脳：黒系の光沢（さりげない斜めスイープ）。白被りしない濃度に抑える */
.venue-card::before{
  content:'';
  position:absolute;
  inset:0;
  pointer-events:none;
  border-radius:16px;
  /* 上部の淡い艶 ＋ 斜めに走る黒系ハイライト帯 */
  background:
    linear-gradient(180deg, rgba(168,130,220,.06) 0%, rgba(255,255,255,0) 42%),
    linear-gradient(100deg,
      rgba(255,255,255,0)    38%,
      rgba(196,180,225,.055) 47%,
      rgba(255,255,255,.075) 50%,
      rgba(196,180,225,.045) 53%,
      rgba(255,255,255,0)    62%);
  background-size:100% 100%, 220% 100%;
  background-position:0 0, 140% 0;
  background-repeat:no-repeat;
  animation:cardGloss 7s ease-in-out 1.6s infinite;
}
@keyframes cardGloss{
  0%   {background-position:0 0, 140% 0;}
  22%  {background-position:0 0, -40% 0;}
  100% {background-position:0 0, -40% 0;}   /* 走った後はしばらく静止 */
}
@media (prefers-reduced-motion:reduce){
  .venue-card::before{animation:none;}
}
.venue-card.show{
  opacity:1;
  transform:translateY(0);
  animation:shadowFloat 4s ease-in-out infinite;
}
@keyframes shadowFloat{
  0%, 100%{box-shadow:0 4px 14px rgba(0,0,0,.45),0 2px 6px rgba(0,0,0,.3),inset 0 1px 0 rgba(180,140,230,.16),inset 0 -1px 0 rgba(0,0,0,.25);}
  50%{box-shadow:0 6px 18px rgba(0,0,0,.5),0 3px 8px rgba(0,0,0,.34),inset 0 1px 0 rgba(180,140,230,.16),inset 0 -1px 0 rgba(0,0,0,.25);}
}
.venue-card:active{
  animation:none;
  transform:scale(.96);
  box-shadow:
    0 2px 8px rgba(0,0,0,.4),
    0 1px 3px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(180,140,230,.12);
  background:linear-gradient(160deg, rgba(18,19,22,.3) 0%, rgba(18,19,22,.3) 28%, rgba(60,34,96,.3) 100%);
  transition:transform .1s ease, background .1s ease;
}
/* キラーン演出 */
.venue-card.shimmer{
  animation:cardShimmer .6s ease-out forwards !important;
}
@keyframes cardShimmer{
  0%{
    box-shadow:
      0 4px 16px rgba(0,0,0,.45),
      0 2px 6px rgba(0,0,0,.3),
      inset 0 1px 0 rgba(180,140,230,.16),
      0 0 0 0 rgba(180,126,224,0),
      0 0 0 0 rgba(123,79,176,0);
  }
  30%{
    box-shadow:
      0 4px 16px rgba(0,0,0,.45),
      0 2px 6px rgba(0,0,0,.3),
      inset 0 1px 0 rgba(180,140,230,.16),
      0 0 0 4px rgba(180,126,224,.55),
      0 0 20px 8px rgba(123,79,176,.5);
  }
  100%{
    box-shadow:
      0 4px 16px rgba(0,0,0,.45),
      0 2px 6px rgba(0,0,0,.3),
      inset 0 1px 0 rgba(180,140,230,.16),
      0 0 0 12px rgba(180,126,224,0),
      0 0 30px 15px rgba(123,79,176,0);
  }
}
/* 他カードのスライドアウト */
.venue-card.slide-out{
  animation:cardSlideOut .2s ease-in forwards !important;
  pointer-events:none;
}
@keyframes cardSlideOut{
  0%{
    opacity:1;
    transform:translateY(0);
  }
  100%{
    opacity:0;
    transform:translateY(80px);
  }
}
/* タップ時のパーンと弾けるエフェクト */
@keyframes tapBurst{
  0%{
    transform:scale(0);
    opacity:1;
  }
  100%{
    transform:scale(2.5);
    opacity:0;
  }
}
.venue-card.tapped::after{
  content:'';
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(168,126,224,.45) 0%, rgba(123,79,176,.12) 40%, transparent 70%);
  left:var(--tap-x, 50%);
  top:var(--tap-y, 50%);
  transform:translate(-50%, -50%) scale(0);
  animation:tapBurst .4s ease-out forwards;
  pointer-events:none;
}

.venue-main{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.venue-left{display:flex;flex-direction:column;gap:7px;min-width:0;}
.venue-name-row{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;}   /* 会場名のベースラインを基準（font-size変更にも追従） */
/* 会場名：サイズアップ＋真っ黒影 */
.venue-name{
  font-size:30px;font-weight:700;color:#f2f3f5;letter-spacing:.02em;
  text-shadow:0 2px 4px rgba(0,0,0,.95), 0 1px 2px rgba(0,0,0,.9);
}
/* カップ名（下段） */
.venue-cup{
  font-size:12px;font-weight:500;
  color:rgba(255,255,255,.5);
  letter-spacing:.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:100%;
}
.venue-grade{
  display:inline-flex;align-items:center;justify-content:center;
  padding:0 7px;border-radius:3px;            /* 縦を狭く・横をほんの少し広く */
  line-height:1.15;                           /* 縦幅を詰める */
  font-size:12px;font-weight:900;color:#fff;  /* バッジ内の文字をサイズアップ */
  letter-spacing:.02em;
  position:relative;top:0;                   /* ベースライン基準からの微調整（+で下・-で上） */
  -webkit-text-stroke:.3px rgba(0,0,0,.2);
  text-shadow:0 -1px 1px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.2), inset 0 0 0 rgba(0,0,0,.3);
  box-shadow:0 2px 5px rgba(0,0,0,.95),0 1px 2px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.35),inset 0 -1px 0 rgba(0,0,0,.15);
}
.grade-f1{background:linear-gradient(180deg, #f0a020 0%, #cc7a00 50%, #b86e00 100%);}
.grade-f2{background:linear-gradient(180deg, #2874c0 0%, #1a5a9e 50%, #144a85 100%);}
.grade-g3{background:linear-gradient(180deg, #4caf50 0%, #2e8b32 50%, #1b6e20 100%);}
.grade-g2{background:linear-gradient(180deg, #b040c8 0%, #8e24aa 50%, #6a1b80 100%);}
.grade-g1{background:linear-gradient(180deg, #ef4444 0%, #c62828 50%, #a01e1e 100%);}
.grade-gp{background:linear-gradient(180deg, #ffd700 0%, #d4a800 50%, #b08e00 100%);color:#0f0f0f;text-shadow:0 1px 0 rgba(255,255,255,.3),0 -1px 1px rgba(0,0,0,.15);}
.venue-timeslot-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;
}
.venue-timeslot-icon svg{
  width:16px;height:16px;
}

.venue-day{font-size:12px;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.02em;position:relative;top:0;}

.venue-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;flex-shrink:0;}
.venue-start{font-size:15px;font-weight:700;color:rgba(255,255,255,.9);white-space:nowrap;}
.venue-start-label{font-size:10px;color:rgba(255,255,255,.45);margin-right:5px;font-weight:500;}
/* 締切15分以内：赤表示 */
.venue-start.urgent{color:#ff4a5a;text-shadow:0 0 10px rgba(255,74,90,.45);}
.venue-start.urgent .venue-start-label{color:rgba(255,74,90,.75);}

.venue-countdown{
  font-size:13px;font-weight:700;color:#e03040;
  display:flex;align-items:center;gap:4px;
}
.countdown-dot{
  width:6px;height:6px;background:#e03040;border-radius:50%;
  animation:pulse 1s ease infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.venue-finished{
  font-size:13px;font-weight:600;color:rgba(255,255,255,.45);
}
</style>
</head>
<body>
<div class="mid-statusbar" aria-hidden="true"></div>
<div id="midnight">

  <!-- 遷移画面（最低3秒表示・app起動アニメ流用） -->
  <div class="mn-boot" id="mnBoot">
    <img src="midnight-logo.png" alt="" class="mn-boot-logo" id="mnBootLogo">
  </div>

  <!-- ヘッダー画像 -->
  <div class="mid-hero">
    <img src="midnight-header.jpg" alt="ミッド脳" width="1200" height="688">
    <!-- 右上：家ボタン（タップでホームへ） -->
    <a class="mid-home-btn" href="https://brainkeirin.jp" aria-label="Brainホームへ戻る">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9.5 21v-6h5v6"/></svg>
    </a>
  </div>

  <!-- 見出し：ミッドナイト開催一覧 -->
  <div class="mid-heading-wrap">
    <span class="mid-heading">ミッドナイト開催一覧</span>
  </div>

  <!-- コンテンツ：開催カード（app.html流用／内容・仕様は後日変更予定） -->
  <main class="mid-main" id="midMain">
    <section class="mid-race-section">
      <div id="midRaceCards">
        <div class="mid-loading"><span class="mid-spinner"></span>開催情報を取得中…</div>
      </div>
    </section>
  </main>

  <!-- フッター -->
  <footer class="mid-footer">
    <div class="brand">Midnight</div>
    <div class="mid-divider"></div>
    <nav class="mid-nav">
      <span id="toTop">ページ上部へ</span>
      <a href="https://note.com/qa/brainkeirin" target="_blank" rel="noopener">ご要望はコチラ</a>
    </nav>
    <div class="mid-copy">brain</div>
  </footer>

</div>

<script>
  // ===== 遷移画面（app起動トランジション流用／最低3秒表示） =====
  (function(){
    const sleep = (ms)=>new Promise(r=>setTimeout(r, ms));
    async function runBoot(){
      const boot = document.getElementById('mnBoot');
      const logo = document.getElementById('mnBootLogo');
      if(!boot || !logo) return;
      const start = Date.now();
      // ロゴふわっとフェードイン
      await sleep(300);
      logo.classList.add('visible');
      // ブルブル揺れ
      await sleep(500);
      logo.classList.add('shake');
      // 最低3秒は遷移画面を見せる
      const elapsed = Date.now() - start;
      await sleep(Math.max(0, 3000 - elapsed));
      // 解除：ロゴを消す→一瞬フラッシュ→もわーんとフェードアウト
      logo.classList.add('hide');
      logo.classList.remove('visible','shake');
      await sleep(200);
      boot.classList.add('flash');
      await sleep(150);
      boot.classList.remove('flash');
      boot.classList.add('fade-out');
      // ローディング解除と同時にコンテンツの登場演出を開始（ヘッダー→見出し→バー→カード1,2,3…）
      document.getElementById('midnight').classList.add('reveal');
      MID_REVEALED = true;
      midStaggerCards(1050);       // マーカー表示完了後、ワンテンポ置いてカードを順次表示
      await sleep(600);
      boot.style.display = 'none';
    }
    if(document.readyState === 'loading'){
      document.addEventListener('DOMContentLoaded', runBoot);
    } else {
      runBoot();
    }
  })();

  // ページ上部へ
  document.getElementById('toTop').addEventListener('click', function(){
    window.scrollTo({top:0, behavior:'smooth'});
  });

  // ===== 開催カード（app.html流用・ミッドナイトのみ抽出／2026-07-12） =====
  const PROXY_URL = 'https://royal-mode-67a9.bomayekeirin.workers.dev';
  let MID_VENUES = [];
  let MID_REVEALED = false;   // 初回の登場演出を1度だけ走らせる

  const TIME_SLOT_ICONS = {
    morning: `<svg viewBox="0 0 24 24" fill="none"><defs><clipPath id="horizon2"><rect x="0" y="0" width="24" height="16"/></clipPath></defs><g clip-path="url(#horizon2)"><circle cx="12" cy="16" r="7" fill="#FFB300"/></g><path d="M12 2v3M4.22 6.22l2.12 2.12M19.78 6.22l-2.12 2.12M2 14h3M19 14h3" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/><path d="M3 20h18" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/></svg>`,
    day: `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" fill="#F4792A"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="#F4792A" stroke-width="2" stroke-linecap="round"/></svg>`,
    nighter: `<svg viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="#8BB8E8"/></svg>`,
    midnight: `<svg viewBox="0 0 24 24" fill="none"><path d="M12 2l1.09 3.36h3.53l-2.86 2.08 1.09 3.36L12 8.72l-2.85 2.08 1.09-3.36-2.86-2.08h3.53L12 2z" fill="#5E35B1"/><path d="M5 10l.65 2h2.1l-1.7 1.24.65 2L5 14.02l-1.7 1.22.65-2-1.7-1.24h2.1L5 10z" fill="#5E35B1"/><path d="M19 15l.52 1.6h1.68l-1.36 1 .52 1.6-1.36-.98-1.36.98.52-1.6-1.36-1h1.68L19 15z" fill="#5E35B1"/></svg>`
  };

  async function midFetchVenueList(){
    const box = document.getElementById('midRaceCards');
    try{
      const resp = await fetch(`${PROXY_URL}?url=${encodeURIComponent('https://www.winticket.jp/keirin')}`);
      const html = await resp.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const todayPanel = doc.querySelector('#panel-keirin-race-today');
      if(!todayPanel){ box.innerHTML = '<div class="venue-empty">開催情報の取得に失敗しました</div>'; return; }

      const venues = [];
      todayPanel.querySelectorAll('[class*="RecentRaceListItem___Wrapper-sc"]').forEach(el=>{
        const venueEl = el.querySelector('[class*="VenueName"]');
        const gradeEl = el.querySelector('[class*="GradeIcon"]');
        let linkEl = el.querySelector('a[href*="racecard"]');
        let linkType = 'racecard';
        if(!linkEl){ linkEl = el.querySelector('a[href*="raceresult"]'); linkType = 'raceresult'; }
        const timeEl = el.querySelector('time[class*="TimeText"]');
        if(!venueEl || !linkEl) return;

        // 時間帯：ミッドナイトのみ採用
        let timeSlot = 'day';
        el.querySelectorAll('[class*="CupIcon"] svg title').forEach(icon=>{
          const label = icon.textContent;
          if(label === 'モーニング') timeSlot = 'morning';
          else if(label === 'ナイター') timeSlot = 'nighter';
          else if(label === 'ミッドナイト') timeSlot = 'midnight';
        });
        if(timeSlot !== 'midnight') return;   // ★ミッドナイト開催のみ

        const venue = venueEl.textContent.trim();
        const grade = (gradeEl?.getAttribute('aria-label') || 'F1').toUpperCase();
        const link = linkEl.getAttribute('href');
        const startTime = timeEl?.textContent.trim() || '--:--';

        let day = '';
        el.querySelectorAll('[class*="Text___Text"]').forEach(t=>{
          const txt = t.textContent.trim();
          if(txt.includes('日目') || txt === '初日' || txt === '最終日') day = txt;
        });

        const match = link.match(/\/keirin\/([^/]+)\/(racecard|raceresult)\/(\d+)\/(\d+)(?:\/(\d+))?/);
        if(!match) return;
        const venueId = match[1], raceCode = match[3], dayNum = match[4];
        const currentRaceNum = match[5] ? parseInt(match[5]) : 1;
        if(venues.find(v=>v.venueId===venueId && v.raceCode===raceCode && v.dayNum===dayNum)) return;

        venues.push({ venue, venueId, grade, raceCode, dayNum, day, link, linkType,
                      startTime, timeSlot, currentRaceNum, nextRace:null });
      });

      MID_VENUES = venues;
      midRenderVenueCards(venues);            // 先に描画（カップ名は後追いで差し込み）
      midFetchCupNames(venues);
    }catch(e){
      console.error('midFetchVenueList error:', e);
      box.innerHTML = '<div class="venue-empty">開催情報の取得に失敗しました</div>';
    }
  }

  // カップ名（cup API）を並列取得してカードへ差し込み
  async function midFetchCupNames(venues){
    await Promise.all(venues.map(async (v, idx)=>{
      try{
        const api = `https://api.winticket.jp/v1/keirin/cups/${v.raceCode}?pfm=web`;
        const resp = await fetch(`${PROXY_URL}?url=${encodeURIComponent(api)}`);
        const j = JSON.parse(await resp.text());
        const name = (j && j.cup && j.cup.name) ? j.cup.name : '';
        if(!name) return;
        v.cupName = name;
        const el = document.querySelector(`.venue-card[data-venue-idx="${idx}"] .venue-cup`);
        if(el) el.textContent = name;
      }catch(e){ /* 取得失敗時は空のまま */ }
    }));
  }

  function midRenderVenueCards(venues){
    const container = document.getElementById('midRaceCards');
    if(!venues.length){
      container.innerHTML = '<div class="venue-empty">本日のミッドナイト開催はありません</div>';
      return;
    }
    container.innerHTML = venues.map((v, idx)=>{
      const gradeClass = `grade-${v.grade.toLowerCase()}`;
      const nextStart = v.startTime || '--:--';

      // 直近締切＝発走5分前
      const now = new Date();
      const nowMinutes = now.getHours()*60 + now.getMinutes();
      let deadlineTime = null, deadlineRemaining = null, isUrgent = false;
      let isFinished = (v.linkType === 'raceresult');

      if(nextStart && nextStart !== '--:--'){
        const [h, m] = nextStart.split(':').map(Number);
        const deadlineMinutes = h*60 + m - 5;
        const dH = Math.floor(deadlineMinutes/60), dM = deadlineMinutes % 60;
        deadlineTime = `${String(dH).padStart(2,'0')}:${String(dM).padStart(2,'0')}`;
        deadlineRemaining = deadlineMinutes - nowMinutes;
        if(deadlineRemaining <= 0){ isFinished = true; deadlineTime = null; }
        else if(deadlineRemaining <= 15){ isUrgent = true; }   // 15分以内は赤
      }

      let rightContent;
      if(isFinished) rightContent = `<span class="venue-finished">終了</span>`;
      else if(deadlineTime !== null) rightContent = `<span class="venue-start${isUrgent ? ' urgent' : ''}"><span class="venue-start-label">直近締切</span>${deadlineTime}</span>`;
      else rightContent = `<span class="venue-start"><span class="venue-start-label">発走</span>${nextStart}</span>`;

      return `
      <div class="venue-card ${isFinished ? 'finished' : ''}" data-venue-idx="${idx}" data-finished="${isFinished}" onclick="midToggleVenue(${idx}, event)">
        <div class="venue-main">
          <div class="venue-left">
            <div class="venue-name-row">
              <span class="venue-name">${v.venue}</span>
              <span class="venue-grade ${gradeClass}">${v.grade}</span>
              <span class="venue-day">${v.day || ''}</span>
            </div>
            <span class="venue-cup">${v.cupName || ''}</span>
          </div>
          <div class="venue-right">${rightContent}</div>
        </div>
        <div class="venue-expand">
          <div class="venue-expand-inner">
            <div class="mid-race-selector">
              <div class="mid-race-selector-inner" id="midRaces-${idx}">
                <div class="mid-race-loading"><span class="mid-spinner"></span>レース取得中…</div>
              </div>
            </div>
          </div>
        </div>
        <div class="venue-toggle" aria-label="レース一覧を開く">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9.5l6 5.5 6-5.5"/></svg>
        </div>
      </div>`;
    }).join('');

    // カードの順次表示は reveal（ローディング解除）後に開始する
    if(MID_REVEALED) midStaggerCards(0);
    // 未revealなら描画のみ（非表示のまま）。reveal時に midStaggerCards が呼ばれる
  }

  // カードを上から順に、ほんの少しずつ時間差で表示
  function midStaggerCards(startDelay){
    const cards = document.querySelectorAll('#midRaceCards .venue-card');
    cards.forEach((card, i)=>{
      if(card.classList.contains('show')) return;
      setTimeout(()=>card.classList.add('show'), (startDelay || 0) + 90 * i);
    });
  }

  // 開催カードのトグル：下方向に伸びてレースセレクターを表示
  const MID_RACES_CACHE = {};   // idx → races[]
  function midToggleVenue(idx, event){
    // レースボタン上のタップは展開トグルの対象外（レース選択が優先）
    if(event && event.target && event.target.closest && event.target.closest('.mid-race-btn')) return;
    const card = document.querySelector(`.venue-card[data-venue-idx="${idx}"]`);
    if(!card) return;
    const opening = !card.classList.contains('expanded');
    card.classList.toggle('expanded', opening);
    if(opening && !MID_RACES_CACHE[idx]) midFetchRaces(idx);

    // タップ波紋（カード内のどこを押しても）
    if(event){
      const rect = card.getBoundingClientRect();
      card.style.setProperty('--tap-x', (event.clientX - rect.left) + 'px');
      card.style.setProperty('--tap-y', (event.clientY - rect.top) + 'px');
      card.classList.remove('tapped');
      void card.offsetWidth;
      card.classList.add('tapped');
      setTimeout(()=>card.classList.remove('tapped'), 420);
    }
  }

  // 開催のレース一覧（cup APIから1リクエストで取得：番号・クラス・締切）
  async function midFetchRaces(idx){
    const v = MID_VENUES[idx];
    const box = document.getElementById(`midRaces-${idx}`);
    if(!v || !box) return;
    try{
      const api = `https://api.winticket.jp/v1/keirin/cups/${v.raceCode}?pfm=web`;
      const resp = await fetch(`${PROXY_URL}?url=${encodeURIComponent(api)}`);
      const j = JSON.parse(await resp.text());
      const sch = (j.schedules || []).find(s => String(s.day) === String(v.dayNum));
      if(!sch){ box.innerHTML = '<div class="mid-race-loading">レース情報が取得できませんでした</div>'; return; }
      const races = (j.races || [])
        .filter(r => r.scheduleId === sch.id)
        .sort((a,b) => a.number - b.number);
      MID_RACES_CACHE[idx] = races;
      midRenderRaceSelector(idx, races);
    }catch(e){
      console.error('midFetchRaces error:', e);
      box.innerHTML = '<div class="mid-race-loading">レース情報が取得できませんでした</div>';
    }
  }

  // レースセレクター描画（app流用・ミッドナイト仕様）
  function midRenderRaceSelector(idx, races){
    const box = document.getElementById(`midRaces-${idx}`);
    if(!box) return;
    if(!races.length){ box.innerHTML = '<div class="mid-race-loading">レースがありません</div>'; return; }
    const nowSec = Math.floor(Date.now()/1000);

    box.innerHTML = races.map(r=>{
      // クラス表記の短縮（app準拠）
      let cls = (r.raceType3 || r.raceType || '');
      cls = cls.replace(/チャレンジ/g,'チ').replace(/ガールズケイリン|ガールズ/g,'L級')
               .replace(/初日特選/g,'初特選').replace(/一次予選/g,'一予選').replace(/二次予選/g,'二予選');

      let dText = '', dClass = '';
      if(typeof r.closeAt === 'number'){
        const remain = Math.floor((r.closeAt - nowSec)/60);
        if(remain <= 0){ dText = '終了'; dClass = 'ended'; }
        else if(remain <= 20){ dText = `締切${remain}分前`; dClass = 'countdown'; }
        else{
          const d = new Date((r.closeAt + 9*3600)*1000);
          const p = n2 => String(n2).padStart(2,'0');
          dText = `締切${p(d.getUTCHours())}:${p(d.getUTCMinutes())}`;
        }
      }
      return `
        <button class="mid-race-btn ${dClass==='ended'?'ended':''}" data-venue-idx="${idx}" data-race-num="${r.number}" onclick="midSelectRace(${idx}, ${r.number}, event)">
          <span class="mid-race-btn-num">${r.number}R</span>
          <span class="mid-race-btn-deadline ${dClass}">${dText}</span>
          <span class="mid-race-btn-class">${cls}</span>
        </button>`;
    }).join('');
  }

  // レース番号タップ → 出走表ページ（/midrace）へ遷移。※ここでmid入場コードが要求される
  function midSelectRace(idx, raceNum, event){
    event.stopPropagation();
    const btn = event.currentTarget;
    if(btn){ btn.style.transform='scale(.94)'; setTimeout(()=>{ btn.style.transform=''; }, 140); }
    const v = MID_VENUES[idx];
    if(!v) return;
    const q = new URLSearchParams({
      venue: v.venueId || '',
      name:  v.venue || '',
      code:  v.raceCode || '',
      day:   String(v.dayNum || 1),
      race:  String(raceNum),
      grade: v.grade || 'F2',
      dayLabel: v.day || ''
    });
    location.href = '/midrace?' + q.toString();
  }

  // 起動時に開催取得（遷移画面と並行）
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', midFetchVenueList);
  }else{
    midFetchVenueList();
  }

</script>
</body>
