<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script>
  /* 初回読み込み時に必ず最上部から表示（ブラウザのスクロール位置復元を無効化） */
  if ("scrollRestoration" in history) history.scrollRestoration = "manual";
  window.addEventListener("load", function(){ window.scrollTo(0, 0); });
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ミッド脳 | Brain</title>

<!-- ===== OGP / SNS共有サムネイル ===== -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Brain">
<meta property="og:title" content="ミッド脳 | Brain">
<meta property="og:description" content="ミッドナイト競輪の買い目生成">
<meta property="og:url" content="https://brainkeirin.jp/midnight">
<meta property="og:image" content="https://brainkeirin.jp/midnight-header.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="688">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ミッド脳 | Brain">
<meta name="twitter:description" content="ミッドナイト競輪の買い目生成">
<meta name="twitter:image" content="https://brainkeirin.jp/midnight-header.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#060607;
    --line:rgba(255,255,255,.08);
    /* ミッドナイト＝紫グラデーション */
    --mid-deep:#4a2a6a;
    --mid:#7b4fb0;
    --mid-light:#a97fd0;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%;}
  html{background:var(--bg);}          /* オーバースクロール時の奥背景も同色 */
  body{
    background:var(--bg);
    color:rgba(255,255,255,.85);
    font-family:'Oswald',-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    min-height:100vh;
    overflow-x:clip;                   /* 横はみ出し防止（hiddenでなくclip） */
  }
  #midnight{
    min-height:100vh;
    display:flex;flex-direction:column;
    background:var(--bg);
  }

  /* ===== ヘッダー画像（通常ヘッダーバーなし） ===== */
  .mid-hero{
    position:relative;
    width:100%;
    line-height:0;                     /* 画像下の隙間消し */
    background:var(--bg);
  }
  .mid-hero img{
    display:block;
    width:100%;
    height:auto;
  }

  /* 右上：家ボタン（タップでホームへ遷移） */
  .mid-home-btn{
    position:absolute;
    right:calc(12px + env(safe-area-inset-right));
    top:calc(12px + env(safe-area-inset-top));
    width:40px;height:40px;
    display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.72);
    text-decoration:none;border-radius:9px;
    background:rgba(0,0,0,.2);
    -webkit-tap-highlight-color:transparent;
    z-index:10;
    transition:color .18s,background .18s,transform .12s;
  }
  .mid-home-btn:hover{color:#fff;background:rgba(0,0,0,.32);}
  .mid-home-btn:active{transform:scale(.9);}

  /* ===== コンテンツ領域（内容は後日実装・現状はスペースのみ） ===== */
  .mid-main{
    flex:1;
    background:var(--bg);
    padding:40px 20px;
    /* コンテンツ未実装：ここに買い目等が入る予定 */
  }

  /* ===== フッター（resultのフッター流用・バーを紫グラデーションに） ===== */
  .mid-footer{
    background:var(--bg);
    border-top:1px solid var(--line);
    padding:22px 20px;
    padding-bottom:max(26px, env(safe-area-inset-bottom));
    position:relative;z-index:50;
  }
  .mid-footer .brand{
    text-align:center;
    font-family:'Oswald',sans-serif;font-size:15px;font-weight:400;
    letter-spacing:.04em;color:rgba(255,255,255,.72);
    margin-bottom:7px;padding-left:.04em;
  }
  .mid-footer .brand::after{
    content:'';display:block;width:28px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,var(--mid-deep),var(--mid-light));
    margin:8px auto 0;opacity:.9;
  }
  .mid-divider{height:1px;background:rgba(255,255,255,.1);margin:0 0 16px;}
  .mid-nav{display:flex;justify-content:center;flex-wrap:wrap;gap:26px;margin-bottom:16px;}
  .mid-nav a,.mid-nav span{
    font-size:12px;color:rgba(255,255,255,.5);
    text-decoration:none;cursor:pointer;transition:color .2s;
  }
  .mid-nav a:hover,.mid-nav span:hover{color:rgba(255,255,255,.8);}
  .mid-copy{text-align:center;font-size:10px;letter-spacing:.05em;color:rgba(255,255,255,.35);}
</style>
</head>
<body>
<div id="midnight">

  <!-- ヘッダー画像 -->
  <div class="mid-hero">
    <img src="midnight-header.jpg" alt="ミッド脳" width="1200" height="688">
    <!-- 右上：家ボタン（タップでホームへ） -->
    <a class="mid-home-btn" href="https://brainkeirin.jp" aria-label="Brainホームへ戻る">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9.5 21v-6h5v6"/></svg>
    </a>
  </div>

  <!-- コンテンツ（後日指示・現状は空きスペース） -->
  <main class="mid-main" id="midMain">
  </main>

  <!-- フッター -->
  <footer class="mid-footer">
    <div class="brand">Midnight</div>
    <div class="mid-divider"></div>
    <nav class="mid-nav">
      <span id="toTop">ページ上部へ</span>
      <a href="https://note.com/qa/brainkeirin" target="_blank" rel="noopener">ご要望はコチラ</a>
    </nav>
    <div class="mid-copy">brain</div>
  </footer>

</div>

<script>
  // ページ上部へ
  document.getElementById('toTop').addEventListener('click', function(){
    window.scrollTo({top:0, behavior:'smooth'});
  });

</script>
</body>
</html>
