<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script>
  /* 初回読み込み時に必ず最上部から表示（ブラウザのスクロール位置復元を無効化） */
  if ("scrollRestoration" in history) history.scrollRestoration = "manual";
  window.addEventListener("load", function(){ window.scrollTo(0, 0); });
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="robots" content="noindex,nofollow">
<title>Brain Race Result</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f0f0f;
    --header:#15141a;
    --line:rgba(255,255,255,.08);
    --txt:rgba(255,255,255,.92);
    --sub:rgba(255,255,255,.5);
    --faint:rgba(255,255,255,.3);
    --rose:#d98ca6;
    --rose-soft:#c25f7d;
    --rose-deep:#b04a6a;
    --rose-deepest:#a34862;
    --err:#e0738f;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{background:var(--bg);}
  body{
    background:var(--bg);
    color:var(--txt);
    font-family:'Noto Sans JP',sans-serif;
    min-height:100vh;
    overflow-x:clip;
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }

  /* ===== 共通ロゴ動き ===== */
  @keyframes logoShake{
    0%{transform:translate(0,0);}
    1.5%{transform:translate(-2px,1px);}
    3%{transform:translate(1px,-2px);}
    4.5%{transform:translate(-1px,-1px);}
    6%{transform:translate(2px,1px);}
    7.5%{transform:translate(-1px,2px);}
    9%{transform:translate(1px,-1px);}
    10.5%{transform:translate(-2px,0);}
    12%{transform:translate(1px,1px);}
    13.5%{transform:translate(-1px,-1px);}
    15%{transform:translate(0,0);}
    100%{transform:translate(0,0);}
  }
  @keyframes shakeX{0%,100%{transform:translateX(0);}18%{transform:translateX(-9px);}38%{transform:translateX(9px);}58%{transform:translateX(-6px);}78%{transform:translateX(6px);}}
  @keyframes softPulse{0%,100%{opacity:.42;}50%{opacity:.62;}}

  /* ===== 遷移画面（ブラックアウト） ===== */
  #boot{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:24px;z-index:100;
    transition:opacity .6s ease;
  }
  #boot.hide{opacity:0;pointer-events:none;}
  .boot-logo{
    width:80px;height:80px;display:block;
    opacity:0;transition:opacity .8s ease;
    animation:logoShake 1.4s ease-in-out infinite;
  }
  .boot-logo.in{opacity:.45;}
  .boot-word{
    font-family:'Oswald',sans-serif;font-weight:300;
    font-size:14px;letter-spacing:.05em;
    color:#7c7c7c;
    padding-left:.05em;
    opacity:0;transition:opacity .9s ease .15s;
  }
  .boot-word.in{opacity:1;}

  /* ===== ログイン画面 ===== */
  #login{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px calc(24px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(24px + env(safe-area-inset-left));
    z-index:90;opacity:0;pointer-events:none;
    transition:opacity .55s ease;
  }
  #login.show{opacity:1;pointer-events:auto;}
  #login.leaving{transition:opacity 1.2s ease;}
  .login-logo{width:48px;height:48px;display:block;opacity:.45;margin-bottom:24px;}
  .login-word{
    font-family:'Oswald',sans-serif;font-weight:400;
    font-size:28px;letter-spacing:.02em;color:rgba(255,255,255,.72);
    position:relative;padding-bottom:11px;padding-left:.02em;
  }
  .login-word::after{
    content:'';position:absolute;left:50%;bottom:0;
    transform:translateX(-50%);
    width:30px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,var(--rose-deep),var(--rose));
  }
  .login-sub{
    margin-top:15px;font-size:11.5px;letter-spacing:.2em;
    color:var(--faint);padding-left:.2em;
  }

  /* セグメントPIN（署名要素） */
  .pin{display:flex;gap:12px;margin-top:38px;}
  .pin.error{animation:shakeX .42s ease;}
  .pin input{
    width:52px;height:64px;text-align:center;
    font-family:'Bebas Neue',cursive;font-size:32px;line-height:1;
    color:var(--txt);caret-color:var(--rose);
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.12);
    border-radius:13px;outline:none;
    transition:border-color .2s,box-shadow .2s,background .2s;
  }
  .pin input::-webkit-outer-spin-button,
  .pin input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .pin input.filled{border-color:rgba(217,140,166,.38);background:rgba(217,140,166,.06);}
  .pin input:focus{
    border-color:var(--rose-soft);
    background:rgba(255,255,255,.06);
    box-shadow:0 0 0 3px rgba(194,95,125,.18), 0 0 20px rgba(217,140,166,.22);
  }

  .login-err{
    height:18px;margin-top:18px;
    font-size:12px;letter-spacing:.04em;color:var(--err);
    opacity:0;transition:opacity .2s;
  }
  .login-err.show{opacity:1;}

  /* ===== データバンク ホーム ===== */
  #home{display:none;flex-direction:column;min-height:100vh;background:#0f0f0f;}
  #home.show{display:flex;}

  .db-header{
    background:#0f0f0f;
    border-bottom:1px solid var(--line);
    padding:env(safe-area-inset-top) 12px 0;
    min-height:calc(56px + env(safe-area-inset-top));
    display:flex;align-items:center;justify-content:space-between;
    /* v9 UI: ヘッダーは通常フロー（メインと同階層）。直下がページ最上部 */
    position:static;z-index:auto;
    transform:none;transition:none;
  }
  .db-header .brr-head-spacer{width:40px;flex:0 0 40px;}
  .db-header .brr-home-btn{
    width:40px;height:40px;flex:0 0 40px;
    display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.72);text-decoration:none;border-radius:9px;
    -webkit-tap-highlight-color:transparent;
    transition:color .18s,background .18s,transform .12s;
  }
  .db-header .brr-home-btn:hover{color:#fff;background:rgba(255,255,255,.08);}
  .db-header .brr-home-btn:active{transform:scale(.9);}
  .db-header .title{
    font-family:'Oswald',sans-serif;font-size:19px;font-weight:400;
    letter-spacing:.03em;color:rgba(255,255,255,.68);
  }

  .db-main{
    flex:1;
    position:relative;overflow:hidden;
    background:#0f0f0f;
    display:flex;align-items:center;justify-content:center;
    padding:72px 24px;
  }
  /* 中央から広がる白ズーム */
  .db-white{
    position:absolute;top:50%;left:50%;
    width:320vmax;height:320vmax;
    transform:translate(-50%,-50%) scale(0);
    transform-origin:center;
    background:radial-gradient(circle, #ffffff 55%, rgba(255,255,255,0) 82%);
    z-index:1;
    transition:transform 2.8s cubic-bezier(.33,0,.3,1);
  }
  .db-content{
    position:relative;z-index:2;
    display:flex;flex-direction:column;align-items:center;
    text-align:center;gap:16px;
    opacity:0;transition:opacity .7s ease;
  }
  .db-content img{width:50px;height:50px;display:block;animation:softPulse 3s ease-in-out infinite;}
  .db-soon-sub{font-size:11.5px;letter-spacing:.05em;color:#9a9a9a;line-height:1.7;}

  /* 演出ステート */
  #home.bars-in .db-header{transform:translateY(0);}
  #home.bars-in .db-footer{transform:translateY(0);}
  #home.white-in .db-white{transform:translate(-50%,-50%) scale(1);}
  #home.content-in .db-content{opacity:1;}
  /* アンロック済みの直接表示（演出なしで最終状態） */
  #home.settled .db-header,#home.settled .db-footer{transform:none;transition:none;}
  #home.settled .db-white{transform:translate(-50%,-50%) scale(1);transition:none;}
  #home.settled .db-content{opacity:1;transition:none;}

  /* ===== フッター（gpt流用） ===== */
  .db-footer{
    background:#0f0f0f;
    border-top:1px solid var(--line);
    padding:22px 20px;
    padding-bottom:max(26px, env(safe-area-inset-bottom));
    position:relative;z-index:auto;
    transform:none;transition:none;
  }
  .db-footer .brand{
    text-align:center;
    font-family:'Oswald',sans-serif;font-size:15px;font-weight:400;
    letter-spacing:.04em;color:rgba(255,255,255,.72);
    margin-bottom:7px;padding-left:.04em;
  }
  .db-footer .brand::after{
    content:'';display:block;width:28px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,var(--rose-deep),var(--rose));
    margin:8px auto 0;opacity:.85;
  }
  .db-divider{height:1px;background:rgba(255,255,255,.1);margin:0 0 16px;}
  .db-nav{display:flex;justify-content:center;flex-wrap:wrap;gap:26px;margin-bottom:16px;}
  .db-nav a,.db-nav span{
    font-size:12px;color:rgba(255,255,255,.5);
    text-decoration:none;cursor:pointer;transition:color .2s;
  }
  .db-nav a:hover,.db-nav span:hover{color:rgba(255,255,255,.8);}
  .db-copy{text-align:center;font-size:10px;letter-spacing:.05em;color:rgba(255,255,255,.35);}

  @media (prefers-reduced-motion:reduce){
    .boot-logo,.db-content img{animation:none;}
    #boot,#login,.pin input{transition:none;}
  }

  /* ===== Brain Race Result ライトモード本文 ===== */
  :root{
    --brr-bg:#f2f3f5;
    --brr-card:#ffffff;
    --brr-text:#3a3d4a;
    --brr-head:#1a1a1a;
    --brr-sub:#8a8f9a;
    --brr-line:#ececef;
    --brr-rose:#e15b82;
    --brr-rose-deep:#c94068;
    --brr-hit:#e0342f;
  }
  /* 本文（ライト・スクロール）。ダークヘッダー＋ライト本文＝出走表画面と同枠組み */
  #home.brr-mode .db-main{
    display:block;   /* v9 UI: 内部スクロール廃止→ページ全体スクロール（ヘッダーと同階層） */
    background:var(--brr-bg);
    padding:0;
    align-items:stretch;justify-content:flex-start;
  }
  #home.brr-mode .db-white{display:none;} /* 白ズーム演出はライト本文では不要 */

  .brr-toolbar{
    position:sticky;top:0;z-index:20;
    background:rgba(242,243,245,.94);
    backdrop-filter:saturate(1.6) blur(10px);-webkit-backdrop-filter:saturate(1.6) blur(10px);
    border-bottom:1px solid var(--brr-line);
    padding:24px 8px 16px;
    display:flex;flex-direction:column;gap:14px;
  }
  .brr-btn{
    position:relative;overflow:hidden;
    width:100%;border-radius:15px;
    padding:15px 22px;font-size:14px;font-weight:600;letter-spacing:.06em;
    font-family:'Noto Sans JP',sans-serif;cursor:pointer;
    background:#ffffff;   /* v9 UI: 真っ白＋影 */
    color:#3a3d4a;
    border:1px solid rgba(20,25,40,.08);
    box-shadow:0 4px 12px rgba(20,25,40,.16);
    transition:transform .14s cubic-bezier(.2,.9,.3,1.2), box-shadow .2s ease, opacity .2s ease, filter .2s ease;
  }
  .brr-btn>*{position:relative;z-index:2;}
  /* 静止時：ゆっくり流れる淡い光沢のスイープ */
  .brr-btn::before{ content:none; }   /* v9 UI: 光沢スイープ撤廃 */
  @keyframes brrBtnSheen{
    0%{left:-60%;} 42%{left:130%;} 100%{left:130%;}
  }
  /* 取得中：ボタン内をローズのシマーが流れ続ける */
  .brr-btn.loading{
    color:var(--brr-rose-deep);
    background:linear-gradient(90deg,#fdeef2 0%,#f7dae3 25%,#fdeef2 50%,#f7dae3 75%,#fdeef2 100%);
    background-size:200% 100%;
    animation:brrBtnLoad 1.4s linear infinite;
    cursor:progress;
  }
  .brr-btn.loading::before{ animation:none; opacity:0; }
  @keyframes brrBtnLoad{ 0%{background-position:0% 0;} 100%{background-position:-200% 0;} }
  .brr-btn:active{
    transform:translateY(1px) scale(.995);
    box-shadow:0 1px 3px rgba(20,25,40,.16),
               0 1px 0 rgba(255,255,255,.7) inset;
  }
  .brr-btn-get{
    background:linear-gradient(180deg,#ffffff 0%,#fbeef2 100%);
    color:var(--brr-rose-deep);
    border:1px solid rgba(201,64,104,.22);
    box-shadow:0 5px 14px rgba(201,64,104,.20),
               0 1px 0 rgba(255,255,255,.95) inset,
               0 -2px 4px rgba(201,64,104,.05) inset;
  }
  .brr-btn-get:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 20px rgba(201,64,104,.28),
               0 1px 0 rgba(255,255,255,.95) inset;
  }
  .brr-btn-get.hidden{display:none;}
  .brr-btn-result{ display:none; }
  .brr-btn-result.show{display:block;animation:brrPop .4s cubic-bezier(.2,1.3,.4,1) both;}
  @keyframes brrPop{0%{opacity:0;transform:translateY(-8px) scale(.96);}100%{opacity:1;transform:none;}}
  .brr-btn:disabled{opacity:.55;cursor:default;box-shadow:0 2px 6px rgba(20,25,40,.1),0 1px 0 rgba(255,255,255,.8) inset;}
  /* 総括情報パネル */
  .brr-summary{
    display:none;max-width:620px;margin:16px auto 0;width:100%;box-sizing:border-box;
    padding:16px 18px 18px;background:var(--brr-card);
    border:1px solid var(--brr-line);border-radius:14px;
    box-shadow:0 1px 8px rgba(20,25,40,.05);text-align:center;
  }
  .brr-summary.show{display:block;animation:brrPop .4s cubic-bezier(.2,1.3,.4,1) both;}
  .brr-sum-date{font-size:12px;font-weight:600;color:var(--brr-sub);letter-spacing:.06em;}
  .brr-sum-body{margin-top:10px;display:flex;flex-direction:column;gap:6px;
    font-size:15px;font-weight:700;color:#2a2d38;font-variant-numeric:tabular-nums;letter-spacing:.01em;}
.brr-sum-codes{margin-top:10px;padding-top:8px;border-top:1px dashed #d5d9e0;}
.brr-sum-codes-title{font-size:11px;font-weight:800;color:#666;margin-bottom:4px;}
.brr-sum-code-line{font-size:11px;line-height:1.7;white-space:nowrap;overflow-x:auto;color:#333;}
.brr-sum-code-line .cd{font-family:ui-monospace,Menlo,monospace;font-weight:800;color:#1a3b6e;}
  .brr-sum-body .note{font-size:10px;font-weight:600;color:var(--brr-sub);margin-left:2px;}
  .brr-sum-body .brr-sum-pay{color:var(--brr-rose-deep);}
  .brr-sum-gap{height:8px;}
  /* ローディングバー（取得進捗） */
  .brr-loadbar{
    position:relative;
    height:7px;border-radius:4px;
    background:rgba(201,64,104,.10);
    box-shadow:0 1px 2px rgba(20,25,40,.06) inset;
    overflow:hidden;display:none;
  }
  .brr-loadbar.show{display:block;}
  .brr-loadbar-fill{
    position:relative;
    height:100%;width:0%;border-radius:4px;
    background:linear-gradient(90deg,var(--brr-rose),var(--brr-rose-deep));
    box-shadow:0 0 8px rgba(225,91,130,.55), 0 0 2px rgba(225,91,130,.8);
    transition:width .35s cubic-bezier(.3,.8,.3,1);
  }
  .brr-loadbar-fill::after{
    content:'';position:absolute;inset:0;border-radius:4px;
    background:linear-gradient(90deg,
      transparent 0%, rgba(255,255,255,0) 30%,
      rgba(255,255,255,.45) 50%, rgba(255,255,255,0) 70%, transparent 100%);
    background-size:200% 100%;
    animation:brrBarFlow 1.1s linear infinite;
  }
  .brr-loadbar-fill::before{
    content:'';position:absolute;top:50%;right:0;transform:translate(50%,-50%);
    width:10px;height:10px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,220,232,.95) 0%, rgba(225,91,130,.6) 45%, transparent 70%);
    animation:brrBarPulse 1.1s ease-in-out infinite;
  }
  @keyframes brrBarFlow{ 0%{background-position:100% 0;} 100%{background-position:-100% 0;} }
  @keyframes brrBarPulse{ 0%,100%{opacity:.55;transform:translate(50%,-50%) scale(.85);} 50%{opacity:1;transform:translate(50%,-50%) scale(1.15);} }

  .brr-status{
    text-align:center;font-size:12px;color:var(--brr-sub);
    padding:10px 16px 0;letter-spacing:.03em;
  }

  .brr-cards{
    padding:12px 12px calc(28px + env(safe-area-inset-bottom,0px));
    display:flex;flex-direction:column;gap:9px;
    max-width:620px;margin:0 auto;width:100%;box-sizing:border-box;
  }
  .brr-card{
    background:var(--brr-card);border-radius:13px;
    border:1px solid var(--brr-line);
    box-shadow:0 1px 7px rgba(20,25,40,.05);
    padding:9px 12px 10px;position:relative;overflow:visible;
  }
  .brr-card-top{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding-bottom:7px;border-bottom:1px solid var(--brr-line);margin-bottom:7px;
  }
  .brr-venue{font-size:15px;font-weight:600;color:var(--brr-head);letter-spacing:.02em;white-space:nowrap;}
  .brr-pts{font-size:11.5px;font-weight:600;color:var(--brr-sub);margin-left:6px;}
  .brr-card-badges{
    display:flex;align-items:center;gap:5px;flex-shrink:0;
  }
  .brr-start{font-size:10px;color:#98a0ab;font-weight:700;margin-left:6px;}
  .brr-badge{
    font-size:10px;font-weight:500;letter-spacing:.04em;
    padding:2px 8px;border-radius:999px;line-height:1.5;white-space:nowrap;
  }
  /* グレード・分戦バッジは同色（分戦デザインに統一）*/
  .brr-grade,.brr-seg{background:#eef0f3;color:#5a5f6b;}
  .brr-code{
    font-size:11px;font-weight:700;letter-spacing:.05em;
    color:var(--brr-rose-deep);background:#fdeef2;
    padding:2px 9px;border-radius:7px;font-variant-numeric:tabular-nums;white-space:nowrap;
  }
  /* 買い目：横5列グリッド */
  .brr-buys{
    display:grid;grid-template-columns:repeat(6,1fr);gap:3px 5px;
    font-size:12px;font-weight:600;color:#333;font-variant-numeric:tabular-nums;
  }
  .brr-buy-line.brr-hidden{display:none;}
  .brr-buy-line.brr-formation{font-weight:800;letter-spacing:1px;}
  .brr-buy-line{white-space:nowrap;text-align:center;letter-spacing:-.01em;}
  .brr-buy-line.hit{color:var(--brr-hit);font-weight:800;}
  .brr-dbg{
    margin-top:7px;padding:5px 7px;border-radius:6px;
    background:rgba(120,130,150,.08);
    font-size:9.5px;line-height:1.5;color:#6a7180;
    letter-spacing:.01em;word-break:break-all;
  }
  /* 結果情報（照合後）：着順＋払戻 */
  .brr-result{
    display:none;margin-top:8px;padding-top:7px;border-top:1px dashed var(--brr-line);
    align-items:center;gap:7px;flex-wrap:wrap;font-variant-numeric:tabular-nums;
  }
  .brr-result.show{display:flex;}
  .brr-result-label{font-size:10px;font-weight:700;color:var(--brr-sub);letter-spacing:.05em;}
  .brr-result-order{font-size:14px;font-weight:800;color:var(--brr-head);letter-spacing:.02em;}
  .brr-result-paylabel{font-size:10px;font-weight:700;color:var(--brr-sub);letter-spacing:.05em;margin-left:3px;}
  .brr-result-pay{font-size:13px;font-weight:800;color:#2a2d38;}
  .brr-result-pay.hit{color:var(--brr-hit);}
  .brr-result-pay .yen{font-size:10px;font-weight:700;margin-left:1px;}
  /* 的中スタンプ（払戻金額の右側にインライン表示・回転ポップ） */
  .brr-tekichu{position:absolute;right:8px;bottom:-6px;height:58px;width:58px;
    transform:rotate(-8deg);filter:drop-shadow(0 1px 2px rgba(0,0,0,.18));
    animation:brrTekichu .5s cubic-bezier(.2,1.4,.4,1) both;z-index:3;pointer-events:none;}
  @keyframes brrTekichu{0%{opacity:0;transform:rotate(-8deg) scale(.3);}70%{opacity:1;transform:rotate(-8deg) scale(1.12);}100%{opacity:1;transform:rotate(-8deg) scale(1);}}
  .brr-card.hit{border-color:#f3c9c9;box-shadow:0 2px 11px rgba(224,52,47,.12);}
</style>
</head>
<body>

<!-- ① 遷移画面 -->
<div id="boot">
  <img class="boot-logo" data-logo alt="Brain">
  <div class="boot-word">Brain Race Result</div>
</div>

<!-- ② ログイン画面 -->
<div id="login">

<script>
// ===== Brain おまかせ生成エンジン（2026-06-26 ステップ5-4 埋め込み版）=====
(function(){
// ===== Brain band判定エンジン（JS移植・2026-06-26）=====
// band_model.py の extract_features / compute_band を忠実移植
const LINE_TYPES=['二分戦','三分戦','四分戦','細切れ'];
const SEGS=['S1','S2','A1','A2','A3(チャレンジ)','L'];
const STYLES=['逃','両','追','差','捲','マ','NA'];
const OBJ=['f_pt_max','f_pt_mean','f_pt_std','f_pt_gap12','f_pt_range','f_n_lines','f_max_line','f_min_line','f_has_tanki'];
const MARK=['m_ho_same','m_hn_same','m_h_is_head','m_h_line_size','m_marks_span','m_h_is_toppt','m_h_ptrank'];
const COLS=OBJ.concat(MARK, LINE_TYPES.map(x=>'lt_'+x), SEGS.map(x=>'seg_'+x), STYLES.map(x=>'st_'+x), ['cc']);

function parseLines(s){
  const out=[];
  String(s).split('/').forEach(g=>{
    const cars=g.split('-').filter(c=>c!=='').map(c=>parseInt(c,10)).filter(c=>!isNaN(c));
    if(cars.length) out.push(cars);
  });
  return out;
}
function parsePt(s){
  const d={};
  String(s).split(',').forEach(kv=>{
    if(kv.indexOf(':')>=0){const a=kv.split(':');const c=parseInt(a[0],10);const v=parseFloat(a[1]);if(!isNaN(c)&&!isNaN(v))d[c]=v;}
  });
  return d;
}
function parseStyle(s){
  const d={};
  String(s).split(',').forEach(kv=>{
    if(kv.indexOf(':')>=0){const a=kv.split(':');const c=parseInt(a[0],10);if(!isNaN(c))d[c]=a[1];}
  });
  return d;
}
function normStyle(v){
  if(!v) return 'NA';
  for(const s of ['逃','両','追','差','捲']) if(v.indexOf(s)>=0) return s;
  if(v.indexOf('マ')>=0) return 'マ';
  return 'NA';
}
function mean(a){return a.reduce((x,y)=>x+y,0)/a.length;}
function std(a){const mu=mean(a);return Math.sqrt(a.reduce((x,y)=>x+(y-mu)*(y-mu),0)/a.length);}

// race: {lines,pt,style,car_count,race_class,line_type,seg,honmei,taikou,tanana,renge}
function extractFeatures(race){
  const lines=parseLines(race.lines), pt=parsePt(race.pt), style=parseStyle(race.style);
  const cars=[]; lines.forEach(g=>g.forEach(c=>cars.push(c)));
  const pts=cars.filter(c=>c in pt).map(c=>pt[c]);
  if(pts.length<4) return null;
  const ptv=pts.slice().sort((a,b)=>b-a);
  const sizes=lines.map(g=>g.length).sort((a,b)=>b-a);
  const lineOf=car=>{for(let i=0;i<lines.length;i++)if(lines[i].indexOf(car)>=0)return i;return -1;};
  const lineG=car=>{for(const g of lines)if(g.indexOf(car)>=0)return g;return null;};
  const _i=x=>{const n=parseInt(x,10);return isNaN(n)?null:n;};
  const h=_i(race.honmei),tt=_i(race.taikou),n=_i(race.tanana),r=_i(race.renge);
  const hl=h?lineG(h):null;
  const marksLines=new Set();[h,tt,n,r].forEach(x=>{if(x!=null&&lineOf(x)>=0)marksLines.add(lineOf(x));});
  let topPtCar=null,best=-Infinity;
  cars.forEach(c=>{if(c in pt && pt[c]>best){best=pt[c];topPtCar=c;}});
  // ptrank: pt降順で順位（同値はsortの安定性に依存。Pythonはsorted安定＝元順）
  const ranked=cars.filter(c=>c in pt).slice().sort((a,b)=>pt[b]-pt[a]);
  const ptrank={}; ranked.forEach((c,i)=>{if(!(c in ptrank))ptrank[c]=i+1;});
  const f={
    f_pt_max:ptv[0], f_pt_mean:mean(ptv), f_pt_std:std(ptv),
    f_pt_gap12:ptv[0]-ptv[1], f_pt_range:ptv[0]-ptv[ptv.length-1],
    f_n_lines:lines.length, f_max_line:sizes[0], f_min_line:sizes[sizes.length-1],
    f_has_tanki:sizes.indexOf(1)>=0?1:0,
    m_ho_same:(h&&tt&&lineOf(h)===lineOf(tt)&&lineOf(h)>=0)?1:0,
    m_hn_same:(h&&n&&lineOf(h)===lineOf(n)&&lineOf(h)>=0)?1:0,
    m_h_is_head:(hl&&hl[0]===h)?1:0,
    m_h_line_size:hl?hl.length:1,
    m_marks_span:marksLines.size,
    m_h_is_toppt:(h!=null&&h===topPtCar)?1:0,
    m_h_ptrank:(h!=null&&(h in ptrank))?ptrank[h]:99,
    m_h_style:normStyle(style[h]),
    line_type:race.line_type, seg:race.seg, cc:parseInt(race.car_count,10)
  };
  // ベクトル化（COLS順）
  const vec=[];
  OBJ.concat(MARK).forEach(k=>vec.push(f[k]));
  LINE_TYPES.forEach(lt=>vec.push(f.line_type===lt?1:0));
  SEGS.forEach(s=>vec.push(f.seg===s?1:0));
  STYLES.forEach(st=>vec.push(f.m_h_style===st?1:0));
  vec.push(f.cc);
  return vec;
}

// round half to even（numpy/pandas .round(1) 準拠）
function roundHalfEven(x, dec){
  const f=Math.pow(10,dec); let v=x*f;
  const fl=Math.floor(v), diff=v-fl;
  let r;
  if(diff>0.5) r=fl+1; else if(diff<0.5) r=fl; else r=(fl%2===0)?fl:fl+1;
  return r/f;
}
function gbmChaos(vec, model){
  // sklearnは木評価でXをfloat32にキャストするため、JS側もfloat32(Math.fround)で比較
  const v32=vec.map(x=>Math.fround(x));
  let raw=model.F0;
  for(const t of model.trees){
    let node=0;
    while(t.left[node]!==-1){
      node=(v32[t.feat[node]]<=t.thr[node])?t.left[node]:t.right[node];
    }
    raw+=model.lr*t.val[node];
  }
  const p=1/(1+Math.exp(-raw));
  return roundHalfEven(100*p,1);
}
function chaosToBand(chaos){
  const edges=[0,15,25,35,45,100], labels=['~15','15-25','25-35','35-45','45+'];
  for(let i=0;i<labels.length;i++){ if(chaos>edges[i] && chaos<=edges[i+1]) return labels[i]; }
  if(chaos<=0) return '~15';
  return '45+';
}


// ===== seg判定（級班多数決）・ライン数・D/B（2026-06-26 ステップ5-2）=====
// players: [{cls:'A1'|'A2'|'S1'|'S2'|'A3'...}], raceClass: 'S級'/'A級'/'チャレンジ...'
function segFromPlayers(players, raceClass){
  const cls=String(raceClass||'');
  if(/L級|ガールズ|アドバンス/.test(cls)) return 'L';
  // 級班カウント
  const cnt={S1:0,S2:0,A1:0,A2:0,A3:0};
  (players||[]).forEach(p=>{
    const c=String(p.cls||'').toUpperCase().replace(/[^SA0-9]/g,'');
    if(c in cnt) cnt[c]++;
  });
  // チャレンジ：クラス表記 or A3多数
  if(/チャレンジ|チ[選準決予]/.test(cls) || (cnt.A3>0 && cnt.A3>=cnt.A1+cnt.A2 && cnt.S1+cnt.S2===0))
    return 'A3(チャレンジ)';
  const sTotal=cnt.S1+cnt.S2, aTotal=cnt.A1+cnt.A2;
  const isS=/S級/.test(cls) || (sTotal>aTotal);
  if(isS) return (cnt.S1>=cnt.S2)?'S1':'S2';   // 同数は上位(S1)
  return (cnt.A1>=cnt.A2)?'A1':'A2';            // 同数は上位(A1)
}
// dai(F1/F2/G)：grade表記から
function daiFromGrade(grade){
  const g=String(grade||'').toUpperCase();
  if(g.indexOf('G')>=0 && g.indexOf('F')<0) return 'G';   // GP/G1/G2/G3
  if(g.indexOf('F1')>=0) return 'F1';
  if(g.indexOf('F2')>=0) return 'F2';
  if(g[0]==='G') return 'G';
  return 'F2';
}
// chu(S級/A級/チャレンジ)
function chuFromSeg(seg){
  if(seg==='A3(チャレンジ)') return 'チャレンジ';
  if(seg==='S1'||seg==='S2') return 'S級';
  return 'A級';
}
// ライン数→分戦(sho)
function shoFromLines(lines){
  const multi=lines.filter(g=>g.length>=2).length;
  if(multi===2) return '二分戦';
  if(multi===3) return '三分戦';
  if(multi===4) return '四分戦';
  return '細切れ';
}
// D/B：◎○同ライン
function dbSplit(honmei, taikou, lines){
  const lineOf=car=>{for(let i=0;i<lines.length;i++)if(lines[i].indexOf(car)>=0)return i;return -1;};
  const h=parseInt(honmei,10), t=parseInt(taikou,10);
  if(isNaN(h)||isNaN(t)) return 'B';
  const lh=lineOf(h);
  return (lh>=0 && lh===lineOf(t)) ? 'D' : 'B';
}

// ===== 55%地点ライブband算出（2026-06-26 ステップ5-2確定）=====
// A級→A1版chaos*0.45 + A2版chaos*0.55、S級→S1*0.45+S2*0.55、チャレンジ→A3
// race: extractFeatures可能な生データ + {race_class, chu}
function liveChaos(race, model){
  const chu=String(race.chu||'');
  const cls=String(race.race_class||'');
  function chaosWithSeg(seg){
    const r=Object.assign({}, race, {seg:seg});
    const vec=extractFeatures(r);
    if(vec===null) return null;
    return gbmChaos(vec, model);
  }
  let ch;
  if(/チャレンジ/.test(chu) || /チャレンジ/.test(cls)){
    ch=chaosWithSeg('A3(チャレンジ)');
  } else if(/S級/.test(cls)){
    const c1=chaosWithSeg('S1'), c2=chaosWithSeg('S2');
    if(c1===null||c2===null) return null;
    ch=c1*0.45 + c2*0.55;
  } else {  // A級（非チャレンジ）
    const c1=chaosWithSeg('A1'), c2=chaosWithSeg('A2');
    if(c1===null||c2===null) return null;
    ch=c1*0.45 + c2*0.55;
  }
  if(ch===null) return null;
  return roundHalfEven(ch, 1);
}
function liveBand(race, model){
  const ch=liveChaos(race, model);
  if(ch===null) return null;
  return chaosToBand(ch);
}

// ===== 印展開 caretta_marks（brain_lab.py 忠実移植・2026-06-26 ステップ5-3）=====
function carettaMarks(honmei, taikou, tanana, renge, lines, raceClass){
  const result={};  // {car(int): mark}
  const ai=[[honmei,'◎'],[taikou,'○'],[tanana,'△'],[renge,'×']];
  for(const [car,sym] of ai){
    if(car!=null && !(typeof car==='number' && isNaN(car))) result[parseInt(car,10)]=sym;
  }
  const cls=String(raceClass||'');
  if(cls.indexOf('L級')>=0 || cls.indexOf('ガールズ')>=0 || cls.indexOf('アドバンス')>=0) return result;
  const aicar={'◎':honmei,'○':taikou,'△':tanana,'×':renge};
  for(const [a,cm] of [['◎','⑳'],['○','●'],['△','▲'],['×','✖']]){
    let car=aicar[a];
    if(car==null || (typeof car==='number' && isNaN(car))) continue;
    car=parseInt(car,10);
    let line=null;
    for(const g of lines){ if(g.indexOf(car)>=0){ line=g; break; } }
    if(!line || line.length<=1) continue;
    const idx=line.indexOf(car);
    if(idx>0 && !(line[idx-1] in result)){ result[line[idx-1]]=cm; continue; }
    if(idx<line.length-1 && !(line[idx+1] in result)){ result[line[idx+1]]=cm; continue; }
  }
  // カ別線
  for(const line of lines){
    if(line.length>1 && line.every(c=>!(c in result))){
      result[line[0]]='☆';
      if(line.length>1) result[line[1]]='★';
    }
  }
  // 単騎
  for(const line of lines){
    if(line.length===1 && !(line[0] in result)) result[line[0]]='単';
  }
  return result;
}

// ===== テンプレ展開・買い目生成（harness忠実移植・2026-06-26 ステップ5-3）=====
function revMap(marks){
  const rev={};
  for(const car in marks){ const mk=marks[car]; (rev[mk]=rev[mk]||[]).push(parseInt(car,10)); }
  return rev;
}
function expandTemplate(tmpl, rev){
  const toks=tmpl.split('-');
  if(toks.some(t=>!(t in rev))) return [];  // 印不在→買えない（不在カ印スキップ）
  const lists=toks.map(t=>rev[t]);
  const combos=[];
  for(const a of lists[0]) for(const b of lists[1]) for(const c of lists[2]){
    if(a!==b && a!==c && b!==c) combos.push([a,b,c]);  // 同一車番含む組は除外
  }
  return combos;
}
function evalRace(marks, templates){
  const rev=revMap(marks);
  const pts=[]; let fc=0;
  for(const t of templates){
    const combos=expandTemplate(t, rev);
    if(combos.length>0){ fc++; for(const c of combos) pts.push(c); }
  }
  return {rev, pts, fc, npts:pts.length};
}
function gatePass(ev, gate, fullN){
  if(gate==null || gate==='' || gate==='none') return true;
  const rev=ev.rev, fc=ev.fc;
  if(gate==='tan') return ('単' in rev);
  if(gate==='tan_none') return !('単' in rev);
  if(gate==='full' || gate==='fc==full') return fc===fullN;
  if(gate==='☆') return ('☆' in rev);
  if(gate==='⑳') return ('⑳' in rev);
  if(gate.startsWith('fc>=')) return fc>=parseInt(gate.slice(4),10);
  if(gate.startsWith('fc==')) return fc===parseInt(gate.slice(4),10);
  if(gate.startsWith('fc:')){
    const rng=gate.slice(3);
    if(rng.indexOf('-')>=0){ const [lo,hi]=rng.split('-').map(Number); return lo<=fc && fc<=hi; }
    return rng.split(',').map(Number).indexOf(fc)>=0;
  }
  return true;
}
// 車番組をdedupして一意の買い目リストに（3連単=順序あり）
function uniqueCombos(pts){
  const seen=new Set(), out=[];
  for(const c of pts){ const k=c.join('-'); if(!seen.has(k)){ seen.add(k); out.push(c); } }
  return out;
}

// ===== confirmed_codes照合＋買い目生成（2026-06-26 ステップ5-3）=====
const CHU_ABBR={'A級':'A','S級':'S','チャレンジ':'チ'};
const BAND_LV={'15-25':2,'25-35':3,'35-45':4,'45+':5,'~15':1};
// 生成率コントロール：G戦の固定本命側4セルは見送り（固過ぎ回避）
const _G_CUT_CELLS=new Set(['G3-2D','G4-2D','G3-3D','G4-3D']);
function buildCellMap(confirmedCodes){
  // seg正規化(例 'G S級三分戦'→'GS三分戦')で(seg|Lv|DB)→cell。enabled:false除外。
  const map={};
  for(const code in confirmedCodes){
    const v=confirmedCodes[code];
    if(v.enabled===false) continue;  // 生成対象外（Lv2 2D/B等）
    const seg=(v.seg||'').replace(/ /g,'').replace(/級/g,'');  // エンジン生成名と一致させる
    const s=code.split('-').pop(); const lv=parseInt(s[0],10); const db=s[1];
    map[seg+'|'+lv+'|'+db]={code, ...v};
  }
  return map;
}
// ===== v3（2026-07-09）デイ&ナイター・G以外：種別別ロジック =====
const V3_MIN_PTS=6;   // 実買い5点以下(6点未満)は生成不可
function buildCellMapV3(codes){
  const map={};
  for(const code in codes){ const v=codes[code]; map[v.dc+'|'+v.sho+'|'+v.cat+'|'+v.lv+'|'+v.split]=Object.assign({code:code}, v); }
  return map;
}
function v3NewLv(ch){ if(ch<27.4) return '1'; if(ch<35.1) return '2'; return '3'; }   // chaos均等3分割境界（D&N 12,000レース基準）
// race: band_engine形式（lines,pt,style,car_count,race_class,chu,grade,honmei,taikou,tanana,renge）
function generateForRace(race, model, cellMap){
  const lines=parseLines(race.lines);
  const dai=daiFromGrade(race.grade);
  const chu=String(race.chu|| (/チャレンジ/.test(String(race.race_class))?'チャレンジ':(/S級/.test(String(race.race_class))?'S級':'A級')));
  const sho=shoFromLines(lines);
  const segName=dai+(CHU_ABBR[chu]||'A')+sho;
  const lv=BAND_LV[liveBand(race, model)];
  const db=dbSplit(race.honmei, race.taikou, lines);
  // ===== v3分岐（2026-07-09）：G以外はデイ&ナイター種別別ロジック（v1のカット①②・gateは適用しない） =====
  if(dai!=='G'){
    const cm3=(typeof window!=='undefined' && window.BRAIN_CELLMAP_V3) || null;
    if(!cm3) return {target:false, reason:'v3セルマップ未ロード', segName, lv, db, buys:[], betCount:0};
    if(race.dn!==true){
      const rr=(race.dn===false)?'見送り(モーニング/ミッドナイト)':'見送り(時間帯情報なし)';
      return {target:false, reason:rr, segName, lv, db, buys:[], betCount:0};
    }
    const rt3=race.raceType3;
    if(!rt3) return {target:false, reason:'見送り(種別情報なし)', segName, lv, db, buys:[], betCount:0};
    const cat=(typeof window!=='undefined' && window.RACETYPE_MAP_V3 ? window.RACETYPE_MAP_V3[rt3] : null) || null;
    if(!cat) return {target:false, reason:'見送り(種別対象外:'+rt3+')', segName, lv, db, buys:[], betCount:0};
    // ===== v9（2026-07-10）初日特選・決勝：フォーメーション生成（モードB）。'A'で従来テンプレへ戻せる =====
    if((cat==='初'||cat==='決') && ((typeof window!=='undefined'&&window.V3_SHOKETSU_MODE)||'B')==='B'){
      if(sho!=='二分戦' && sho!=='三分戦')
        return {target:false, reason:'見送り(初特決勝:対象外構成'+sho+')', segName, lv:'全', db, buys:[], betCount:0};
      const marksF=carettaMarks(race.honmei,race.taikou,race.tanana,race.renge,lines,race.race_class);
      const revF={};
      Object.keys(marksF).map(Number).sort(function(a,b){return a-b;}).forEach(function(c){
        const mk=marksF[c]; if(!(mk in revF)) revF[mk]=c;
      });
      for(const mk of ['◎','○','△','×']){
        if(!(mk in revF)) return {target:false, reason:'見送り(初特決勝:AI印欠け'+mk+')', segName, lv:'全', db, buys:[], betCount:0};
      }
      const dcNameF=dai+(CHU_ABBR[chu]||'A');
      const codeF=dcNameF+cat+(sho==='二分戦'?'2':'3')+'-全'+db;
      function posF(mk){
        const car=revF[mk]; if(car==null) return false;
        for(const g of lines){ const p=g.indexOf(car); if(p>=0) return g.length>=3 && p>=2; }
        return false;
      }
      const F_A=[['◎','△'],['◎','△','○'],['△','○','×','☆','▲']];      // 全部あり15点
      const F_B=[['◎','×'],['◎','×','△','☆'],['○','×','△','☆']];       // ▲なし16点
      const F_C=[['◎','○'],['◎','○','×','△'],['◎','×','△','☆']];       // ▲なし&×3番手16点
      const F_D=[['◎','△','×'],['◎','○','△','×'],['○','△','×']];       // ☆なし/☆▲なし/二分戦14点
      let F, verF;
      if(sho==='二分戦'){ F=F_D; verF='二分戦14'; }
      else if(!('☆' in revF)){ F=F_D; verF='☆なし14'; }
      else if(!('▲' in revF)){ if(posF('×')){F=F_C;verF='▲なし×3番手16';} else {F=F_B;verF='▲なし16';} }
      else { if(posF('△')){ if(posF('×')){F=F_C;verF='△3番手→×3番手16';} else {F=F_B;verF='△3番手→▲なし16';} } else {F=F_A;verF='全部あり15';} }
      const fmCars=F.map(function(g){ return g.map(function(mk){return revF[mk];}).filter(function(v){return v!=null;}); });
      const seenF={}; const buysF=[];
      for(const a of fmCars[0]) for(const b of fmCars[1]){ if(b===a) continue;
        for(const c of fmCars[2]){ if(c===a||c===b) continue;
          const s=a+'-'+b+'-'+c; if(!seenF[s]){ seenF[s]=1; buysF.push([a,b,c]); } } }
      const fstr=fmCars.map(function(g){return g.join('');}).join('-');
      return {target:true, cell:codeF, segName:dcNameF+sho, lv:'全', db, gate:null,
              buys:buysF, betCount:buysF.length, marks:marksF, v3:true,
              formation:{str:fstr, ver:verF}};
    }
    const dcName=dai+(CHU_ABBR[chu]||'A');
    let lv3;
    if(cat==='初'||cat==='決'){ lv3='全'; }
    else{
      const ch=liveChaos(race, model);
      if(ch==null) return {target:false, reason:'見送り(chaos算出不可)', segName, lv, db, buys:[], betCount:0};
      lv3=v3NewLv(ch);
    }
    const key3=dcName+'|'+sho+'|'+cat+'|'+lv3+'|'+db;
    const cell3=cm3[key3];
    if(!cell3) return {target:false, reason:'非対象セル(v3:'+key3+')', segName, lv:lv3, db, buys:[], betCount:0};
    const marks3=carettaMarks(race.honmei,race.taikou,race.tanana,race.renge,lines,race.race_class);
    // ===== v7（2026-07-10）△×3番手ルール：△/×が3車以上ラインの3番手以降なら該当1着買い目を外し、予備◎1着を投入（△or×のみ=3本/両方=5本） =====
    function v7Fire(mk){
      let car=null;
      for(const c in marks3){ if(marks3[c]===mk){ car=Number(c); break; } }
      if(car===null) return false;
      for(const g of lines){
        const p=g.indexOf(car);
        if(p>=0){ return g.length>=3 && p>=2; }
      }
      return false;
    }
    const fd3=v7Fire('△'), fx3=v7Fire('×');
    let tmplEff3=cell3.tmpl;
    const rsv3=cell3.rsv||[];
    if(cell3.rule==='hd'){
      // v9: ◎△1着セル（S級予選Lv2/3D）。△3番手のみ発動＝△1着を外し予備○1着を3点投入。×は1着に無いため非発動
      if(fd3){ tmplEff3=cell3.tmpl.filter(t=>t.split('-')[0]!=='△').concat(rsv3.slice(0,3)); }
    }
    else if(fd3&&fx3){ tmplEff3=cell3.tmpl.filter(t=>{const f=t.split('-')[0];return f!=='△'&&f!=='×';}).concat(rsv3.slice(0,5)); }
    else if(fd3){ tmplEff3=cell3.tmpl.filter(t=>t.split('-')[0]!=='△').concat(rsv3.slice(0,3)); }
    else if(fx3){ tmplEff3=cell3.tmpl.filter(t=>t.split('-')[0]!=='×').concat(rsv3.slice(0,3)); }
    const ev3=evalRace(marks3, tmplEff3);
    const mp3=cell3.mp||V3_MIN_PTS;   // v9: セル別最低点数（◎△セルは5点）
    if(ev3.npts<mp3) return {target:false, reason:'見送り('+mp3+'点未満:'+ev3.npts+'点)', cell:cell3.code, segName, lv:lv3, db, buys:[], betCount:0};
    const buys3=uniqueCombos(ev3.pts);
    return {target:true, cell:cell3.code, segName:dcName+sho, lv:lv3, db, gate:null, buys:buys3, betCount:buys3.length, marks:marks3, v3:true};
  }
  // ===== 生成率コントロール カット① 7車立てで4車ライン以上を含むレースは見送り =====
  const _cc=Number(race.car_count)|| (String(race.lines||'').replace(/[^0-9]/g,'').length);
  const _maxLine=Math.max(0, ...String(race.lines||'').split('/').map(g=>g.split('-').filter(Boolean).length));
  if(_cc===7 && _maxLine>=4) return {target:false, reason:'見送り(7車立て×4車ライン)', segName, lv, db, buys:[], betCount:0};
  const key=segName+'|'+lv+'|'+db;
  const cell=cellMap[key];
  if(!cell) return {target:false, reason:'非対象セル('+key+')', segName, lv, db, buys:[], betCount:0};
  // ===== 生成率コントロール カット② G戦の固定本命4セルは見送り =====
  if(_G_CUT_CELLS.has(cell.code)) return {target:false, reason:'見送り(G戦カット'+cell.code+')', cell:cell.code, segName, lv, db, buys:[], betCount:0};
  const marks=carettaMarks(race.honmei,race.taikou,race.tanana,race.renge,lines,race.race_class);
  const base=cell.tmpl; const tanki=cell.tanki||[]; const gate=cell.gate;
  const evBase=evalRace(marks, base);
  if(evBase.npts===0) return {target:false, reason:'印不在で生成不可', cell:cell.code, buys:[], betCount:0};
  if(!gatePass(evBase, gate, base.length)) return {target:false, reason:'ゲート見送り('+gate+')', cell:cell.code, buys:[], betCount:0};
  const buys=uniqueCombos(evalRace(marks, base.concat(tanki)).pts);
  return {target:true, cell:cell.code, segName, lv, db, gate, buys, betCount:buys.length, marks};
}

window.BrainEngine={

};
})();

        info.dn = (hm>=600 && hm<1200);                       // セッション初回発走10:00〜19:59＝デイ&ナイター
      }
    }
  }catch(e){}
  if(Object.keys(info.byNum).length>0){ window.V3_CUPINFO[key] = info; }   // 取得成功時のみキャッシュ（失敗は次回リトライ）
  return info;
}

let ODDSPARK_RACE_TYPE_CACHE = {};

async function fetchOddsparkRaceTypes(venueId) {
  // キャッシュチェック
  if (ODDSPARK_RACE_TYPE_CACHE[venueId]) return ODDSPARK_RACE_TYPE_CACHE[venueId];
  
  const joCode = ODDSPARK_JO_CODES[venueId];
  if (!joCode) return { types: {}, grade: '', cupName: '' };
  
  try {
    const d = new Date();
    const kb = d.getFullYear().toString() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
    const url = `https://www.oddspark.com/keirin/AllRaceList.do?joCode=${joCode}&kaisaiBi=${kb}`;
    const resp = await fetch(`${PROXY_URL}?url=${encodeURIComponent(url)}`);
    if (!resp.ok) return { types: {}, grade: '', cupName: '' };
    const html = await resp.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    
    // 全角英数記号→半角変換ユーティリティ
    function toHalfWidth(str) {
      return str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
               .replace(/　/g,' ').replace(/＆/g,'&').replace(/（/g,'(').replace(/）/g,')');
    }
    
    // グレード＆カップ名をh2から取得（grade非依存・堅牢版）
    let grade = '', cupName = '';
    const h2list = doc.querySelectorAll('h2');
    for (const h2 of h2list) {
      let h2Text = toHalfWidth(h2.textContent.replace(/\s+/g,' ').trim());
      if (!grade) {
        const gm = h2Text.match(/(G[1-3P]|F[12])/i);
        if (gm) grade = gm[1].toUpperCase();
      }
      if (!cupName) {
        const img = h2.querySelector('img');
        if (img) {
          let node = img.nextSibling, buf = '';
          while (node) { buf += (node.textContent || ''); node = node.nextSibling; }
          buf = toHalfWidth(buf.replace(/\s+/g,' ').trim());
          if (buf) cupName = buf;
        }
        if (!cupName) {
          const parts = h2Text.split(/競輪場/);
          if (parts[1] && parts[1].trim()) cupName = parts[1].trim();
        }
        if (!cupName && grade) {
          const gi = h2Text.indexOf(grade);
          if (gi >= 0) { const a = h2Text.substring(gi + grade.length).trim(); if (a) cupName = a; }
        }
      }
      if (grade && cupName) break;
    }
    
    // レース種別
    const types = {};
    doc.querySelectorAll('a[href*="RaceList.do"]').forEach(a => {
      const parent = a.closest('strong, b, p');
      const text = (parent || a).textContent.trim();
      const m = text.match(/第(\d+)R\s+(.+)/);
      if (m) {
        const raceNum = parseInt(m[1]);
        let raceType = m[2].trim();
        raceType = raceType.replace(/Ｓ/g,'S').replace(/Ａ/g,'A').replace(/Ｌ/g,'L');
        raceType = raceType.replace(/\s*(ナイター|ミッドナイト|モーニング|投票).*/g, '').trim();
        types[raceNum] = raceType;
      }
    });
    
    const result = { types, grade, cupName };
    ODDSPARK_RACE_TYPE_CACHE[venueId] = result;
    console.log('オッズパーク種別取得:', venueId, result);
    return result;
  } catch (e) {
    console.log('オッズパーク種別取得失敗:', venueId, e);
    return { types: {}, grade: '', cupName: '' };
  }
}

function parseRaceTableHTML(html, urlInfo) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  
  // レース情報を抽出
  const raceInfo = extractRaceInfo(doc, urlInfo);
  
  // 選手データを抽出

  // 並び予想を抽出

  return {

    lineup
  };
}

// レース情報（発走時刻、締切など）を抽出 ※レース種別はオッズパークから取得
function extractRaceInfo(doc, urlInfo) {
  let start = '', deadline = '', cls = '', grade = 'F1';
  
  const bodyText = doc.body?.textContent || '';
  
  // 発走時刻のパターン: "発走 11:05" or "発走11:05"
  const startMatch = bodyText.match(/発走\s*(\d{1,2}:\d{2})/);
  if (startMatch) start = startMatch[1];
  
  // 締切時刻のパターン: "締切 11:00" or "締切11:00"
  const deadlineMatch = bodyText.match(/締切\s*(\d{1,2}:\d{2})/);
  if (deadlineMatch) deadline = deadlineMatch[1];
  
  // 状況詳細（距離(周)・周長・天候・気温・風）
  let distance='', laps='', bankLen='', weather='', temp='', wind='';
  const distM = bodyText.match(/(\d{1,2},?\d{3})\s*m\s*\((\d+)周\)/);
  if(distM){ distance=distM[1]+'m'; laps=distM[2]+'周'; }
  const blM = bodyText.match(/周長\s*(\d+)\s*m/);
  if(blM) bankLen='周長'+blM[1]+'m';
  const weM = bodyText.match(/(晴|曇|雨|雪|霧)/);
  if(weM) weather=weM[1];
  const teM = bodyText.match(/(\d+\.?\d*)℃/);
  if(teM) temp=teM[1]+'℃';
  const wiM = bodyText.match(/(北東|北西|南東|南西|北|南|東|西|無風)\s*(\d+\.?\d*)\s*m\/s/);
  if(wiM) wind=wiM[1]+wiM[2]+'m/s';
  
  return {
    venue: urlInfo?.venue || '',
    raceNum: urlInfo?.raceNum || 0,
    grade,
    cls,
    start,
    deadline,
    distance, laps, bankLen, weather, temp, wind
  };
}

function extractPlayers(doc) {
  const tables = doc.querySelectorAll('table');
  if (tables.length < 2) return [];
  
  const table = tables[1]; // 2つ目のテーブル
  const rows = table.querySelectorAll('tbody tr');
  const players = [];
  
  let currentWaku = 1;
  
  rows.forEach((row, idx) => {
    const cells = row.querySelectorAll('td');
    if (cells.length < 5) return;
    
    // 車番を探す
    const bibEl = row.querySelector('[class*="Bib___Wrapper"]');
    const num = bibEl ? parseInt(bibEl.textContent.trim()) : null;
    if (!num) return;
    
    // 枠番（rowspanで複数行にまたがる場合がある）
    const wakuCell = row.querySelector('td[rowspan]');
    if (wakuCell) {
      currentWaku = parseInt(wakuCell.textContent.trim()) || currentWaku;
    }
    
    // 選手情報
    const playerInfo = row.querySelector('[class*="PlayerInfo"]');
    const nameEl = playerInfo?.querySelector('a');
    
    const name = nameEl?.textContent?.trim() || '';
    
    // 選手情報は名前(a)の親spanの次の兄弟span
    // "岡山 A1 54歳 67期" をパース
    let pref = '', cls = '', age = null, ki = null;
    const allSpans = playerInfo?.querySelectorAll('span[class*="Text___Text"]');
    if (allSpans) {
      for (const span of allSpans) {
        const txt = span.textContent?.trim() || '';
        // 名前と同じでなく、県名+クラス+年齢+期のパターンを含むものを探す
        if (txt !== name && txt.includes('歳') && txt.includes('期')) {
          const infoParts = txt.split(/\s+/);
          pref = infoParts[0] || '';
          cls = infoParts[1] || '';
          age = parseInt(infoParts[2]) || null;
          ki = parseInt(infoParts[3]) || null;
          break;
        }
      }
    }
    
    // AI予想（複数の方法で取得を試みる）
    let aiPred = '';
    // 方法1: PredictionIconのsvg titleから
    const aiEl = row.querySelector('[class*="PredictionIcon"] svg title');
    if (aiEl) {
      aiPred = aiEl.textContent || '';
    }
    // 方法2: セルから直接「本命」「対抗」「単穴」「連下」を探す
    if (!aiPred) {
      for (const cell of cells) {
        const txt = cell.textContent.trim();
        if (['本命', '対抗', '単穴', '連下'].includes(txt)) {
          aiPred = txt;
          break;
        }
      }
    }
    
    // 各セルの値を取得（spanの入れ子構造からテキストを抽出）
    const cellValues = Array.from(cells).map(cell => {
      // コメントセルは特別扱い
      const commentEl = cell.querySelector('[class*="Comment"]');
      if (commentEl) return { type: 'comment', value: commentEl.textContent.trim() };
      
      // ギヤ倍率
      const gearEl = cell.querySelector('[class*="GearRatio"]');
      if (gearEl) return { type: 'gear', value: parseFloat(gearEl.textContent.trim()) || null };
      
      // 通常のセル
      const text = cell.textContent.trim();
      return { type: 'normal', value: text };
    });
    
    // セルインデックスを計算（枠番セルの有無で調整）
    const hasWakuCell = wakuCell !== null;
    const baseOffset = hasWakuCell ? 0 : -1;
    
    // 各データのインデックス（0-indexed）
    // 枠, 車, 名前, AI, 得点, S, B, 脚, 逃, 捲, 差, マ, 1着, 2着, 3着, 着外, 勝率, 2連, 3連, ギヤ, コメント
    const getVal = (idx) => {
      const adjusted = idx + baseOffset;
      if (adjusted < 0 || adjusted >= cellValues.length) return null;
      const v = cellValues[adjusted].value;
      return v === '' || v === '-' ? null : v;
    };
    
    const getNumVal = (idx) => {
      const v = getVal(idx);
      if (v === null) return null;
      const n = parseFloat(v);
      return isNaN(n) ? null : n;
    };
    
    // 競走得点（セル4, 0-indexed）
    const pt = getNumVal(4);
    
    // S, B
    const S = getNumVal(5);
    const H = getNumVal(6);  // 新規追加
    const B = getNumVal(7);
    
    // 脚質
    const style = getVal(8) || '';
    
    // 決まり手
    const nige = getNumVal(9);
    const maki = getNumVal(10);
    const sashi = getNumVal(11);
    const mark = getNumVal(12);
    
    // 着数
    const w1 = getNumVal(13);
    const w2 = getNumVal(14);
    const w3 = getNumVal(15);
    const wout = getNumVal(16);
    
    // 勝率、連対率
    const win = getNumVal(17);
    const r2 = getNumVal(18);
    const r3 = getNumVal(19);
    
    // ギヤ倍率
    const gearCell = cellValues.find(c => c.type === 'gear');
    const gear = gearCell?.value || null;
    
    // コメント
    const commentCell = cellValues.find(c => c.type === 'comment');
    const comment = commentCell?.value || '';
    
    players.push({
      car: num,  // brainlogic用
      n: num,    // テーブル表示用（互換性維持）
      waku: currentWaku,
      name,
      pref,
      cls,
      age,
      ki,
      ai: aiPred,  // AI予想（本命/対抗/単穴/連下）
      pt,
      style,
      S,
      H,  // 新規追加
      B,
      nige,
      makuri: maki,  // brainlogic用
      maki,          // テーブル表示用（互換性維持）
      sashi,
      mark,
      w1,
      w2,
      w3,
      wout,
      win,
      r2,
      rentai3: r3,  // brainlogic用
      r3,           // テーブル表示用（互換性維持）
      gear,
      comment
    });
  });
  
  return players;
}

function extractLineup(doc) {
  // 並び予想のセクションを探す
  const lineupSection = doc.querySelector('[class*="LinePrediction"]');
  if (!lineupSection) return null;
  
  const lineup = [];
  let currentGroup = [];
  
  // BibとChain（区切り）を順番に処理
  const items = lineupSection.querySelectorAll('[class*="Bib___Wrapper"], [class*="Chain___Wrapper"]');
  
  items.forEach(item => {
    const className = item.className || '';
    
    if (className.includes('Chain')) {
      // 区切り → 現在のグループを保存して新しいグループ開始
      if (currentGroup.length > 0) {
        lineup.push(currentGroup);
        currentGroup = [];
      }
    } else if (className.includes('Bib')) {
      // 車番を取得（テキストまたはaria-labelから）
      const text = item.textContent.trim();
      const num = parseInt(text);
      if (!isNaN(num)) {
        currentGroup.push(num);
      }
    }
  });
  
  // 最後のグループを追加
  if (currentGroup.length > 0) {
    lineup.push(currentGroup);
  }
  
  return lineup.length > 0 ? lineup : null;
}

// 直近成績HTMLから「今場所」「直近1」「直近2」を抽出

function appRaceToEngine(race){
  const players=race.players||[];
  const lines=(race.lineup||[]).map(g=>g.join('-')).join('/');
  const pt=players.map(p=>(p.n||p.car)+':'+(p.pt!=null?p.pt:'')).join(',');
  const style=players.map(p=>(p.n||p.car)+':'+(p.style||'')).join(',');
  const aiMap={'本命':'honmei','対抗':'taikou','単穴':'tanana','連下':'renge'};
  let honmei=null,taikou=null,tanana=null,renge=null;
  players.forEach(p=>{
    const car=p.n||p.car; const k=aiMap[p.ai];
    if(k==='honmei')honmei=car; else if(k==='taikou')taikou=car;
    else if(k==='tanana')tanana=car; else if(k==='renge')renge=car;
  });
  // chu判定（級班ベース・クラス文字列フォールバック）
  const cnt={S:0,A12:0,A3:0};
  players.forEach(p=>{const c=String(p.cls||'').toUpperCase();
    if(c==='S1'||c==='S2')cnt.S++; else if(c==='A1'||c==='A2')cnt.A12++; else if(c==='A3')cnt.A3++;});
  const clsStr=String(race.cls||'');
  let chu;
  if(cnt.A3>0 && cnt.A3>=cnt.A12 && cnt.S===0) chu='チャレンジ';
  else if(cnt.S>cnt.A12) chu='S級';
  else if(/S級/.test(clsStr)) chu='S級';
  else if(/チャレンジ|チ[選準決予戦]/.test(clsStr)) chu='チャレンジ';
  else chu='A級';
  // v3: 種別(raceType3)・デイ&ナイター判定(dn)をエンジンへ引き渡し（未付与時はV3_CUPINFOキャッシュからフォールバック）
  let _rt3=(race.raceType3!=null)?race.raceType3:null;
  let _dn=(race.dn===true)?true:((race.dn===false)?false:null);
  try{
    if(_rt3==null && typeof window!=='undefined' && window.V3_CUPINFO && typeof CURRENT_VENUE!=='undefined' && CURRENT_VENUE){
      const _inf=window.V3_CUPINFO[(CURRENT_VENUE.raceCode||'')+'|'+String(CURRENT_VENUE.dayNum||1)];
      if(_inf){ const _bi=_inf.byNum[race.raceNum]; if(_bi) _rt3=_bi.raceType3||null; _dn=_inf.dn; }
    }
  }catch(_e){}
  return {lines,pt,style,car_count:players.length,race_class:clsStr,chu,grade:race.grade||'',honmei,taikou,tanana,renge,raceType3:_rt3,dn:_dn};
}

function top3Orderings(results){
  const byRank={};
  results.forEach(r=>{(byRank[r.rank]=byRank[r.rank]||[]).push(String(r.car));});
  const ranks=Object.keys(byRank).map(Number).sort((a,b)=>a-b);
  const perm=arr=>{ if(arr.length<=1)return [arr.slice()]; const o=[]; arr.forEach((v,i)=>{const rest=arr.slice(0,i).concat(arr.slice(i+1)); perm(rest).forEach(p=>o.push([v].concat(p)));}); return o; };
  let seqs=[[]];
  for(const rk of ranks){ if(seqs[0].length>=3) break; const ps=perm(byRank[rk]); const next=[]; for(const s of seqs)for(const p of ps)next.push(s.concat(p)); seqs=next; }
  const out=new Set();
  seqs.forEach(s=>{ if(s.length>=3) out.add(s.slice(0,3).join('-')); });
  return [...out];
}

// ===== オッズパーク結果テーブル：着順パース（2-3着同着の着番空欄を直前着順で継承）=====
function parseOddsparkResults(doc){
  const validK=['逃げ','捲り','差し','マーク']; const rr=[]; let lastRank=null;
  doc.querySelectorAll('table tr').forEach(row=>{
    const cells=row.querySelectorAll('td'); if(cells.length<6) return;
    const cm=(cells[1]?.className||'').match(/no(\d)/); if(!cm) return;   // 車番classが無ければ着順行でない
    const car=parseInt(cm[1]);
    const rs=(cells[0]?.textContent||'').trim();
    const rowText=row.textContent||'';
    const hasAgari=/\d+\.\d/.test(rowText);         // 上りタイム＝完走の証
    const isDNF=/落|欠|故|失|＝|乗/.test(rowText);   // 落車・欠車・故障・失格
    let rank;
    if(/^\d+$/.test(rs)){ rank=parseInt(rs); lastRank=rank; }
    else if((rs===''||rs==='〃'||rs==='″'||rs==='same')&&lastRank!=null&&hasAgari&&!isDNF){ rank=lastRank; } // 同着：着番空欄＋上りあり→直前継承
    else return;   // 失格/落車/欠車（着空欄＋上りなし）等は除外
    const name=(cells[2]?.querySelector('a')||cells[2])?.textContent?.trim()?.replace(/\s+/g,'')||'';
    const kt=cells[5]?.textContent?.trim()||''; let ki=''; for(const k of validK){ if(kt.includes(k)){ ki=k; break; } }
    rr.push({rank,car,name,kimarite:ki});
  });
  return rr;
}

// ===== オッズパーク払戻パース（グレード戦の枠/車を正しく分離・同着で複数）=====
// オッズパーク実構造：払戻テーブルは列ラベル「2枠連/2車連/ワイド/3連勝」、複/単は別行（レースNo rowspan2）。
//   「2枠単/2車単」等の文字列は存在しない＝単→マーカーだけでは枠連単と車連単を区別不能。
//   → テーブルをグリッド展開し、ヘッダーのラベルで「2車連/3連勝/ワイド」の列を特定して読む（枠連は無視）。
//   同着はセル内に複数額が縦並び→全件配列で返す。実データ4パターン（GP/大垣落車/岸和田2R同着/非枠連）で検証済。
function kekkaGrid(tbl){
  const grid=[]; const rows=[...tbl.rows];
  rows.forEach((tr,r)=>{ grid[r]=grid[r]||[]; let c=0;
    [...tr.cells].forEach(cell=>{
      while(grid[r][c]) c++;
      const cs=parseInt(cell.getAttribute('colspan')||'1'), rs=parseInt(cell.getAttribute('rowspan')||'1');
      for(let i=0;i<rs;i++)for(let j=0;j<cs;j++){ grid[r+i]=grid[r+i]||[]; grid[r+i][c+j]=cell; }
      c+=cs;
    });
  });
  return {grid,rows};
}
function parseOddsparkPayouts(doc){
  const empty={ san3:[], ni2:[], san3f:[], ni2f:[], wide:[], nkSan3:'', nkNi2:'' };
  const tbl=[...doc.querySelectorAll('table')].find(t=>/3連勝/.test(t.textContent||'')&&/2車連/.test(t.textContent||''));
  if(!tbl) return empty;
  const {grid,rows}=kekkaGrid(tbl);
  let hr=-1; for(let r=0;r<grid.length;r++){ if(grid[r].some(c=>c&&/3連勝/.test(c.textContent))){ hr=r; break; } }
  if(hr<0) return empty;
  const lastCol={};
  grid[hr].forEach((c,ci)=>{ if(!c) return; const t=(c.textContent||'').replace(/\s/g,'');
    if(/2車連/.test(t)) lastCol.ni=ci; else if(/3連勝/.test(t)) lastCol.san=ci; else if(/ワイド/.test(t)) lastCol.wide=ci;
  });
  const amts=el=>el?[...new Set([...(el.textContent||'').matchAll(/([\d,]+)\s*円/g)].map(m=>m[1]))]:[];
  const nk=el=>{ const m=(el?(el.textContent||''):'').match(/円\s*\((\d+)\)/); return m?m[1]:''; };
  const out={ san3:[], ni2:[], san3f:[], ni2f:[], wide:[], nkSan3:'', nkNi2:'' };
  for(let r=hr+1;r<grid.length;r++){ if(!rows[r]) continue;
    const ct=[...rows[r].cells].map(c=>(c.textContent||'').trim());
    const hasF=ct.includes('複'), hasT=ct.includes('単'); if(!hasF&&!hasT) continue;
    if(lastCol.ni!=null){ const a=amts(grid[r][lastCol.ni]); if(a.length){ if(hasF) out.ni2f=a; else { out.ni2=a; out.nkNi2=nk(grid[r][lastCol.ni]); } } }
    if(lastCol.san!=null){ const a=amts(grid[r][lastCol.san]); if(a.length){ if(hasF) out.san3f=a; else { out.san3=a; out.nkSan3=nk(grid[r][lastCol.san]); } } }
    if(lastCol.wide!=null&&hasF){ const a=amts(grid[r][lastCol.wide]); if(a.length) out.wide=a; }
  }
  return out;
}

// ===== 結果照会（軽量・result.html専用）=====
// オッズパーク結果ページから着順・3連単払戻を取得（fetchRaceResultの中核をUI除去で再構成）
async function fetchRaceResultLite(venueId, raceNum){
  const joCode = ODDSPARK_JO_CODES[venueId];
  if(!joCode) return null;
  const d = new Date();
  const kaisaiBi = d.getFullYear().toString() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
  const url = `https://www.oddspark.com/keirin/RaceKekka.do?joCode=${joCode}&kaisaiBi=${kaisaiBi}&raceNo=${raceNum}`;
  try {
    const resp = await fetch(`${PROXY_URL}?url=${encodeURIComponent(url)}`);
    if(!resp.ok) return null;
    const html = await resp.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const results = parseOddsparkResults(doc);
    if(results.length < 3) return null; // 結果未確定
    const pay = parseOddsparkPayouts(doc);
    const ords = top3Orderings(results); // 同着対応：複数通り
    return { ords, san3: pay.san3, results };
  } catch(e){
    return null;
  }
}


// ===== 軽量ラッパー（result.html専用・UIコード除去版）=====
// 本日開催の会場一覧を取得（fetchVenueListの本日パース部を忠実再構成・UI除去）
async function fetchTodayVenues() {
  const resp = await fetch(`${PROXY_URL}?url=${encodeURIComponent('https://www.winticket.jp/keirin')}`);
  const html = await resp.text();
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const todayPanel = doc.querySelector('#panel-keirin-race-today');
  if (!todayPanel) return [];
  const venues = [];
  const items = todayPanel.querySelectorAll('[class*="RecentRaceListItem___Wrapper-sc"]');
  items.forEach(el => {
    const venueEl = el.querySelector('[class*="VenueName"]');
    const gradeEl = el.querySelector('[class*="GradeIcon"]');
    let linkEl = el.querySelector('a[href*="racecard"]');
    let linkType = 'racecard';
    if (!linkEl) { linkEl = el.querySelector('a[href*="raceresult"]'); linkType = 'raceresult'; }
    const timeEl = el.querySelector('time[class*="TimeText"]');
    if (venueEl && linkEl) {
      const venue = venueEl.textContent.trim();
      const grade = gradeEl?.getAttribute('aria-label') || 'F1';
      const link = linkEl.getAttribute('href');
      const startTime = timeEl?.textContent.trim() || '--:--';
      const match = link.match(/\/keirin\/([^/]+)\/(racecard|raceresult)\/(\d+)\/(\d+)(?:\/(\d+))?/);
      if (match) {
        const venueId = match[1], raceCode = match[3], dayNum = match[4];
        if (!venues.find(v => v.venueId === venueId && v.raceCode === raceCode && v.dayNum === dayNum)) {
          venues.push({ venue, venueId, grade: grade.toUpperCase(), raceCode, dayNum, link, linkType, startTime });
        }
      }
    }
  });
  return venues;
}

// 1会場の全レース（1-12R）を取得→生成用に整形（fetchVenueRacesの中核を忠実再構成・UI除去）
// 直近成績マージ・calcAreScoreは省略（エンジン生成に不要）
// ★2026-07-03 取得安定化：レース単位でリトライ（空shell/レート制限の取りこぼし対策）
async function fetchRaceCardWithRetry(url, venue, r, tries){
  tries = tries || 3;
  for(let attempt=1; attempt<=tries; attempt++){
    try{
      const resp = await fetch(`${PROXY_URL}?url=${encodeURIComponent(url)}`);
      const html = await resp.text();
      const parsed = parseRaceTableHTML(html, { venue: venue.venue, raceNum: r });
      // players が取れていれば成功。CSRのシェルのみ応答（空）なら再試行対象
      if(parsed && parsed.players && parsed.players.length > 0){
        return { raceNum: r, url, ...parsed };
      }
      if(attempt < tries) await new Promise(res=>setTimeout(res, 400*attempt));
    }catch(e){
      if(attempt < tries) await new Promise(res=>setTimeout(res, 400*attempt));
    }
  }
  return { raceNum: r, url, error: true };
}

async function fetchVenueRacesLite(venue) {
  const dayNum = venue.dayNum || '1';
  const racePromises = [];
  for (let r = 1; r <= 12; r++) {
    const url = `https://www.winticket.jp/keirin/${venue.venueId}/racecard/${venue.raceCode}/${dayNum}/${r}`;
    racePromises.push(fetchRaceCardWithRetry(url, venue, r, 3));
  }
  const races = await Promise.all(racePromises);
  // オッズパークからレース種別（cls）＋グレードを取得してマージ
  const oddsparkData = await fetchOddsparkRaceTypes(venue.venueId);
  const raceTypes = oddsparkData.types || {};
  const valid = races.filter(r => !r.error && r.players && r.players.length > 0);
  valid.forEach(race => {
    if (raceTypes[race.raceNum]) race.cls = raceTypes[race.raceNum];
    race.grade = oddsparkData.grade || venue.grade || '';
    race.venue = venue.venue;
  });
  return valid;
}

/* ===== パスコード照合（難読化：平文を持たずハッシュ比較） ===== */
const PASS_HASH='8c244b370747c1930a4e0967254778ddbb69f6a409e62beebe5f92191a09a3a1';

function sha256sync(ascii){
  function rightRotate(value,amount){return (value>>>amount)|(value<<(32-amount));}
  var mathPow=Math.pow, maxWord=mathPow(2,32);
  var result='', words=[], asciiBitLength=ascii.length*8;
  var hash=sha256sync.h=sha256sync.h||[];
  var k=sha256sync.k=sha256sync.k||[];
  var primeCounter=k.length, isComposite={};
  for(var candidate=2;primeCounter<64;candidate++){
    if(!isComposite[candidate]){
      for(var i=0;i<313;i+=candidate){isComposite[i]=candidate;}
      hash[primeCounter]=(mathPow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii+='\x80';
  while(ascii.length%64-56) ascii+='\x00';
  for(var i2=0;i2<ascii.length;i2++){
    var j=ascii.charCodeAt(i2);
    if(j>>8) return '';
    words[i2>>2]|=j<<((3-i2)%4)*8;
  }
  words[words.length]=((asciiBitLength/maxWord)|0);
  words[words.length]=(asciiBitLength);
  for(var j2=0;j2<words.length;){
    var w=words.slice(j2,j2+=16);
    var oldHash=hash;
    hash=hash.slice(0,8);
    for(var i3=0;i3<64;i3++){
      var w15=w[i3-15], w2=w[i3-2];
      var a=hash[0], e=hash[4];
      var temp1=hash[7]
        +(rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25))
        +((e&hash[5])^((~e)&hash[6]))
        +k[i3]
        +(w[i3]=(i3<16)?w[i3]:(
            w[i3-16]
            +(rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))
            +w[i3-7]
            +(rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10))
          )|0
        );
      var temp2=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))
        +((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(temp1+temp2)|0].concat(hash);
      hash[4]=(hash[4]+temp1)|0;
    }
    for(var i4=0;i4<8;i4++){hash[i4]=(hash[i4]+oldHash[i4])|0;}
  }
  for(var i5=0;i5<8;i5++){
    for(var j3=3;j3+1;j3--){
      var b=(hash[i5]>>(j3*8))&255;
      result+=((b<16)?0:'')+b.toString(16);
    }
  }
  return result;
}

async function sha256hex(msg){
  try{
    if(window.crypto && crypto.subtle){
      const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
      return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    }
  }catch(e){}
  return sha256sync(msg);
}

/* ===== 画面要素 ===== */
const boot=document.getElementById('boot');
const login=document.getElementById('login');
const home=document.getElementById('home');
const bootLogo=boot.querySelector('.boot-logo');
const bootWord=boot.querySelector('.boot-word');
const pin=document.getElementById('pin');
const inputs=[...pin.querySelectorAll('input')];
const loginErr=document.getElementById('loginErr');

/* ===== セッション内のアンロック状態 ===== */
function getUnlocked(){ try{ return sessionStorage.getItem('db_unlock')==='1'; }catch(e){ return false; } }
function setUnlocked(){ try{ sessionStorage.setItem('db_unlock','1'); }catch(e){} }

/* ===== 起動フロー ===== */
/* ★2026-07-03 一般デモ公開のためログイン画面を復帰（LOGIN_SKIP=false）。
   1245入場コード（PASS_HASH）で認証。LOGIN_SKIP=trueにすると再度スキップ可能。 */
const LOGIN_SKIP = false;
window.addEventListener('load', ()=>{
  if(LOGIN_SKIP){
    try{ setUnlocked(); }catch(e){}
    runBootThenHome();
    return;
  }
  if(getUnlocked()){
    boot.classList.add('hide');
    boot.style.display='none';
    home.classList.add('show','settled');
    return;
  }
  runBoot();
});

/* ログインをスキップしてboot→home（boot演出は維持） */
function runBootThenHome(){
  setTimeout(()=>bootLogo.classList.add('in'), 120);
  setTimeout(()=>bootWord.classList.add('in'), 480);
  setTimeout(()=>{
    boot.classList.add('hide');
    setTimeout(()=>{ boot.style.display='none'; }, 600);
    home.classList.add('show','settled');
  }, 2200);
}

function runBoot(){
  setTimeout(()=>bootLogo.classList.add('in'), 120);
  setTimeout(()=>bootWord.classList.add('in'), 480);
  setTimeout(()=>{
    boot.classList.add('hide');
    setTimeout(()=>{ boot.style.display='none'; }, 600);
    login.classList.add('show');
    setTimeout(()=>inputs[0].focus(), 250);
  }, 3000);
}

/* ===== PIN 入力挙動 ===== */
inputs.forEach((inp, idx)=>{
  inp.addEventListener('input', ()=>{
    inp.value=inp.value.replace(/[^0-9]/g,'').slice(0,1);
    inp.classList.toggle('filled', inp.value!=='');
    clearError();
    if(inp.value && idx<inputs.length-1) inputs[idx+1].focus();
    if(allFilled()) verify();
  });
  inp.addEventListener('keydown', (e)=>{
    if(e.key==='Backspace' && !inp.value && idx>0){
      inputs[idx-1].focus();
      inputs[idx-1].value='';
      inputs[idx-1].classList.remove('filled');
    }
    if(e.key==='Enter' && allFilled()) verify();
  });
  inp.addEventListener('paste', (e)=>{
    e.preventDefault();
    const digits=(e.clipboardData.getData('text')||'').replace(/[^0-9]/g,'').slice(0,inputs.length);
    if(!digits) return;
    inputs.forEach((c,i)=>{ c.value=digits[i]||''; c.classList.toggle('filled', !!digits[i]); });
    (inputs[digits.length] || inputs[inputs.length-1]).focus();
    if(allFilled()) verify();
  });
});

function allFilled(){ return inputs.every(i=>i.value!==''); }
function code(){ return inputs.map(i=>i.value).join(''); }
function clearError(){ loginErr.classList.remove('show'); }

let checking=false;
async function verify(){
  if(checking) return;
  checking=true;
  const h=await sha256hex(code());
  if(h===PASS_HASH){
    onSuccess();
  }else{
    onError();
    checking=false;
  }
}

function onError(){
  loginErr.classList.add('show');
  pin.classList.remove('error');
  void pin.offsetWidth;            /* リフロー強制でアニメ再生 */
  pin.classList.add('error');
  inputs.forEach(i=>{ i.value=''; i.classList.remove('filled'); });
  setTimeout(()=>inputs[0].focus(), 120);
}

function onSuccess(){
  setUnlocked();
  inputs.forEach(i=>i.blur());
  // v9 UI: 演出撤廃・即時表示
  login.classList.remove('show');
  login.style.display='none';
  runHomeIntro();
}

/* ログイン→ホームの演出シーケンス（t=0：完全ダークグレー） */
function runHomeIntro(){
  // v9 UI: アニメーション撤廃・全要素を即時表示
  home.classList.add('show','settled','bars-in','white-in','content-in');
}

/* ===== フッター ナビ ===== */
document.getElementById('toTop').addEventListener('click', ()=>{
  window.scrollTo({top:0, behavior:'smooth'});
});

/* ===================================================================
   Brain Race Result 本体（Phase 1-a：ライトモード骨格＋カードデザイン）
   ※現段階はデザイン確認用のサンプル描画。実データ配線（本日全レース取得
     →generateForRace→結果照合）は次の区切りでエンジン移植して差し込む。
   =================================================================== */
(function(){
  const getBtn    = document.getElementById('brrGetBtn');
  const resultBtn = document.getElementById('brrResultBtn');
  const statusEl  = document.getElementById('brrStatus');
  const cardsEl   = document.getElementById('brrCards');
  if(!getBtn) return;

  // segName（例 F2チ二分戦）→ dai(F2) と 分戦(二分戦) に分解
  function splitSeg(segName){
    const dm = String(segName||'').match(/^(F1|F2|G)/);
    const dai = dm ? dm[1] : '';
    const rest = String(segName||'').slice(dai.length); // 例 "チ二分戦"
    const sho = rest.slice(1); // 先頭1文字(級区分 チ/S/A)を除いた分戦名
    return { dai, sho };
  }

  // 本日の生成対象レースを取得してカードデータ配列（発走順）を返す
  // ★2026-07-03 会場単位リトライ＋逐次描画。onCardsで途中経過を随時反映（既出カードは保持）
  async function brrLoadToday(onProgress, onCards){
    if(!window.BrainEngine || !window.BRAIN_MODEL || !window.BRAIN_CELLMAP)
      throw new Error('エンジン未ロード');
    const venues = await fetchTodayVenues();
    if(onProgress) onProgress(0, venues.length || 1);
    if(!venues.length) return { cards: [] };
    const cards = [];
    // 会場を順に処理（プロキシ負荷を考慮して直列）
    for(let vi=0; vi<venues.length; vi++){
      const v = venues[vi];
      let races = [];
      // 会場単位でもリトライ（全レース空振り時は1回だけ再取得）
      for(let attempt=1; attempt<=2; attempt++){
        try { races = await fetchVenueRacesLite(v); } catch(e){ races = []; }
        if(races.length) break;
        if(attempt<2) await new Promise(res=>setTimeout(res, 600));
      }
      // v3: 種別（raceType3）・デイ&ナイター判定を各レースへ付与（取得失敗時は未付与＝安全側で見送り）
      try{
        const v3i = await fetchV3CupInfo(v.raceCode, String(v.dayNum||1));
        races.forEach(r=>{ const bi=v3i.byNum[r.raceNum]; r.raceType3 = bi ? (bi.raceType3||null) : null; r.dn = v3i.dn; r.startAtV3 = bi ? (bi.startAt||null) : null; });
      }catch(_e){}
      for(const race of races){
        if(!race.players || !race.lineup) continue;
        let er, res;
        try {
          er = appRaceToEngine(race);
          res = window.BrainEngine.generateForRace(er, window.BRAIN_MODEL, window.BRAIN_CELLMAP);
        } catch(e){ continue; }
        if(!res || !res.target) continue; // 非対象セル・見送りはカード化しない
        const { dai, sho } = splitSeg(res.segName);
        // 診断：エンジンへ渡った入力を保持（朝のapp本体と突き合わせ用）
        const _dbg = {
          lines: er.lines,
          ai: `◎${er.honmei==null?'-':er.honmei} ○${er.taikou==null?'-':er.taikou} △${er.tanana==null?'-':er.tanana} ×${er.renge==null?'-':er.renge}`,
          chu: er.chu,
          cls: er.race_class || '',
          cc: er.car_count,
          marks: res.marks ? Object.keys(res.marks).sort((a,b)=>a-b).map(c=>c+res.marks[c]).join(' ') : ''
        };
        cards.push({
          venue: race.venue, raceNum: race.raceNum,
          start: fmtStartJst(race.startAtV3) || race.start || '',
          grade: dai || race.grade || '',
          seg: sho || '',
          code: res.cell || '',
          pts: res.betCount,
          buys: res.buys.map(c=>c.join('-')),
          formationStr: (res.formation&&res.formation.str)||null,
          result: null, payout: null,
          venueId: v.venueId, raceCode: v.raceCode, dayNum: v.dayNum,
          _dbg
        });
        // コンソールにも出力（PCデバッグ用）
        try{ console.log(`[診断] ${race.venue}${race.raceNum}R cell=${res.cell} pts=${res.betCount} lines=${er.lines} ai=${_dbg.ai} chu=${er.chu} marks=${_dbg.marks}`); }catch(e){}
      }
      // 途中経過を随時描画（既出カードは保持したまま、発走順で並べ替えて反映）
      if(onCards){
        const sorted = cards.slice().sort((a,b)=>{
          const ta = a.start ? a.start.replace(':','') : '9999';
          const tb = b.start ? b.start.replace(':','') : '9999';
          return ta.localeCompare(tb);
        });
        onCards(sorted);
      }
      if(onProgress) onProgress(vi+1, venues.length);
    }
    // 発走時刻の昇順（早い順）でソート。時刻不明は末尾へ。
    cards.sort((a,b)=>{
      const ta = a.start ? a.start.replace(':','') : '9999';
      const tb = b.start ? b.start.replace(':','') : '9999';
      return ta.localeCompare(tb);
    });
    return { cards };
  }

  function esc(s){ return String(s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  // v8: 発走時刻（epoch秒→JST HH:MM。実行環境TZ非依存）
  function fmtStartJst(sec){
    if(typeof sec!=='number') return '';
    const d=new Date((sec+9*3600)*1000);
    const p=n=>String(n).padStart(2,'0');
    return p(d.getUTCHours())+':'+p(d.getUTCMinutes());
  }

  function cardHtml(r){
    const buys = r.formationStr
      ? `<div class="brr-buy-line brr-formation">${esc(r.formationStr)}</div>` +
        r.buys.map(b=>`<div class="brr-buy-line brr-hidden" data-buy="${esc(b)}">${esc(b)}</div>`).join('')
      : r.buys.map(b=>`<div class="brr-buy-line" data-buy="${esc(b)}">${esc(b)}</div>`).join('');
    const d = r._dbg || {};
    const dbg = d.lines ? `<div class="brr-dbg">並び ${esc(d.lines)}　${esc(d.ai||'')}　${esc(d.chu||'')}(${esc(d.cls||'')}) ${d.cc||''}車<br>印 ${esc(d.marks||'')}</div>` : '';
    return `<div class="brr-card">
      <div class="brr-card-top">
        <span class="brr-venue">${esc(r.venue)} ${r.raceNum}R<span class="brr-pts">${r.pts}点</span>${r.start?`<span class="brr-start">${esc(r.start)}</span>`:''}</span>
        <span class="brr-card-badges">
          <span class="brr-code">${esc(r.code)}</span>
        </span>
      </div>
      <div class="brr-buys">${buys}</div>
      ${dbg}
      <div class="brr-result">
        <span class="brr-result-label">結果</span>
        <span class="brr-result-order"></span>
        <span class="brr-result-paylabel">払戻</span>
        <span class="brr-result-pay"></span>
      </div>
    </div>`;
  }

  function renderCards(list){
    cardsEl.innerHTML = list.map(cardHtml).join('');
  }

  let LOADED_CARDS = [];
  const loadbar    = document.getElementById('brrLoadbar');
  const loadbarFill= document.getElementById('brrLoadbarFill');
  const summaryEl  = document.getElementById('brrSummary');

  getBtn.addEventListener('click', async ()=>{
    if(getBtn.disabled) return;
    getBtn.disabled = true;
    getBtn.classList.add('loading');
    resultBtn.classList.remove('show');
    if(summaryEl){ summaryEl.classList.remove('show'); summaryEl.innerHTML=''; }
    cardsEl.innerHTML = '';
    statusEl.textContent = '本日の開催・買い目を取得中…';
    // ローディングバー表示（進捗0%）
    if(loadbar){ loadbar.classList.add('show'); }
    if(loadbarFill){ loadbarFill.style.width = '4%'; }
    try {
      const out = await brrLoadToday((done, total)=>{
        if(loadbarFill){
          const pct = total ? Math.max(4, Math.round(done/total*100)) : 100;
          loadbarFill.style.width = pct + '%';
        }
      }, (partialCards)=>{
        // 途中経過を随時描画（既出カードは保持したまま増えていく）
        LOADED_CARDS = partialCards;
        renderCards(partialCards);
        if(partialCards.length){
          statusEl.textContent = `生成対象を取得中… 現在 ${partialCards.length}レース`;
        }
      });
      const cards = out.cards || [];
      LOADED_CARDS = cards;
      if(loadbarFill) loadbarFill.style.width = '100%';
      if(!cards.length){
        statusEl.textContent = '本日の生成対象レースはありませんでした。';
      } else {
        renderCards(cards);
        statusEl.textContent = `本日の生成対象：${cards.length}レース（発走順）`;
        // 取得ボタンを消し、同位置に照会ボタンを表示
        getBtn.classList.add('hidden');
        resultBtn.classList.add('show');
      }
    } catch(e){
      console.error('brrLoadToday error:', e);
      statusEl.textContent = '取得に失敗しました。時間をおいて再度お試しください。';
    } finally {
      getBtn.disabled = false;
      getBtn.classList.remove('loading');
      // バーは少し見せてからフェード
      setTimeout(()=>{ if(loadbar) loadbar.classList.remove('show'); if(loadbarFill) loadbarFill.style.width='0%'; }, 500);
    }
  });

  // 結果照会（プレビュー）：結果が入っているカードで的中買い目を赤表示＋着順・払戻＋tekichuスタンプ
  resultBtn.addEventListener('click', async ()=>{
    if(resultBtn.disabled) return;
    if(!LOADED_CARDS.length) return;
    resultBtn.disabled = true;
    getBtn.disabled = true;
    statusEl.textContent = '結果を照会中…';
    if(loadbar){ loadbar.classList.add('show'); }
    if(loadbarFill){ loadbarFill.style.width = '4%'; }

    const domCards = cardsEl.querySelectorAll('.brr-card');
    let hitCount = 0, doneCount = 0, checkedCount = 0;
    let totalPtsFinished = 0, totalPayout = 0;
    const codeAgg = {};   // v6: コード別内訳（生成不可選定用）

    for(let i=0; i<LOADED_CARDS.length; i++){
      const card = LOADED_CARDS[i];
      const el = domCards[i];
      let result = null;
      try { result = await fetchRaceResultLite(card.venueId, card.raceNum); }
      catch(e){ result = null; }

      if(loadbarFill){
        const pct = Math.max(4, Math.round((i+1)/LOADED_CARDS.length*100));
        loadbarFill.style.width = pct + '%';
      }

      if(!result || !result.ords || !result.ords.length){
        // 結果未確定：カードはそのまま
        continue;
      }
      checkedCount++;
      totalPtsFinished += (card.pts || 0); // 終了分の合計点数
      const ordSet = new Set(result.ords);
      const orderStr = result.ords[0]; // 表示用（同着時は先頭並び）
      const payAmt = (result.san3 && result.san3.length)
        ? parseInt(String(result.san3[0]).replace(/,/g,''),10) : 0;

      // 買い目の的中判定（3連単完全一致）
      let hit = false;
      if(el){
        el.querySelectorAll('.brr-buy-line').forEach(line=>{
          const b = line.getAttribute('data-buy');
          if(ordSet.has(b)){ line.classList.add('hit'); hit = true; }
        });
        if(hit){ const fl=el.querySelector('.brr-formation'); if(fl) fl.classList.add('hit'); }
        // 着順＋払戻の表示
        const rEl = el.querySelector('.brr-result');
        const oEl = el.querySelector('.brr-result-order');
        const pEl = el.querySelector('.brr-result-pay');
        if(oEl) oEl.textContent = result.ords.length>1 ? (orderStr+' 他') : orderStr;
        if(pEl){
          pEl.innerHTML = payAmt ? (payAmt.toLocaleString()+'<span class="yen">円</span>') : '—';
          pEl.classList.toggle('hit', hit);
        }
        if(rEl) rEl.classList.add('show');
        if(hit){
          el.classList.add('hit');
          if(rEl && !rEl.querySelector('.brr-tekichu')){
            const img = document.createElement('img');
            img.className = 'brr-tekichu'; img.src = TEKICHU_STAMP; img.alt = '的中';
            rEl.appendChild(img);
          }
        }
      }
      if(hit){ hitCount++; totalPayout += payAmt; } // 払戻累計（的中分）
      // v6: コード別内訳（確定レースのみ集計）
      {
        const cd = card.code || '(コードなし)';
        if(!codeAgg[cd]) codeAgg[cd] = { races:0, hits:0, pay:0, pts:0 };
        codeAgg[cd].races++;
        codeAgg[cd].pts += (card.pts || 0);
        if(hit){ codeAgg[cd].hits++; codeAgg[cd].pay += payAmt; }
      }
      doneCount++;
    }

    // 総括情報パネルを描画
    renderSummary({
      targetCount: LOADED_CARDS.length,
      finishedCount: checkedCount,
      hitCount, totalPtsFinished, totalPayout, codeAgg
    });

    statusEl.textContent = checkedCount
      ? `結果照会：確定 ${checkedCount}レース中 ${hitCount}的中`
      : '確定済みのレースはまだありません。';
    getBtn.disabled = false;
    setTimeout(()=>{ if(loadbar) loadbar.classList.remove('show'); if(loadbarFill) loadbarFill.style.width='0%'; }, 500);
    // 照会は再実行可能（後続レース確定後にもう一度押せる）
    resultBtn.disabled = false;
  });

  // 総括情報パネル描画
  function renderSummary(s){
    if(!summaryEl) return;
    const now = new Date();
    const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
    const hitRate = s.finishedCount ? (s.hitCount / s.finishedCount * 100) : 0;
    const recovery = s.totalPtsFinished ? (s.totalPayout / (s.totalPtsFinished * 100) * 100) : 0;
    summaryEl.innerHTML =
      `<div class="brr-sum-date">${dateStr}</div>`+
      `<div class="brr-sum-body">`+
        `<div>生成対象 ${s.targetCount}R</div>`+
        `<div class="brr-sum-gap"></div>`+
        `<div>生成対象 ${s.targetCount}R中 / 終了 ${s.finishedCount}R</div>`+
        `<div>的中 ${s.hitCount}R / 的中率 ${hitRate.toFixed(1)}%</div>`+
        `<div>総点数 ${s.totalPtsFinished.toLocaleString()}点 / 払戻 <span class="brr-sum-pay">${s.totalPayout.toLocaleString()}円</span></div>`+
        `<div>回収率 ${recovery.toFixed(1)}%</div>`+
      `</div>`+
      renderCodeBreakdown(s.codeAgg);
    summaryEl.classList.add('show');
  }

  // v6: コード別内訳（総合集計の直下・1行羅列・生成不可選定用）
  function renderCodeBreakdown(codeAgg){
    const codes = Object.keys(codeAgg || {});
    if(!codes.length) return '';
    codes.sort((a,b)=>a.localeCompare(b,'ja'));
    const lines = codes.map(c=>{
      const a = codeAgg[c];
      const hr = a.races ? (a.hits / a.races * 100) : 0;
      const rc = a.pts ? (a.pay / (a.pts * 100) * 100) : 0;
      return `<div class="brr-sum-code-line"><span class="cd">${c}</span>：対象${a.races}R・的中${a.hits}R・払戻${a.pay.toLocaleString()}円・回収${rc.toFixed(1)}%・的中${hr.toFixed(1)}%</div>`;
    }).join('');
    return `<div class="brr-sum-codes"><div class="brr-sum-codes-title">コード別内訳（確定分）</div>${lines}</div>`;
  }
})();

</script>
